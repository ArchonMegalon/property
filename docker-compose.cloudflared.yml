services:
  ea-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: propertyquarry-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${PROPERTYQUARRY_CF_TUNNEL_TOKEN:-${EA_CF_TUNNEL_TOKEN}}
    depends_on:
      ea-api:
        condition: service_healthy
