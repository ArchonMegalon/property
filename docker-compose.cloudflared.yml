services:
  ea-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: propertyquarry-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${PROPERTYQUARRY_CF_TUNNEL_TOKEN:?Set PROPERTYQUARRY_CF_TUNNEL_TOKEN for the dedicated PropertyQuarry tunnel}
    depends_on:
      propertyquarry-api:
        condition: service_healthy
