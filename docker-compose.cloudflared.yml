services:
  propertyquarry-cloudflared:
    # Production never consumes this caller-controlled Compose fragment; the
    # installed release controller owns its canonical plan.  Local/disposable
    # use is nevertheless digest-only so a mutable tag cannot slip in.
    image: cloudflare/cloudflared@sha256:${PROPERTYQUARRY_CLOUDFLARED_IMAGE_SHA256:?Set the controller-approved 64-character Cloudflared image digest}
    container_name: propertyquarry-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${PROPERTYQUARRY_CF_TUNNEL_TOKEN:?Set PROPERTYQUARRY_CF_TUNNEL_TOKEN for the dedicated PropertyQuarry tunnel}
    depends_on:
      propertyquarry-api:
        condition: service_healthy
