name: propertyquarry-security-runner-bootstrap

on:
  workflow_dispatch:
    inputs:
      security_run_id:
        description: Exact pre-approved smoke-runtime workflow_dispatch run waiting for the flagship security runner
        required: true
        type: string
      security_runner_label:
        description: Exact one-time pqsec label supplied to the pre-approved security run
        required: true
        type: string
      security_runner_token_expires_at:
        description: Expiration returned with the just-in-time operator-minted registration token
        required: true
        type: string

concurrency:
  group: propertyquarry-security-runner-bootstrap
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  bootstrap:
    if: ${{ github.ref == 'refs/heads/main' && github.event.repository.full_name == 'ArchonMegalon/property' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    environment:
      name: propertyquarry-production
    steps:
      - name: Validate the exact queued flagship security job
        id: target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SECURITY_RUN_ID: ${{ inputs.security_run_id }}
          SECURITY_RUNNER_LABEL: ${{ inputs.security_runner_label }}
          APPROVED_SECURITY_RUNNER_LABEL: ${{ vars.PROPERTYQUARRY_SECURITY_RUNNER_LABEL }}
          SECURITY_RUNNER_TOKEN_EXPIRES_AT: ${{ inputs.security_runner_token_expires_at }}
        run: |
          set -Eeuo pipefail
          umask 077
          [[ "${GITHUB_REPOSITORY}" == "ArchonMegalon/property" ]]
          [[ "${GITHUB_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${GITHUB_RUN_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${SECURITY_RUN_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${SECURITY_RUNNER_LABEL}" =~ ^pqsec-[0-9a-f]{32}$ ]]
          [[ "${APPROVED_SECURITY_RUNNER_LABEL}" =~ ^pqsec-[0-9a-f]{32}$ ]]
          [[ "${SECURITY_RUNNER_LABEL}" == "${APPROVED_SECURITY_RUNNER_LABEL}" ]]
          [[ "${#SECURITY_RUNNER_TOKEN_EXPIRES_AT}" -eq 20 ]]
          [[ "${SECURITY_RUNNER_TOKEN_EXPIRES_AT}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          canonical_token_expires_at="$(
            date -u -d "${SECURITY_RUNNER_TOKEN_EXPIRES_AT}" +%Y-%m-%dT%H:%M:%SZ
          )"
          [[ "${canonical_token_expires_at}" == "${SECURITY_RUNNER_TOKEN_EXPIRES_AT}" ]]
          token_expires_epoch="$(date -u -d "${canonical_token_expires_at}" +%s)"
          token_remaining_seconds="$((token_expires_epoch - $(date -u +%s)))"
          (( token_remaining_seconds >= 3000 && token_remaining_seconds <= 3700 ))

          api_root="${RUNNER_TEMP}/propertyquarry-security-target-${GITHUB_RUN_ID}"
          install -d -m 0700 "${api_root}"
          capture_api_json() {
            local destination="$1"
            shift
            local attempt raw
            for attempt in 1 2 3; do
              raw="${destination}.raw-${attempt}"
              if timeout --signal=TERM --kill-after=5s 30s \
                gh api --method GET "$@" \
                | head -c 8388609 >"${raw}"; then
                [[ -f "${raw}" && ! -L "${raw}" ]]
                (( $(stat -c '%s' "${raw}") <= 8388608 ))
                jq -ce . "${raw}" >"${destination}.tmp"
                (( $(stat -c '%s' "${destination}.tmp") <= 8388608 ))
                chmod 600 "${destination}.tmp"
                mv -fT "${destination}.tmp" "${destination}"
                rm -f -- "${raw}"
                return 0
              fi
              rm -f -- "${raw}"
              if (( attempt < 3 )); then
                sleep "${attempt}"
              fi
            done
            echo "Bounded GitHub API request failed after three attempts." >&2
            return 1
          }

          target_run_path="${api_root}/target-run.json"
          capture_api_json "${target_run_path}" \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${SECURITY_RUN_ID}"
          jq -e \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg head_sha "${GITHUB_SHA}" '
              .repository.full_name == $repository and
              .event == "workflow_dispatch" and
              .head_branch == "main" and
              .head_sha == $head_sha and
              .path == ".github/workflows/smoke-runtime.yml" and
              .run_attempt >= 1 and
              (.status == "queued" or .status == "in_progress") and
              .conclusion == null
            ' "${target_run_path}" >/dev/null

          target_jobs_path="${api_root}/target-jobs.json"
          capture_api_json "${target_jobs_path}" \
            --paginate --slurp \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${SECURITY_RUN_ID}/jobs?filter=latest&per_page=100"
          [[ "$(jq '[.[].jobs[] | select(.name == "propertyquarry-flagship-security")] | length' "${target_jobs_path}")" == "1" ]]
          target_job_path="${api_root}/target-job.json"
          jq -ce '.[] | .jobs[] | select(.name == "propertyquarry-flagship-security")' \
            "${target_jobs_path}" >"${target_job_path}.tmp"
          (( $(stat -c '%s' "${target_job_path}.tmp") <= 1048576 ))
          chmod 600 "${target_job_path}.tmp"
          mv -fT "${target_job_path}.tmp" "${target_job_path}"
          jq -e \
            --arg head_sha "${GITHUB_SHA}" \
            --arg runner_label "${APPROVED_SECURITY_RUNNER_LABEL}" '
              .name == "propertyquarry-flagship-security" and
              .status == "queued" and
              .conclusion == null and
              .head_sha == $head_sha and
              (.labels | index("self-hosted") != null) and
              (.labels | index("propertyquarry-security") != null) and
              (.labels | index($runner_label) != null)
            ' "${target_job_path}" >/dev/null

          run_attempt="$(jq -er '.run_attempt | tostring' "${target_run_path}")"
          job_id="$(jq -er '.id | tostring' "${target_job_path}")"
          [[ "${run_attempt}" =~ ^[1-9][0-9]{0,9}$ ]]
          [[ "${job_id}" =~ ^[1-9][0-9]{0,19}$ ]]
          workflow_ref="${GITHUB_REPOSITORY}/.github/workflows/smoke-runtime.yml@refs/heads/main"
          write_command_scalar() {
            local destination="$1"
            local key="$2"
            local value="$3"
            [[ "${key}" =~ ^[A-Za-z_][A-Za-z0-9_]{0,63}$ ]]
            (( ${#value} >= 1 && ${#value} <= 256 ))
            [[ "${value}" != *$'\n'* && "${value}" != *$'\r'* ]]
            printf '%s=%s\n' "${key}" "${value}" >>"${destination}"
          }
          write_command_scalar "${GITHUB_ENV}" PQ_SECURITY_RUN_ID "${SECURITY_RUN_ID}"
          write_command_scalar "${GITHUB_ENV}" PQ_SECURITY_RUN_ATTEMPT "${run_attempt}"
          write_command_scalar "${GITHUB_ENV}" PQ_SECURITY_JOB_ID "${job_id}"
          write_command_scalar "${GITHUB_ENV}" PQ_SECURITY_RUNNER_LABEL "${APPROVED_SECURITY_RUNNER_LABEL}"
          write_command_scalar "${GITHUB_ENV}" PQ_SECURITY_RUNNER_TOKEN_EXPIRES_AT "${canonical_token_expires_at}"
          write_command_scalar "${GITHUB_ENV}" PQ_EXPECTED_WORKFLOW_REF "${workflow_ref}"
          write_command_scalar "${GITHUB_OUTPUT}" security_run_id "${SECURITY_RUN_ID}"
          write_command_scalar "${GITHUB_OUTPUT}" security_run_attempt "${run_attempt}"
          write_command_scalar "${GITHUB_OUTPUT}" security_job_id "${job_id}"
          write_command_scalar "${GITHUB_OUTPUT}" security_runner_label "${APPROVED_SECURITY_RUNNER_LABEL}"
          write_command_scalar "${GITHUB_OUTPUT}" security_runner_token_expires_at "${canonical_token_expires_at}"

      - name: Set up the reviewed scanner Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.12.13
          check-latest: false

      - name: Materialize exact commit-bound bootstrap sources
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          source_root="${RUNNER_TEMP}/propertyquarry-security-bootstrap-source"
          install -d -m 0700 "${source_root}"

          materialize() {
            local repository_path="$1"
            local destination="$2"
            local attempt candidate
            for attempt in 1 2 3; do
              candidate="${destination}.attempt-${attempt}"
              if timeout --signal=TERM --kill-after=5s 30s \
                gh api --method GET \
                  -H 'Accept: application/vnd.github.raw+json' \
                  -H 'X-GitHub-Api-Version: 2026-03-10' \
                  "repos/${GITHUB_REPOSITORY}/contents/${repository_path}?ref=${GITHUB_SHA}" \
                | head -c 2097153 >"${candidate}"; then
                (( $(stat -c '%s' "${candidate}") <= 2097152 ))
                chmod 600 "${candidate}"
                mv -fT "${candidate}" "${destination}"
                return 0
              fi
              rm -f -- "${candidate}"
              if (( attempt < 3 )); then
                sleep "${attempt}"
              fi
            done
            echo "Commit-bound source retrieval failed after three attempts." >&2
            return 1
          }

          materialize scripts/propertyquarry_security_runner_bootstrap.sh "${source_root}/bootstrap.sh"
          materialize scripts/propertyquarry_security_runner_preflight.sh "${source_root}/preflight.sh"
          materialize config/propertyquarry_security_runner_requirements.lock "${source_root}/pip-audit.lock"

          printf '%s  %s\n' \
            '4ff51b7a86e5cef1007a46d9383e5233abd697fb2890e28aae933cd8e38452ea' \
            "${source_root}/bootstrap.sh" \
            '1450cd2506ed02edd5445861678aa80da92f5535161cdfa569d34622311796e3' \
            "${source_root}/preflight.sh" \
            'e968dda8c1dee309698cf05e42932f786397e954ac034c4f90a0be0db32844fd' \
            "${source_root}/pip-audit.lock" \
            | sha256sum --check --strict
          chmod 500 "${source_root}/bootstrap.sh"
          chmod 400 "${source_root}/preflight.sh" "${source_root}/pip-audit.lock"
          printf 'PQ_BOOTSTRAP_SOURCE_ROOT=%s\n' "${source_root}" >>"${GITHUB_ENV}"

      - name: Provision and run the exact one-job ephemeral rootless runner
        id: bootstrap
        shell: bash
        env:
          PQ_RUNNER_TOKEN: ${{ secrets.PROPERTYQUARRY_SECURITY_RUNNER_TOKEN }}
          PQ_RUNNER_TOKEN_EXPIRES_AT: ${{ steps.target.outputs.security_runner_token_expires_at }}
          PQ_GHCR_TOKEN: ${{ github.token }}
          PQ_WEB_IMAGE: ${{ vars.PROPERTYQUARRY_WEB_IMAGE }}
          PQ_RENDER_IMAGE: ${{ vars.PROPERTYQUARRY_RENDER_IMAGE }}
        run: |
          set -Eeuo pipefail
          export PQ_REPOSITORY="${GITHUB_REPOSITORY}"
          export PQ_EXPECTED_HEAD_SHA="${GITHUB_SHA}"
          export PQ_LOCK_SOURCE="${PQ_BOOTSTRAP_SOURCE_ROOT}/pip-audit.lock"
          export PQ_LOCK_SHA256="e968dda8c1dee309698cf05e42932f786397e954ac034c4f90a0be0db32844fd"
          export PQ_PREFLIGHT_SOURCE="${PQ_BOOTSTRAP_SOURCE_ROOT}/preflight.sh"
          export PQ_PREFLIGHT_SHA256="1450cd2506ed02edd5445861678aa80da92f5535161cdfa569d34622311796e3"
          export PQ_PYTHON_BIN="${pythonLocation}/bin/python"
          export PQ_EVIDENCE_ROOT="${RUNNER_TEMP}/propertyquarry-security-bootstrap-evidence"
          export PQ_OUTER_UID="$(id -u)"
          export PQ_OUTER_GID="$(id -g)"

          [[ -n "${PQ_RUNNER_TOKEN:-}" ]]
          [[ "${#PQ_RUNNER_TOKEN_EXPIRES_AT}" -eq 20 ]]
          [[ "${PQ_RUNNER_TOKEN_EXPIRES_AT}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          [[ "$(date -u -d "${PQ_RUNNER_TOKEN_EXPIRES_AT}" +%Y-%m-%dT%H:%M:%SZ)" == "${PQ_RUNNER_TOKEN_EXPIRES_AT}" ]]
          registration_expires_epoch="$(date -u -d "${PQ_RUNNER_TOKEN_EXPIRES_AT:?Missing registration-token expiration}" +%s)"
          registration_remaining_seconds="$((registration_expires_epoch - $(date -u +%s)))"
          (( registration_remaining_seconds >= 3000 && registration_remaining_seconds <= 3700 ))
          printf '::add-mask::%s\n' "${PQ_RUNNER_TOKEN}"

          sudo --preserve-env=GITHUB_ACTIONS,GITHUB_ACTOR,GITHUB_REF,GITHUB_REPOSITORY,GITHUB_RUN_ATTEMPT,GITHUB_RUN_ID,GITHUB_SHA,ImageOS,ImageVersion,RUNNER_ENVIRONMENT,PQ_REPOSITORY,PQ_EXPECTED_HEAD_SHA,PQ_EXPECTED_WORKFLOW_REF,PQ_SECURITY_RUN_ID,PQ_SECURITY_RUN_ATTEMPT,PQ_SECURITY_JOB_ID,PQ_SECURITY_RUNNER_LABEL,PQ_RUNNER_TOKEN,PQ_RUNNER_TOKEN_EXPIRES_AT,PQ_GHCR_TOKEN,PQ_WEB_IMAGE,PQ_RENDER_IMAGE,PQ_LOCK_SOURCE,PQ_LOCK_SHA256,PQ_PREFLIGHT_SOURCE,PQ_PREFLIGHT_SHA256,PQ_PYTHON_BIN,PQ_EVIDENCE_ROOT,PQ_OUTER_UID,PQ_OUTER_GID \
            /bin/bash "${PQ_BOOTSTRAP_SOURCE_ROOT}/bootstrap.sh"
          unset PQ_RUNNER_TOKEN PQ_RUNNER_TOKEN_EXPIRES_AT

      - name: Verify the exact flagship security job consumed the runner
        if: ${{ always() && steps.bootstrap.outcome == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PQ_WEB_IMAGE: ${{ vars.PROPERTYQUARRY_WEB_IMAGE }}
          PQ_RENDER_IMAGE: ${{ vars.PROPERTYQUARRY_RENDER_IMAGE }}
        run: |
          set -Eeuo pipefail
          umask 077
          [[ "${PQ_SECURITY_RUNNER_TOKEN_EXPIRES_AT}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          [[ "$(date -u -d "${PQ_SECURITY_RUNNER_TOKEN_EXPIRES_AT}" +%Y-%m-%dT%H:%M:%SZ)" == "${PQ_SECURITY_RUNNER_TOKEN_EXPIRES_AT}" ]]
          api_root="${RUNNER_TEMP}/propertyquarry-security-consumption-${GITHUB_RUN_ID}"
          install -d -m 0700 "${api_root}"
          target_job_path="${api_root}/target-job.json"
          target_job_captured=0
          for attempt in 1 2 3; do
            raw="${target_job_path}.raw-${attempt}"
            if timeout --signal=TERM --kill-after=5s 30s \
              gh api --method GET \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/${GITHUB_REPOSITORY}/actions/jobs/${PQ_SECURITY_JOB_ID}" \
              | head -c 1048577 >"${raw}"; then
              (( $(stat -c '%s' "${raw}") <= 1048576 ))
              jq -ce . "${raw}" >"${target_job_path}.tmp"
              (( $(stat -c '%s' "${target_job_path}.tmp") <= 1048576 ))
              chmod 600 "${target_job_path}.tmp"
              mv -fT "${target_job_path}.tmp" "${target_job_path}"
              rm -f -- "${raw}"
              target_job_captured=1
              break
            fi
            rm -f -- "${raw}"
            if (( attempt < 3 )); then
              sleep "${attempt}"
            fi
          done
          [[ "${target_job_captured}" == "1" ]]
          expected_runner="pq-security-${GITHUB_RUN_ID}-${PQ_SECURITY_RUN_ID}"
          jq -e \
            --arg head_sha "${GITHUB_SHA}" \
            --arg runner_name "${expected_runner}" \
            --arg runner_label "${PQ_SECURITY_RUNNER_LABEL}" '
              .name == "propertyquarry-flagship-security" and
              .status == "completed" and
              .conclusion == "success" and
              .head_sha == $head_sha and
              .runner_name == $runner_name and
              (.labels | index($runner_label) != null)
            ' "${target_job_path}" >/dev/null
          evidence_root="${RUNNER_TEMP}/propertyquarry-security-bootstrap-evidence"
          preflight_name="preflight-${PQ_SECURITY_RUN_ID}-${PQ_SECURITY_RUN_ATTEMPT}.json"
          jq -n \
            --arg schema "propertyquarry.security_runner_consumption.v1" \
            --arg status "pass" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflow_ref "${PQ_EXPECTED_WORKFLOW_REF}" \
            --arg run_id "${PQ_SECURITY_RUN_ID}" \
            --arg run_attempt "${PQ_SECURITY_RUN_ATTEMPT}" \
            --arg job_id "${PQ_SECURITY_JOB_ID}" \
            --arg head_sha "${GITHUB_SHA}" \
            --arg bootstrap_run_id "${GITHUB_RUN_ID}" \
            --arg bootstrap_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg runner_name "${expected_runner}" \
            --arg runner_label "${PQ_SECURITY_RUNNER_LABEL}" \
            --arg runner_token_expires_at "${PQ_RUNNER_TOKEN_EXPIRES_AT}" \
            --arg web_image "${PQ_WEB_IMAGE}" \
            --arg render_image "${PQ_RENDER_IMAGE}" \
            --arg verified_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{schema:$schema,status:$status,repository:$repository,workflow_ref:$workflow_ref,target:{run_id:$run_id,run_attempt:$run_attempt,job_id:$job_id,head_sha:$head_sha},bootstrap:{run_id:$bootstrap_run_id,run_attempt:$bootstrap_run_attempt},runner:{name:$runner_name,label:$runner_label},images:{web:$web_image,render:$render_image},registration_token_expires_at:$runner_token_expires_at,verified_at:$verified_at}' \
            >"${evidence_root}/consumption.json"
          chmod 600 "${evidence_root}/consumption.json"

          for receipt_name in \
            bootstrap-receipt.json \
            consumption.json \
            post-job-integrity.json \
            "${preflight_name}"; do
            receipt_path="${evidence_root}/${receipt_name}"
            [[ -f "${receipt_path}" && ! -L "${receipt_path}" ]]
          done
          bootstrap_receipt_sha256="$(sha256sum "${evidence_root}/bootstrap-receipt.json" | awk '{print $1}')"
          consumption_sha256="$(sha256sum "${evidence_root}/consumption.json" | awk '{print $1}')"
          post_job_sha256="$(sha256sum "${evidence_root}/post-job-integrity.json" | awk '{print $1}')"
          preflight_sha256="$(sha256sum "${evidence_root}/${preflight_name}" | awk '{print $1}')"
          jq -n \
            --arg schema "propertyquarry.security_runner_receipt_manifest.v1" \
            --arg status "pass" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflow_ref "${PQ_EXPECTED_WORKFLOW_REF}" \
            --arg run_id "${PQ_SECURITY_RUN_ID}" \
            --arg run_attempt "${PQ_SECURITY_RUN_ATTEMPT}" \
            --arg job_id "${PQ_SECURITY_JOB_ID}" \
            --arg head_sha "${GITHUB_SHA}" \
            --arg bootstrap_run_id "${GITHUB_RUN_ID}" \
            --arg bootstrap_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg runner_name "${expected_runner}" \
            --arg runner_label "${PQ_SECURITY_RUNNER_LABEL}" \
            --arg runner_token_expires_at "${PQ_RUNNER_TOKEN_EXPIRES_AT}" \
            --arg web_image "${PQ_WEB_IMAGE}" \
            --arg render_image "${PQ_RENDER_IMAGE}" \
            --arg bootstrap_receipt_sha256 "${bootstrap_receipt_sha256}" \
            --arg consumption_sha256 "${consumption_sha256}" \
            --arg post_job_sha256 "${post_job_sha256}" \
            --arg preflight_name "${preflight_name}" \
            --arg preflight_sha256 "${preflight_sha256}" \
            --arg recorded_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
              {
                schema:$schema,
                status:$status,
                repository:$repository,
                workflow_ref:$workflow_ref,
                target:{run_id:$run_id,run_attempt:$run_attempt,job_id:$job_id,head_sha:$head_sha},
                bootstrap:{run_id:$bootstrap_run_id,run_attempt:$bootstrap_run_attempt,head_sha:$head_sha},
                runner:{name:$runner_name,label:$runner_label},
                images:{web:$web_image,render:$render_image},
                registration_token_expires_at:$runner_token_expires_at,
                files:{
                  "bootstrap-receipt.json":$bootstrap_receipt_sha256,
                  "consumption.json":$consumption_sha256,
                  "post-job-integrity.json":$post_job_sha256,
                  ($preflight_name):$preflight_sha256
                },
                recorded_at:$recorded_at
              }
            ' >"${evidence_root}/receipt-manifest.json"
          chmod 600 "${evidence_root}/receipt-manifest.json"

      - name: Preserve governed runner-maintenance evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-security-runner-bootstrap-target-${{ steps.target.outputs.security_run_id }}-${{ steps.target.outputs.security_run_attempt }}-${{ steps.target.outputs.security_job_id }}
          path: ${{ runner.temp }}/propertyquarry-security-bootstrap-evidence
          if-no-files-found: error
          retention-days: 30
