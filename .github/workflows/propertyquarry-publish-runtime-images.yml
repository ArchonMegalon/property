name: propertyquarry-publish-runtime-images

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: propertyquarry-publish-runtime-images-main
  cancel-in-progress: false

jobs:
  preflight:
    name: Bind the protected image publication envelope
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      envelope_sha: ${{ steps.bind.outputs.envelope_sha }}
      runtime_sha: ${{ steps.bind.outputs.runtime_sha }}
      hygiene_receipt_sha256: ${{ steps.bind.outputs.hygiene_receipt_sha256 }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate branch, manifest, and clean workflow envelope
        id: bind
        shell: bash
        env:
          EXPECTED_REPOSITORY: ArchonMegalon/property
          EXPECTED_WEB_IMAGE: ghcr.io/archonmegalon/propertyquarry-web-runtime
          EXPECTED_RENDER_IMAGE: ghcr.io/archonmegalon/propertyquarry-render-runtime
          REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            echo "Image publication requires an explicit workflow_dispatch event" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" != "refs/heads/main" || "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Image publication is restricted to the main branch" >&2
            exit 1
          fi
          if [[ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "Unexpected source repository: ${GITHUB_REPOSITORY}" >&2
            exit 1
          fi
          if [[ "${REPOSITORY_VISIBILITY}" != "public" ]]; then
            echo "Image publication requires the reviewed public repository and public-good Sigstore" >&2
            exit 1
          fi

          envelope_sha="$(git rev-parse HEAD)"
          if [[ ! "${envelope_sha}" =~ ^[0-9a-f]{40}$ || "${envelope_sha}" != "${GITHUB_SHA}" ]]; then
            echo "Checked-out workflow envelope does not match github.sha" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo "Workflow envelope checkout must be completely clean" >&2
            exit 1
          fi

          output_root="_completion/propertyquarry_image_publish/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/preflight"
          mkdir -p "${output_root}"
          hygiene_receipt="${output_root}/release-hygiene.json"
          PYTHONPATH=ea python3 scripts/check_property_release_hygiene.py --write "${hygiene_receipt}"

          runtime_sha="$(PYTHONPATH=ea python3 -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "PropertyQuarry manifest runtime SHA is missing or malformed" >&2
            exit 1
          fi
          git cat-file -e "${runtime_sha}^{commit}"
          if ! git merge-base --is-ancestor "${runtime_sha}" "${envelope_sha}"; then
            echo "Manifest runtime SHA is not an ancestor of the workflow envelope" >&2
            exit 1
          fi

          export ENVELOPE_SHA="${envelope_sha}"
          export RUNTIME_SHA="${runtime_sha}"
          export HYGIENE_RECEIPT="${hygiene_receipt}"
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          from scripts.verify_generated_release_artifacts_clean import load_release_manifest

          manifest = load_release_manifest(Path("docs/PROPERTYQUARRY_RELEASE_MANIFEST.md"))
          expected = {
              "release_branch": "main",
              "release_commit_sha": os.environ["RUNTIME_SHA"],
              "release_product": "PropertyQuarry",
              "release_repository": os.environ["EXPECTED_REPOSITORY"],
          }
          mismatches = {
              key: {"expected": value, "observed": manifest.get(key)}
              for key, value in expected.items()
              if manifest.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"release manifest binding mismatch: {mismatches}")

          hygiene_path = Path(os.environ["HYGIENE_RECEIPT"])
          hygiene = json.loads(hygiene_path.read_text(encoding="utf-8"))
          if hygiene.get("status") != "pass":
              raise SystemExit("release hygiene receipt did not pass")
          hygiene_sha256 = hashlib.sha256(hygiene_path.read_bytes()).hexdigest()
          payload = {
              "schema": "propertyquarry.image_publish_preflight.v1",
              "status": "pass",
              "product": "PropertyQuarry",
              "repository": os.environ["EXPECTED_REPOSITORY"],
              "repository_visibility": "public",
              "branch": "main",
              "runtime_commit_sha": os.environ["RUNTIME_SHA"],
              "workflow_envelope_sha": os.environ["ENVELOPE_SHA"],
              "release_hygiene_receipt_sha256": hygiene_sha256,
              "approved_image_repositories": {
                  "web": os.environ["EXPECTED_WEB_IMAGE"],
                  "render": os.environ["EXPECTED_RENDER_IMAGE"],
              },
              "deployment_performed": False,
              "environment_variables_mutated": False,
          }
          receipt_path = hygiene_path.with_name("preflight.json")
          receipt_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          Path(hygiene_path.with_name("hygiene.sha256")).write_text(hygiene_sha256 + "\n", encoding="utf-8")
          PY

          hygiene_receipt_sha256="$(tr -d '\n' < "${output_root}/hygiene.sha256")"
          if [[ ! "${hygiene_receipt_sha256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Release hygiene receipt hash is missing or malformed" >&2
            exit 1
          fi
          {
            echo "envelope_sha=${envelope_sha}"
            echo "runtime_sha=${runtime_sha}"
            echo "hygiene_receipt_sha256=${hygiene_receipt_sha256}"
          } >> "${GITHUB_OUTPUT}"
      - name: Preserve image publication preflight
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: propertyquarry-image-publish-preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/propertyquarry_image_publish/${{ github.run_id }}-${{ github.run_attempt }}/preflight
          if-no-files-found: error
          retention-days: 30

  build-and-publish:
    name: Build and publish ${{ matrix.component }} runtime
    needs: preflight
    environment:
      name: propertyquarry-production
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web
            service: propertyquarry-api
            dockerfile: ea/Dockerfile.property-web
            image: ghcr.io/archonmegalon/propertyquarry-web-runtime
          - component: render
            service: propertyquarry-render-tools
            dockerfile: ea/Dockerfile.property
            image: ghcr.io/archonmegalon/propertyquarry-render-runtime
    steps:
      - name: Check out the exact workflow envelope build context
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.envelope_sha }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Bind envelope build inputs
        id: inputs
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
          SERVICE: ${{ matrix.service }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE_REPOSITORY: ${{ matrix.image }}
          ENVELOPE_SHA: ${{ needs.preflight.outputs.envelope_sha }}
          RUNTIME_SHA: ${{ needs.preflight.outputs.runtime_sha }}
        run: |
          set -euo pipefail

          if [[ "$(git -C source rev-parse HEAD)" != "${ENVELOPE_SHA}" ]]; then
            echo "Build context checkout does not match the workflow envelope" >&2
            exit 1
          fi
          if [[ -n "$(git -C source status --porcelain --untracked-files=all)" ]]; then
            echo "Build context checkout must be completely clean" >&2
            exit 1
          fi
          git -C source cat-file -e "${RUNTIME_SHA}^{commit}"
          if ! git -C source merge-base --is-ancestor "${RUNTIME_SHA}" "${ENVELOPE_SHA}"; then
            echo "Manifest runtime SHA is not an ancestor of the build envelope" >&2
            exit 1
          fi
          PYTHONPATH=source/ea python3 source/scripts/check_property_release_hygiene.py

          case "${COMPONENT}:${SERVICE}:${DOCKERFILE}:${IMAGE_REPOSITORY}" in
            "web:propertyquarry-api:ea/Dockerfile.property-web:ghcr.io/archonmegalon/propertyquarry-web-runtime") ;;
            "render:propertyquarry-render-tools:ea/Dockerfile.property:ghcr.io/archonmegalon/propertyquarry-render-runtime") ;;
            *)
              echo "Unexpected component, service, Dockerfile, or registry repository" >&2
              exit 1
              ;;
          esac
          if [[ "${IMAGE_REPOSITORY}" != ghcr.io/archonmegalon/* ]]; then
            echo "Unexpected registry repository: ${IMAGE_REPOSITORY}" >&2
            exit 1
          fi
          if [[ ! -f "source/${DOCKERFILE}" || ! -f source/.dockerignore || ! -f source/docker-compose.property.yml ]]; then
            echo "A required build input is missing" >&2
            exit 1
          fi

          compose_config="${RUNNER_TEMP}/propertyquarry-compose-${COMPONENT}.json"
          docker compose -f source/docker-compose.property.yml config --format json --no-interpolate > "${compose_config}"
          export COMPOSE_CONFIG="${compose_config}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path(os.environ["COMPOSE_CONFIG"]).read_text(encoding="utf-8"))
          service = (config.get("services") or {}).get(os.environ["SERVICE"])
          if not isinstance(service, dict):
              raise SystemExit(f'Compose service is missing: {os.environ["SERVICE"]}')
          build = service.get("build")
          if not isinstance(build, dict):
              raise SystemExit(f'Compose build mapping is missing: {os.environ["SERVICE"]}')
          observed_context = Path(str(build.get("context") or "")).resolve()
          expected_context = Path("source").resolve()
          if observed_context != expected_context:
              raise SystemExit(
                  f"Compose build context mismatch: expected={expected_context} observed={observed_context}"
              )
          if str(build.get("dockerfile") or "") != os.environ["DOCKERFILE"]:
              raise SystemExit(
                  f'Compose Dockerfile mismatch: expected={os.environ["DOCKERFILE"]} '
                  f'observed={build.get("dockerfile")}'
              )
          PY

          source_tree_sha1="$(git -C source rev-parse "${ENVELOPE_SHA}^{tree}")"
          source_archive_sha256="$(git -C source archive --format=tar "${ENVELOPE_SHA}" | sha256sum | awk '{print $1}')"
          dockerfile_sha256="$(sha256sum "source/${DOCKERFILE}" | awk '{print $1}')"
          dockerignore_sha256="$(sha256sum source/.dockerignore | awk '{print $1}')"
          compose_sha256="$(sha256sum source/docker-compose.property.yml | awk '{print $1}')"
          published_tag="${IMAGE_REPOSITORY}:runtime-${RUNTIME_SHA}-envelope-${ENVELOPE_SHA}-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [[ ! "${published_tag}" =~ ^ghcr\.io/archonmegalon/propertyquarry-(web|render)-runtime:runtime-[0-9a-f]{40}-envelope-[0-9a-f]{40}-run-[0-9]+-[0-9]+$ ]]; then
            echo "Published tag is not bound to the full SHAs and unique workflow attempt" >&2
            exit 1
          fi

          {
            echo "published_tag=${published_tag}"
            echo "source_tree_sha1=${source_tree_sha1}"
            echo "source_archive_sha256=${source_archive_sha256}"
            echo "dockerfile_sha256=${dockerfile_sha256}"
            echo "dockerignore_sha256=${dockerignore_sha256}"
            echo "compose_sha256=${compose_sha256}"
          } >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Authenticate to the approved GHCR registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable runtime image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: source
          file: source/${{ matrix.dockerfile }}
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.inputs.outputs.published_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/ArchonMegalon/property
            org.opencontainers.image.revision=${{ needs.preflight.outputs.envelope_sha }}
            org.opencontainers.image.version=${{ needs.preflight.outputs.runtime_sha }}
            com.propertyquarry.release.runtime-sha=${{ needs.preflight.outputs.runtime_sha }}
            com.propertyquarry.release.workflow-envelope-sha=${{ needs.preflight.outputs.envelope_sha }}
          provenance: mode=max
          sbom: true
      - name: Sign and publish GitHub Sigstore provenance
        id: sigstore
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
      - name: Verify remote digest, attestations, and labels
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
          SERVICE: ${{ matrix.service }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE_REPOSITORY: ${{ matrix.image }}
          PUBLISHED_TAG: ${{ steps.inputs.outputs.published_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SIGSTORE_ATTESTATION_ID: ${{ steps.sigstore.outputs.attestation-id }}
          SIGSTORE_ATTESTATION_URL: ${{ steps.sigstore.outputs.attestation-url }}
          SIGSTORE_BUNDLE_PATH: ${{ steps.sigstore.outputs.bundle-path }}
          ENVELOPE_SHA: ${{ needs.preflight.outputs.envelope_sha }}
          RUNTIME_SHA: ${{ needs.preflight.outputs.runtime_sha }}
          HYGIENE_RECEIPT_SHA256: ${{ needs.preflight.outputs.hygiene_receipt_sha256 }}
          SOURCE_TREE_SHA1: ${{ steps.inputs.outputs.source_tree_sha1 }}
          SOURCE_ARCHIVE_SHA256: ${{ steps.inputs.outputs.source_archive_sha256 }}
          DOCKERFILE_SHA256: ${{ steps.inputs.outputs.dockerfile_sha256 }}
          DOCKERIGNORE_SHA256: ${{ steps.inputs.outputs.dockerignore_sha256 }}
          COMPOSE_SHA256: ${{ steps.inputs.outputs.compose_sha256 }}
        run: |
          set -euo pipefail

          if [[ "${IMAGE_REPOSITORY}" != "ghcr.io/archonmegalon/propertyquarry-${COMPONENT}-runtime" ]]; then
            echo "Unexpected registry repository: ${IMAGE_REPOSITORY}" >&2
            exit 1
          fi
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Published image digest is missing or malformed" >&2
            exit 1
          fi

          output_root="_completion/propertyquarry_image_publish/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/${COMPONENT}"
          mkdir -p "${output_root}/remote"
          if [[ -z "${SIGSTORE_ATTESTATION_ID}" || -z "${SIGSTORE_ATTESTATION_URL}" || -z "${SIGSTORE_BUNDLE_PATH}" ]]; then
            echo "GitHub Sigstore provenance outputs are incomplete" >&2
            exit 1
          fi
          if [[ ! -f "${SIGSTORE_BUNDLE_PATH}" || -L "${SIGSTORE_BUNDLE_PATH}" || ! -s "${SIGSTORE_BUNDLE_PATH}" ]]; then
            echo "GitHub Sigstore bundle is missing, empty, or unsafe" >&2
            exit 1
          fi
          sigstore_bundle_realpath="$(realpath "${SIGSTORE_BUNDLE_PATH}")"
          case "${sigstore_bundle_realpath}" in
            "${RUNNER_TEMP}"/*) ;;
            *)
              echo "GitHub Sigstore bundle is outside the runner temporary directory" >&2
              exit 1
              ;;
          esac
          sigstore_bundle_size="$(stat -c '%s' "${SIGSTORE_BUNDLE_PATH}")"
          if (( sigstore_bundle_size <= 0 || sigstore_bundle_size > 16777216 )); then
            echo "GitHub Sigstore bundle size is outside the accepted bound" >&2
            exit 1
          fi
          sigstore_dir="${output_root}/sigstore"
          sigstore_bundle_copy="${sigstore_dir}/${COMPONENT}-bundle.json"
          mkdir -p "${sigstore_dir}"
          install -m 0600 -- "${SIGSTORE_BUNDLE_PATH}" "${sigstore_bundle_copy}"
          sigstore_bundle_sha256="$(sha256sum "${sigstore_bundle_copy}" | awk '{print $1}')"
          if [[ ! "${sigstore_bundle_sha256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "GitHub Sigstore bundle SHA-256 is missing or malformed" >&2
            exit 1
          fi
          export SIGSTORE_BUNDLE_COPY="${sigstore_bundle_copy}"
          export SIGSTORE_BUNDLE_SHA256="${sigstore_bundle_sha256}"
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path
          from urllib.parse import urlsplit

          attestation_id = os.environ["SIGSTORE_ATTESTATION_ID"].strip()
          attestation_url = os.environ["SIGSTORE_ATTESTATION_URL"].strip()
          if not attestation_id or any(character.isspace() for character in attestation_id):
              raise SystemExit("GitHub Sigstore attestation ID is malformed")
          parsed_url = urlsplit(attestation_url)
          expected_path = f'/{os.environ["GITHUB_REPOSITORY"]}/attestations/{attestation_id}'
          if (
              parsed_url.scheme != "https"
              or parsed_url.hostname != "github.com"
              or parsed_url.path.rstrip("/").casefold() != expected_path.casefold()
              or parsed_url.query
              or parsed_url.fragment
          ):
              raise SystemExit("GitHub Sigstore attestation URL is not repository-bound")

          bundle = json.loads(Path(os.environ["SIGSTORE_BUNDLE_COPY"]).read_text(encoding="utf-8"))
          envelope = bundle.get("dsseEnvelope")
          if not isinstance(envelope, dict):
              raise SystemExit("GitHub Sigstore bundle is missing its DSSE envelope")
          try:
              statement = json.loads(base64.b64decode(envelope["payload"], validate=True))
          except Exception as exc:
              raise SystemExit("GitHub Sigstore bundle payload is malformed") from exc
          subjects = statement.get("subject")
          expected_subject = {
              "name": os.environ["IMAGE_REPOSITORY"],
              "digest": {"sha256": os.environ["IMAGE_DIGEST"].split(":", 1)[1]},
          }
          if subjects != [expected_subject]:
              raise SystemExit("GitHub Sigstore bundle subject does not match the exact image digest")
          if not str(statement.get("predicateType") or "").startswith("https://slsa.dev/provenance/"):
              raise SystemExit("GitHub Sigstore bundle is not SLSA provenance")
          signatures = envelope.get("signatures")
          if not isinstance(signatures, list) or not signatures:
              raise SystemExit("GitHub Sigstore bundle has no DSSE signature")
          verification_material = bundle.get("verificationMaterial")
          if not isinstance(verification_material, dict):
              raise SystemExit("GitHub Sigstore bundle has no verification material")
          certificate = verification_material.get("certificate")
          certificate_chain = verification_material.get("x509CertificateChain")
          chain_certificates = (
              certificate_chain.get("certificates")
              if isinstance(certificate_chain, dict)
              else None
          )
          has_signing_certificate = (
              isinstance(certificate, dict)
              and bool(certificate.get("rawBytes"))
          ) or (
              isinstance(chain_certificates, list)
              and bool(chain_certificates)
              and all(
                  isinstance(item, dict) and bool(item.get("rawBytes"))
                  for item in chain_certificates
              )
          )
          if not has_signing_certificate:
              raise SystemExit("GitHub Sigstore bundle has no signing certificate")
          transparency_entries = verification_material.get("tlogEntries")
          if not isinstance(transparency_entries, list) or not transparency_entries:
              raise SystemExit("GitHub Sigstore bundle has no transparency-log entry")
          PY

          docker buildx imagetools inspect --raw "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}" > "${output_root}/remote/digest-manifest.json"
          remote_digest="sha256:$(sha256sum "${output_root}/remote/digest-manifest.json" | awk '{print $1}')"
          if [[ "${remote_digest}" != "${IMAGE_DIGEST}" ]]; then
            echo "Remote digest-addressed manifest does not match the build output digest" >&2
            exit 1
          fi
          docker buildx imagetools inspect --raw "${PUBLISHED_TAG}" > "${output_root}/remote/tag-manifest.json"
          remote_tag_digest="sha256:$(sha256sum "${output_root}/remote/tag-manifest.json" | awk '{print $1}')"
          if [[ "${remote_tag_digest}" != "${IMAGE_DIGEST}" ]]; then
            echo "Published tag does not resolve to the captured digest" >&2
            exit 1
          fi

          export REMOTE_MANIFEST_PATH="${output_root}/remote/digest-manifest.json"
          export REMOTE_METADATA_PATH="${output_root}/remote/metadata.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path(os.environ["REMOTE_MANIFEST_PATH"]).read_text(encoding="utf-8"))
          descriptors = manifest.get("manifests")
          if not isinstance(descriptors, list):
              raise SystemExit("provenance/SBOM publication must produce an image index")
          platform_descriptors = []
          attestation_descriptors = []
          for descriptor in descriptors:
              platform = descriptor.get("platform") or {}
              annotations = descriptor.get("annotations") or {}
              if annotations.get("vnd.docker.reference.type") == "attestation-manifest":
                  attestation_descriptors.append(descriptor)
              elif platform.get("os") == "linux" and platform.get("architecture") == "amd64":
                  platform_descriptors.append(descriptor)
          if len(platform_descriptors) != 1:
              raise SystemExit(f"expected exactly one linux/amd64 image manifest, got {len(platform_descriptors)}")
          if not attestation_descriptors:
              raise SystemExit("remote image index is missing provenance/SBOM attestations")
          payload = {
              "platform_manifest_digest": platform_descriptors[0].get("digest"),
              "attestation_manifest_digests": [item.get("digest") for item in attestation_descriptors],
          }
          for digest in [payload["platform_manifest_digest"], *payload["attestation_manifest_digests"]]:
              if not isinstance(digest, str) or not digest.startswith("sha256:") or len(digest) != 71:
                  raise SystemExit("remote image index contains a malformed descriptor digest")
          Path(os.environ["REMOTE_METADATA_PATH"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

          platform_digest="$(python3 -c 'import json, os; print(json.load(open(os.environ["REMOTE_METADATA_PATH"]))["platform_manifest_digest"])')"
          python3 -c 'import json, os; print("\n".join(json.load(open(os.environ["REMOTE_METADATA_PATH"]))["attestation_manifest_digests"]))' > "${output_root}/remote/attestation-digests.txt"
          attestation_index=0
          while IFS= read -r attestation_digest; do
            if [[ ! "${attestation_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Remote attestation descriptor digest is malformed" >&2
              exit 1
            fi
            docker buildx imagetools inspect --raw "${IMAGE_REPOSITORY}@${attestation_digest}" > "${output_root}/remote/attestation-${attestation_index}.json"
            attestation_index=$((attestation_index + 1))
          done < "${output_root}/remote/attestation-digests.txt"

          export REMOTE_DIR="${output_root}/remote"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          predicates = set()
          for path in sorted(Path(os.environ["REMOTE_DIR"]).glob("attestation-*.json")):
              manifest = json.loads(path.read_text(encoding="utf-8"))
              for layer in manifest.get("layers") or []:
                  predicate = (layer.get("annotations") or {}).get("in-toto.io/predicate-type")
                  if predicate:
                      predicates.add(predicate)
          if not any(value.startswith("https://slsa.dev/provenance/") for value in predicates):
              raise SystemExit("remote image is missing a SLSA provenance predicate")
          if "https://spdx.dev/Document" not in predicates:
              raise SystemExit("remote image is missing an SPDX SBOM predicate")
          Path(os.environ["REMOTE_DIR"], "attestation-predicates.json").write_text(
              json.dumps(sorted(predicates), indent=2) + "\n", encoding="utf-8"
          )
          PY

          docker buildx imagetools inspect "${IMAGE_REPOSITORY}@${platform_digest}" \
            --format '{{json .Image.Config.Labels}}' > "${output_root}/remote/labels.json"
          export LABELS_PATH="${output_root}/remote/labels.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          labels = json.loads(Path(os.environ["LABELS_PATH"]).read_text(encoding="utf-8"))
          if not isinstance(labels, dict):
              raise SystemExit("remote image labels are missing or malformed")
          expected = {
              "org.opencontainers.image.source": "https://github.com/ArchonMegalon/property",
              "org.opencontainers.image.revision": os.environ["ENVELOPE_SHA"],
              "org.opencontainers.image.version": os.environ["RUNTIME_SHA"],
              "com.propertyquarry.release.runtime-sha": os.environ["RUNTIME_SHA"],
              "com.propertyquarry.release.workflow-envelope-sha": os.environ["ENVELOPE_SHA"],
          }
          mismatches = {
              key: {"expected": value, "observed": labels.get(key)}
              for key, value in expected.items()
              if labels.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"remote image label mismatch: {mismatches}")
          PY

          export PLATFORM_DIGEST="${platform_digest}"
          export RECEIPT_PATH="${output_root}/${COMPONENT}.json"
          export ATTESTATION_PREDICATES_PATH="${output_root}/remote/attestation-predicates.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "schema": "propertyquarry.image_publish_fragment.v1",
              "status": "pass",
              "product": "PropertyQuarry",
              "component": os.environ["COMPONENT"],
              "compose_service": os.environ["SERVICE"],
              "registry": "ghcr.io",
              "image_repository": os.environ["IMAGE_REPOSITORY"],
              "tagged_ref": os.environ["PUBLISHED_TAG"],
              "digest": os.environ["IMAGE_DIGEST"],
              "immutable_ref": f'{os.environ["IMAGE_REPOSITORY"]}@{os.environ["IMAGE_DIGEST"]}',
              "platform": "linux/amd64",
              "platform_manifest_digest": os.environ["PLATFORM_DIGEST"],
              "runtime_commit_sha": os.environ["RUNTIME_SHA"],
              "workflow_envelope_sha": os.environ["ENVELOPE_SHA"],
              "release_hygiene_receipt_sha256": os.environ["HYGIENE_RECEIPT_SHA256"],
              "input_hashes": {
                  "envelope_git_tree_sha1": os.environ["SOURCE_TREE_SHA1"],
                  "envelope_tracked_archive_sha256": os.environ["SOURCE_ARCHIVE_SHA256"],
                  "dockerfile": {"path": os.environ["DOCKERFILE"], "sha256": os.environ["DOCKERFILE_SHA256"]},
                  "dockerignore": {"path": ".dockerignore", "sha256": os.environ["DOCKERIGNORE_SHA256"]},
                  "compose": {"path": "docker-compose.property.yml", "sha256": os.environ["COMPOSE_SHA256"]},
              },
              "compose_build_mapping_verified": True,
              "labels": {
                  "org.opencontainers.image.revision": os.environ["ENVELOPE_SHA"],
                  "org.opencontainers.image.version": os.environ["RUNTIME_SHA"],
                  "com.propertyquarry.release.runtime-sha": os.environ["RUNTIME_SHA"],
                  "com.propertyquarry.release.workflow-envelope-sha": os.environ["ENVELOPE_SHA"],
              },
              "attestations": {
                  "provenance": "mode=max",
                  "sbom": "spdx",
                  "predicates": json.loads(Path(os.environ["ATTESTATION_PREDICATES_PATH"]).read_text(encoding="utf-8")),
              },
              "sigstore_provenance": {
                  "action": "actions/attest@a1948c3f048ba23858d222213b7c278aabede763",
                  "attestation_id": os.environ["SIGSTORE_ATTESTATION_ID"],
                  "attestation_url": os.environ["SIGSTORE_ATTESTATION_URL"],
                  "subject_name": os.environ["IMAGE_REPOSITORY"],
                  "subject_digest": os.environ["IMAGE_DIGEST"],
                  "bundle_sha256": os.environ["SIGSTORE_BUNDLE_SHA256"],
                  "bundle_artifact_path": f'sigstore/{os.environ["COMPONENT"]}-bundle.json',
                  "sigstore_instance": "public-good",
                  "push_to_registry": True,
                  "create_storage_record": False,
              },
              "remote_verification": {
                  "digest_ref_manifest_matches": True,
                  "tag_manifest_matches": True,
                  "labels_match": True,
              },
              "github": {
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                  "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
              },
              "deployment_performed": False,
              "environment_variables_mutated": False,
          }
          Path(os.environ["RECEIPT_PATH"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
      - name: Preserve ${{ matrix.component }} image receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: propertyquarry-image-fragment-${{ matrix.component }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            _completion/propertyquarry_image_publish/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.component }}/${{ matrix.component }}.json
            _completion/propertyquarry_image_publish/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.component }}/sigstore/${{ matrix.component }}-bundle.json
          if-no-files-found: error
          retention-days: 30

  receipt:
    name: Seal the immutable image publication receipt
    needs:
      - preflight
      - build-and-publish
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Re-check the exact workflow envelope
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.envelope_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Confirm the envelope remains clean and authorized
        shell: bash
        env:
          ENVELOPE_SHA: ${{ needs.preflight.outputs.envelope_sha }}
          RUNTIME_SHA: ${{ needs.preflight.outputs.runtime_sha }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" || "$(git rev-parse HEAD)" != "${ENVELOPE_SHA}" ]]; then
            echo "Receipt job is not bound to the authorized main envelope" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo "Receipt checkout must be completely clean" >&2
            exit 1
          fi
          PYTHONPATH=ea python3 scripts/check_property_release_hygiene.py
          observed_runtime="$(PYTHONPATH=ea python3 -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ "${observed_runtime}" != "${RUNTIME_SHA}" ]]; then
            echo "Receipt job manifest runtime does not match the preflight binding" >&2
            exit 1
          fi
      - name: Download image receipt fragments
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: propertyquarry-image-fragment-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/propertyquarry_image_publish/${{ github.run_id }}-${{ github.run_attempt }}/fragments
          merge-multiple: true
      - name: Validate distinct images and seal the machine receipt
        shell: bash
        env:
          ENVELOPE_SHA: ${{ needs.preflight.outputs.envelope_sha }}
          RUNTIME_SHA: ${{ needs.preflight.outputs.runtime_sha }}
          HYGIENE_RECEIPT_SHA256: ${{ needs.preflight.outputs.hygiene_receipt_sha256 }}
        run: |
          set -euo pipefail
          receipt_root="_completion/propertyquarry_image_publish/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          export FRAGMENT_ROOT="${receipt_root}/fragments"
          export RECEIPT_PATH="${receipt_root}/receipt/receipt.json"
          mkdir -p "$(dirname "${RECEIPT_PATH}")"
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import shutil
          from pathlib import Path

          expected = {
              "web": {
                  "image_repository": "ghcr.io/archonmegalon/propertyquarry-web-runtime",
                  "compose_service": "propertyquarry-api",
                  "dockerfile": "ea/Dockerfile.property-web",
              },
              "render": {
                  "image_repository": "ghcr.io/archonmegalon/propertyquarry-render-runtime",
                  "compose_service": "propertyquarry-render-tools",
                  "dockerfile": "ea/Dockerfile.property",
              },
          }
          fragment_paths = sorted(Path(os.environ["FRAGMENT_ROOT"]).glob("*.json"))
          if len(fragment_paths) != 2:
              raise SystemExit(f"expected exactly two image receipt fragments, got {len(fragment_paths)}")
          fragments = {}
          for path in fragment_paths:
              value = json.loads(path.read_text(encoding="utf-8"))
              component = value.get("component")
              if component in fragments or component not in expected:
                  raise SystemExit(f"unexpected or duplicate image component: {component}")
              if value.get("schema") != "propertyquarry.image_publish_fragment.v1" or value.get("status") != "pass":
                  raise SystemExit(f"invalid image receipt fragment: {path.name}")
              contract = expected[component]
              if value.get("registry") != "ghcr.io" or value.get("image_repository") != contract["image_repository"]:
                  raise SystemExit(f"unexpected registry repository for {component}")
              if value.get("compose_service") != contract["compose_service"]:
                  raise SystemExit(f"unexpected compose service for {component}")
              if value.get("compose_build_mapping_verified") is not True:
                  raise SystemExit(f"Compose build mapping was not verified for {component}")
              dockerfile = ((value.get("input_hashes") or {}).get("dockerfile") or {}).get("path")
              if dockerfile != contract["dockerfile"]:
                  raise SystemExit(f"unexpected Dockerfile for {component}")
              digest = value.get("digest")
              if not isinstance(digest, str) or not re.fullmatch(r"sha256:[0-9a-f]{64}", digest):
                  raise SystemExit(f"missing or malformed digest for {component}")
              if value.get("immutable_ref") != f'{contract["image_repository"]}@{digest}':
                  raise SystemExit(f"immutable ref mismatch for {component}")
              if value.get("runtime_commit_sha") != os.environ["RUNTIME_SHA"]:
                  raise SystemExit(f"runtime SHA mismatch for {component}")
              if value.get("workflow_envelope_sha") != os.environ["ENVELOPE_SHA"]:
                  raise SystemExit(f"workflow envelope SHA mismatch for {component}")
              if value.get("release_hygiene_receipt_sha256") != os.environ["HYGIENE_RECEIPT_SHA256"]:
                  raise SystemExit(f"release hygiene receipt mismatch for {component}")
              if value.get("deployment_performed") is not False or value.get("environment_variables_mutated") is not False:
                  raise SystemExit(f"image lane exceeded publication authority for {component}")
              sigstore = value.get("sigstore_provenance")
              if not isinstance(sigstore, dict):
                  raise SystemExit(f"GitHub Sigstore provenance is missing for {component}")
              expected_bundle_path = f"sigstore/{component}-bundle.json"
              if (
                  sigstore.get("action") != "actions/attest@a1948c3f048ba23858d222213b7c278aabede763"
                  or sigstore.get("subject_name") != contract["image_repository"]
                  or sigstore.get("subject_digest") != digest
                  or sigstore.get("bundle_artifact_path") != expected_bundle_path
                  or sigstore.get("push_to_registry") is not True
                  or sigstore.get("create_storage_record") is not False
                  or sigstore.get("sigstore_instance") != "public-good"
                  or not sigstore.get("attestation_id")
                  or not sigstore.get("attestation_url")
              ):
                  raise SystemExit(f"GitHub Sigstore provenance binding is invalid for {component}")
              bundle_path = Path(os.environ["FRAGMENT_ROOT"]) / expected_bundle_path
              if not bundle_path.is_file() or bundle_path.is_symlink():
                  raise SystemExit(f"GitHub Sigstore bundle artifact is missing for {component}")
              observed_bundle_sha256 = hashlib.sha256(bundle_path.read_bytes()).hexdigest()
              if observed_bundle_sha256 != sigstore.get("bundle_sha256"):
                  raise SystemExit(f"GitHub Sigstore bundle hash mismatch for {component}")
              sealed_bundle_path = Path(os.environ["RECEIPT_PATH"]).parent / expected_bundle_path
              sealed_bundle_path.parent.mkdir(parents=True, exist_ok=True)
              shutil.copyfile(bundle_path, sealed_bundle_path)
              fragments[component] = value
          if set(fragments) != set(expected):
              raise SystemExit("web and render image fragments are both required")
          if fragments["web"]["digest"] == fragments["render"]["digest"]:
              raise SystemExit("web and render image digests must be distinct")

          images = {
              component: {
                  "compose_service": value["compose_service"],
                  "image_repository": value["image_repository"],
                  "tagged_ref": value["tagged_ref"],
                  "digest": value["digest"],
                  "immutable_ref": value["immutable_ref"],
                  "platform": value["platform"],
                  "platform_manifest_digest": value["platform_manifest_digest"],
                  "compose_build_mapping_verified": value["compose_build_mapping_verified"],
                  "input_hashes": value["input_hashes"],
                  "labels": value["labels"],
                  "attestations": value["attestations"],
                  "sigstore_provenance": value["sigstore_provenance"],
                  "remote_verification": value["remote_verification"],
              }
              for component, value in sorted(fragments.items())
          }
          payload = {
              "schema": "propertyquarry.image_publish_receipt.v1",
              "status": "pass",
              "product": "PropertyQuarry",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "branch": "main",
              "runtime_commit_sha": os.environ["RUNTIME_SHA"],
              "workflow_envelope_sha": os.environ["ENVELOPE_SHA"],
              "release_hygiene_receipt_sha256": os.environ["HYGIENE_RECEIPT_SHA256"],
              "images": images,
              "github": {
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                  "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
              },
              "deployment_performed": False,
              "environment_variables_mutated": False,
              "promotion_authority_granted": False,
          }
          output = Path(os.environ["RECEIPT_PATH"])
          output.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Preserve immutable image publication receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: propertyquarry-image-publish-receipt-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/propertyquarry_image_publish/${{ github.run_id }}-${{ github.run_attempt }}/receipt
          if-no-files-found: error
          retention-days: 90
