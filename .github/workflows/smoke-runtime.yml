name: Smoke Runtime

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  property-security-posture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx

      - name: Run Security And Isolation Gates
        run: |
          PYTHONPATH=ea python scripts/verify_env_no_secrets.py
          PYTHONPATH=ea python scripts/check_property_security_posture.py
          PYTHONPATH=ea python scripts/check_property_repo_isolation.py

  security-static:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Security Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit semgrep

      - name: Run pip-audit
        run: |
          pip-audit -r ea/requirements.lock

      - name: Run Bandit
        run: |
          bandit -q ea/app/api/routes/public_tours.py ea/app/api/routes/product_api_contracts.py ea/app/api/app.py

      - name: Run Semgrep Security Audit
        run: |
          semgrep scan --config p/security-audit --error ea/app/api/routes/public_tours.py ea/app/api/routes/product_api_contracts.py ea/app/api/app.py

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ea/Dockerfile.property
          failure-threshold: error
          ignore: DL3008

  browser-surface-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx

      - name: Run Browser Surface Contracts
        run: |
          PYTHONPATH=.:ea pytest -q tests/test_providers_api_contracts.py tests/test_browser_surface_contracts.py tests/test_product_projection_contracts.py tests/test_product_api_contracts.py tests/test_commitment_candidate_review_contracts.py tests/test_product_support_contracts.py tests/test_product_browser_journeys.py tests/test_product_entitlement_contracts.py tests/test_admin_surface_runtime_contracts.py tests/test_fixture_scenarios.py

  product-browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx
          python -m playwright install --with-deps chromium

      - name: Run Product Browser E2E
        run: |
          PYTHONPATH=.:ea python -m pytest -q tests/e2e/test_product_workflows.py

  smoke-runtime-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx
          python -m playwright install --with-deps chromium

      - name: Run CI Gate Bundle
        run: |
          make ci-gates

      - name: Run PropertyQuarry Release Gates
        run: |
          make property-release-gates

  generated-release-artifacts-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pyyaml
          python -m playwright install --with-deps chromium

      - name: Verify generated release artifacts are committed cleanly
        run: |
          make verify-generated-release-artifacts-clean


  smoke-runtime-postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Postgres Smoke Script
        run: |
          bash scripts/smoke_postgres.sh

  smoke-runtime-postgres-legacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Legacy Migration Regression Smoke
        run: |
          bash scripts/smoke_postgres.sh --legacy-fixture

  postgres-runtime-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx

      - name: Run Postgres Repository Contract Tests
        run: |
          bash scripts/test_postgres_contracts.sh
