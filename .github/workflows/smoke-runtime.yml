name: smoke-runtime

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  property-security-posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check property security posture
        run: PYTHONPATH=ea python scripts/check_property_security_posture.py

  security-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run local release asset and hygiene checks
        run: |
          PYTHONPATH=ea python scripts/check_property_release_hygiene.py
          PYTHONPATH=ea python scripts/check_property_repo_isolation.py

  smoke-runtime-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock httpx==0.28.1 opencv-python-headless==4.13.0.92 pytest==9.0.2
          python -m playwright install --with-deps chromium
      - name: Run core CI gates
        run: make ci-gates

  propertyquarry-browser-contracts:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock httpx==0.28.1 pytest==9.0.2
          python -m playwright install --with-deps chromium
      - name: Run local PropertyQuarry browser contracts
        run: |
          PYTHONPATH=ea EA_STORAGE_BACKEND=memory python -m pytest -q \
            tests/e2e/test_propertyquarry_greenfield_browser.py \
            tests/e2e/test_propertyquarry_public_tour_browser.py

  propertyquarry-live-release-gates:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      PROPERTYQUARRY_LIVE_MOBILE_BASE_URL: ${{ vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install release gate dependencies
        run: |
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock
          python -m playwright install --with-deps chromium
      - name: Require protected live release inputs
        shell: bash
        run: |
          set -euo pipefail
          : "${PROPERTYQUARRY_LIVE_MOBILE_BASE_URL:?Missing GitHub environment variable PROPERTYQUARRY_LIVE_MOBILE_BASE_URL}"
      - name: Run protected PropertyQuarry live release gates
        env:
          EA_API_TOKEN: ${{ secrets.PROPERTYQUARRY_LIVE_API_TOKEN }}
          PROPERTYQUARRY_LIVE_RESEARCH_DETAIL_ROUTE: ${{ secrets.PROPERTYQUARRY_LIVE_RESEARCH_DETAIL_ROUTE }}
          PROPERTYQUARRY_LIVE_PRINCIPAL_ID: ${{ secrets.PROPERTYQUARRY_LIVE_PRINCIPAL_ID }}
          PROPERTYQUARRY_EXPECTED_RELEASE_COMMIT_SHA: ${{ github.sha }}
          PROPERTYQUARRY_EXPECTED_RELEASE_BRANCH: main
        run: bash scripts/propertyquarry_live_release_gates.sh

  smoke-runtime-postgres:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: propertyquarry-ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare external smoke volume
        run: docker volume create property_propertyquarry_public_tours >/dev/null
      - name: Run Postgres runtime smoke
        run: bash scripts/smoke_postgres.sh
      - name: Run legacy migration Postgres smoke
        run: bash scripts/smoke_postgres.sh --legacy-fixture

  postgres-runtime-contracts:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: propertyquarry-ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Postgres contract dependencies
        run: python -m pip install -r ea/requirements.txt -c ea/requirements.lock httpx==0.28.1 pytest==9.0.2
      - name: Run Postgres repository contracts
        run: bash scripts/test_postgres_contracts.sh
