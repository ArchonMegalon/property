name: Smoke Runtime

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  property-security-posture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx

      - name: Run Security And Isolation Gates
        run: |
          PYTHONPATH=ea python scripts/verify_env_no_secrets.py
          PYTHONPATH=ea python scripts/check_property_security_posture.py
          PYTHONPATH=ea python scripts/check_property_repo_isolation.py

  security-static:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Security Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit semgrep

      - name: Run pip-audit
        run: |
          pip-audit -r ea/requirements.lock

      - name: Run Bandit
        run: |
          bandit -q ea/app/api/routes/public_tours.py ea/app/api/routes/product_api_contracts.py ea/app/api/app.py

      - name: Run Semgrep Security Audit
        run: |
          semgrep scan --config p/security-audit --error ea/app/api/routes/public_tours.py ea/app/api/routes/product_api_contracts.py ea/app/api/app.py

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ea/Dockerfile.property
          failure-threshold: error
          ignore: DL3008

  browser-surface-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx

      - name: Run Browser Surface Contracts
        run: |
          PYTHONPATH=.:ea pytest -q tests/test_providers_api_contracts.py -k "public_tour_routes"
          PYTHONPATH=.:ea pytest -q tests/test_property_market_catalog.py
          PYTHONPATH=.:ea pytest -q tests/test_product_api_contracts.py -k "preference_profile_endpoints_and_willhaben_assessment_flow or property_search_run_blocks_free_plan_when_limits_exceed_free_tier or property_search_run_allows_free_plan_across_multiple_platforms_when_result_cap_is_respected"
          PYTHONPATH=.:ea pytest -q tests/test_product_browser_journeys.py -k "properties_workspace_surface or propertyquarry_settings_hide_generic_google_sync_metrics or propertyquarry_host_renders_branded_public_surfaces or propertyquarry_repo_defaults_to_property_brand_without_host_header"

  product-browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx
          python -m playwright install --with-deps chromium

      - name: Run Product Browser E2E
        run: |
          PYTHONPATH=.:ea python -m pytest -q tests/e2e/test_propertyquarry_greenfield_browser.py

  smoke-runtime-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx
          python -m playwright install --with-deps chromium

      - name: Run CI Gate Bundle
        run: |
          make property-release-gates

  generated-release-artifacts-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pyyaml
          python -m playwright install --with-deps chromium

      - name: Verify generated release artifacts are committed cleanly
        run: |
          make verify-generated-release-artifacts-clean


  smoke-runtime-postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Property Postgres Smoke Script
        run: |
          bash scripts/smoke_property_postgres.sh

  postgres-runtime-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock pytest httpx

      - name: Run Property Postgres Contract Tests
        run: |
          bash scripts/test_property_postgres_contracts.sh
