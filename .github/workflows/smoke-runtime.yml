      - smoke-runtime-postgres
      - postgres-runtime-contracts
    if: ${{ always() }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Require every ordinary CI, browser, PostgreSQL, and static lane to pass
        env:
          PROPERTYQUARRY_ORDINARY_CI_RESULTS: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          results = json.loads(os.environ["PROPERTYQUARRY_ORDINARY_CI_RESULTS"])
          failed = {
              name: str(details.get("result") or "missing")
              for name, details in results.items()
              if not isinstance(details, dict) or details.get("result") != "success"
          }
          if failed:
              raise SystemExit(
                  "ordinary PropertyQuarry CI aggregate blocked: "
                  + ", ".join(f"{name}={result}" for name, result in sorted(failed.items()))
              )
          print("ok: all ordinary PropertyQuarry CI lanes passed")
          PY

  propertyquarry-release-v2:
    needs:
      - propertyquarry-protected-dispatch-inputs
      - propertyquarry-ordinary-ci-success
      - propertyquarry-flagship-security
      - propertyquarry-security-bootstrap-attestation
      - propertyquarry-continuous-ux
    if: ${{ always() && github.event_name == 'workflow_dispatch' && github.repository == 'ArchonMegalon/property' && github.ref == 'refs/heads/main' && inputs.run_launch_authority == true && inputs.run_activation_journey != true && needs['propertyquarry-protected-dispatch-inputs'].result == 'success' && needs['propertyquarry-ordinary-ci-success'].result == 'success' && needs['propertyquarry-flagship-security'].result == 'success' && needs['propertyquarry-security-bootstrap-attestation'].result == 'success' && needs['propertyquarry-continuous-ux'].result == 'success' }}
    timeout-minutes: 180
    concurrency:
      group: propertyquarry-release-lifecycle-v2
      cancel-in-progress: false
    environment:
      name: propertyquarry-production
    permissions:
      contents: none
      id-token: write
    runs-on: [self-hosted, propertyquarry-release-controller-v2]
    env:
      BASH_ENV: /dev/null
      ENV: /dev/null
      LD_PRELOAD: ""
      LD_LIBRARY_PATH: ""
      LD_AUDIT: ""
      GCONV_PATH: ""
      PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256: ${{ needs['propertyquarry-security-bootstrap-attestation'].outputs.attestation_sha256 }}
      PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID: ${{ needs['propertyquarry-security-bootstrap-attestation'].outputs.bootstrap_run_id }}
      PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST: ${{ needs['propertyquarry-security-bootstrap-attestation'].outputs.bootstrap_artifact_digest }}
    steps:
      - name: Request non-authorizing release preflight from the installed supervisor
        shell: /bin/bash --noprofile --norc -p -euo pipefail {0}
        run: |
          [[ "${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256}" =~ ^[0-9a-f]{64}$ ]]
          [[ "${PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          exec 9<<<"${ACTIONS_ID_TOKEN_REQUEST_TOKEN:?missing GitHub OIDC bearer}"
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN
          exec /usr/bin/env -i \
            PATH=/usr/sbin:/usr/bin:/sbin:/bin \
            HOME=/nonexistent \
            LANG=C \
            LC_ALL=C \
            ACTIONS_ID_TOKEN_REQUEST_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}" \
            PROPERTYQUARRY_OIDC_TOKEN_FD=9 \
            GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            GITHUB_REF="${GITHUB_REF}" \
            GITHUB_SHA="${GITHUB_SHA}" \
            GITHUB_WORKFLOW_REF="${GITHUB_WORKFLOW_REF}" \
            GITHUB_WORKFLOW_SHA="${GITHUB_WORKFLOW_SHA}" \
            GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            GITHUB_RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}" \
            GITHUB_JOB="${GITHUB_JOB}" \
            PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256="${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256}" \
            PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID="${PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID}" \
            PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST="${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST}" \
            /usr/libexec/propertyquarry-release-control/propertyquarry-release-supervisor-v2 \
              release-preflight
      - name: Request the atomic release lifecycle from the installed supervisor
        shell: /bin/bash --noprofile --norc -p -euo pipefail {0}
        run: |
          [[ "${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256}" =~ ^[0-9a-f]{64}$ ]]
          [[ "${PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          exec 9<<<"${ACTIONS_ID_TOKEN_REQUEST_TOKEN:?missing GitHub OIDC bearer}"
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN
          exec /usr/bin/env -i \
            PATH=/usr/sbin:/usr/bin:/sbin:/bin \
            HOME=/nonexistent \
            LANG=C \
            LC_ALL=C \
            ACTIONS_ID_TOKEN_REQUEST_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}" \
            PROPERTYQUARRY_OIDC_TOKEN_FD=9 \
            GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            GITHUB_REF="${GITHUB_REF}" \
            GITHUB_SHA="${GITHUB_SHA}" \
            GITHUB_WORKFLOW_REF="${GITHUB_WORKFLOW_REF}" \
            GITHUB_WORKFLOW_SHA="${GITHUB_WORKFLOW_SHA}" \
            GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            GITHUB_RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}" \
            GITHUB_JOB="${GITHUB_JOB}" \
            PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256="${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ATTESTATION_SHA256}" \
            PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID="${PROPERTYQUARRY_SECURITY_BOOTSTRAP_RUN_ID}" \
            PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST="${PROPERTYQUARRY_SECURITY_BOOTSTRAP_ARTIFACT_DIGEST}" \
            /usr/libexec/propertyquarry-release-control/propertyquarry-release-supervisor-v2 \
              release-run

  propertyquarry-activation-request-inert:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_activation_journey == true }}
    permissions:
      contents: none
    runs-on: ubuntu-latest
    steps:
      - name: Reject activation requests until the v2 supervisor is authoritative
        run: |
          echo "Protected activation is non-authoritative and inert in this candidate; no activation was attempted." >&2
          exit 1

  propertyquarry-requested-action-result:
    needs:
      - propertyquarry-protected-dispatch-inputs
      - propertyquarry-flagship-security
      - propertyquarry-security-bootstrap-attestation
      - propertyquarry-release-v2
      - propertyquarry-activation-request-inert
    if: ${{ always() && github.event_name == 'workflow_dispatch' && (inputs.run_launch_authority == true || inputs.run_activation_journey == true) }}
    permissions:
      contents: none
    runs-on: ubuntu-latest
    env:
      PROPERTYQUARRY_REQUESTED_ACTION_NEEDS: ${{ toJSON(needs) }}
      PROPERTYQUARRY_REQUESTED_ACTIVATION: ${{ inputs.run_activation_journey }}
      PROPERTYQUARRY_REQUESTED_LAUNCH: ${{ inputs.run_launch_authority }}
      PROPERTYQUARRY_REQUEST_REPOSITORY: ${{ github.repository }}
      PROPERTYQUARRY_REQUEST_REF: ${{ github.ref }}
    steps:
      - name: Require every requested protected action to finish successfully
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["PROPERTYQUARRY_REQUESTED_ACTION_NEEDS"])
          activation_requested = os.environ["PROPERTYQUARRY_REQUESTED_ACTIVATION"].lower() == "true"
          launch_requested = os.environ["PROPERTYQUARRY_REQUESTED_LAUNCH"].lower() == "true"
          failures = []
          if os.environ["PROPERTYQUARRY_REQUEST_REPOSITORY"] != "ArchonMegalon/property":
              failures.append("protected_action_requested_outside_canonical_repository")
          if os.environ["PROPERTYQUARRY_REQUEST_REF"] != "refs/heads/main":
              failures.append("protected_action_requested_outside_canonical_main")
          if activation_requested:
              failures.append("protected_activation_requested_while_v2_activation_is_inert")
          if launch_requested:
              for job_name in (
                  "propertyquarry-protected-dispatch-inputs",
                  "propertyquarry-flagship-security",
                  "propertyquarry-security-bootstrap-attestation",
                  "propertyquarry-release-v2",
              ):
                  result = str((needs.get(job_name) or {}).get("result") or "missing")
                  if result != "success":
                      failures.append(f"{job_name}={result}")
          if failures:
              raise SystemExit(
                  "requested protected action did not complete: " + ", ".join(failures)
              )
          print("ok: every requested protected action completed successfully")
          PY

  # Legacy candidate-executed production jobs are retained only as inert
  # migration history. The installed v2 supervisor above is the sole release path.
  propertyquarry-live-release-gates:
    needs:
      - propertyquarry-ordinary-ci-success
      - propertyquarry-flagship-security
      - propertyquarry-continuous-ux
    if: ${{ false }}
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      PROPERTYQUARRY_LIVE_MOBILE_BASE_URL: ${{ vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
      PROPERTYQUARRY_CONTINUOUS_UX_RECEIPT: _completion/smoke/propertyquarry-continuous-ux-${{ github.sha }}.json
      PROPERTYQUARRY_WORKFLOW_HEAD_SHA: ${{ github.sha }}
      PROPERTYQUARRY_WORKFLOW_RUN_ID: ${{ github.run_id }}
      PROPERTYQUARRY_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
      PROPERTYQUARRY_EXPECTED_RELEASE_REPOSITORY: ArchonMegalon/property
      PROPERTYQUARRY_EXPECTED_RELEASE_PUBLIC_ORIGIN: ${{ vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
      PROPERTYQUARRY_EXPECTED_RELEASE_BRANCH: main
      PROPERTYQUARRY_EXPECTED_RELEASE_ARTIFACT_SET: ${{ vars.PROPERTYQUARRY_RELEASE_ARTIFACT_SET }}
      PROPERTYQUARRY_EXPECTED_RELEASE_LABEL: ${{ vars.PROPERTYQUARRY_RELEASE_LABEL }}
      PROPERTYQUARRY_EXPECTED_RELEASE_GENERATED_AT: ${{ vars.PROPERTYQUARRY_RELEASE_GENERATED_AT }}
      PROPERTYQUARRY_EXPECTED_REPLICA_ID: ${{ vars.PROPERTYQUARRY_EXPECTED_REPLICA_ID }}
      PROPERTYQUARRY_EXPECTED_WEB_IMAGE: ${{ vars.PROPERTYQUARRY_WEB_IMAGE }}
      PROPERTYQUARRY_EXPECTED_RENDER_IMAGE: ${{ vars.PROPERTYQUARRY_RENDER_IMAGE }}
      PROPERTYQUARRY_RELEASE_SECURITY_RECEIPT: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}/receipt.json
      PROPERTYQUARRY_RELEASE_SECURITY_WORKFLOW_BINDING: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}/workflow-binding.json
      PROPERTYQUARRY_EVIDENCE_OVERLAY_RECEIPT: _completion/smoke/property-evidence-overlay-read-model.json
      PROPERTYQUARRY_EXPECTED_TEABLE_ORIGIN: ${{ vars.PROPERTYQUARRY_EXPECTED_TEABLE_ORIGIN }}
      PROPERTYQUARRY_EXPECTED_TEABLE_BASE_ID_SHA256: ${{ vars.PROPERTYQUARRY_EXPECTED_TEABLE_BASE_ID_SHA256 }}
      PROPERTYQUARRY_RYBBIT_EVIDENCE_RECEIPT: _completion/smoke/property-rybbit-delivery.json
      PROPERTYQUARRY_RYBBIT_ORIGIN: ${{ vars.PROPERTYQUARRY_RYBBIT_ORIGIN }}
      PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256: ${{ vars.PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Restore current-run release security evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: propertyquarry-release-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}
      - name: Restore candidate-bound continuous UX evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: propertyquarry-continuous-ux-${{ github.sha }}
          path: _completion/smoke
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install release gate dependencies
        run: |
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock
          python -m playwright install --with-deps chromium firefox webkit
          npm install --no-save --ignore-scripts axe-core@4.10.2
      - name: Verify candidate-bound continuous UX evidence with Gold policy
        shell: bash
        run: |
          set -euo pipefail
          runtime_sha="$(PYTHONPATH=ea python -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "PropertyQuarry manifest runtime SHA is missing or malformed" >&2
            exit 1
          fi
          export PROPERTYQUARRY_MANIFEST_RUNTIME_SHA="${runtime_sha}"
          PYTHONPATH=ea python - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts.propertyquarry_gold_status import _flagship_continuous_ux_proof

          receipt_path = Path(os.environ["PROPERTYQUARRY_CONTINUOUS_UX_RECEIPT"])
          payload = json.loads(receipt_path.read_text(encoding="utf-8"))
          visual_baseline = payload.get("visual_baseline")
          if not isinstance(visual_baseline, dict):
              raise SystemExit("candidate-bound visual baseline evidence is missing")
          source_binding = visual_baseline.get("source_binding")
          if not isinstance(source_binding, dict) or source_binding.get("head_commit") != os.environ["PROPERTYQUARRY_WORKFLOW_HEAD_SHA"]:
              raise SystemExit("visual capture workflow head does not match this release run")
          ready, _details = _flagship_continuous_ux_proof(
              payload,
              expected_release_commit_sha=os.environ["PROPERTYQUARRY_MANIFEST_RUNTIME_SHA"],
          )
          if not ready:
              raise SystemExit("candidate-bound continuous UX evidence failed Gold policy")
          print("ok: candidate-bound continuous UX evidence")
          PY
          echo "PROPERTYQUARRY_EXPECTED_RELEASE_COMMIT_SHA=${runtime_sha}" >> "${GITHUB_ENV}"
          echo "PROPERTYQUARRY_EXPECTED_RELEASE_DEPLOYMENT_ID=propertyquarry-governed-deploy-${runtime_sha:0:12}" >> "${GITHUB_ENV}"
      - name: Record workflow and runtime candidate binding
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _completion/smoke
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "contract_name": "propertyquarry.workflow_runtime_binding",
              "version": 1,
              "product": "PropertyQuarry",
              "runtime_commit_sha": os.environ["PROPERTYQUARRY_EXPECTED_RELEASE_COMMIT_SHA"],
              "workflow_head_sha": os.environ["PROPERTYQUARRY_WORKFLOW_HEAD_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          Path("_completion/smoke/property-live-workflow-binding.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Require protected live release inputs
        shell: bash
        run: |
          set -euo pipefail
          : "${PROPERTYQUARRY_LIVE_MOBILE_BASE_URL:?Missing GitHub environment variable PROPERTYQUARRY_LIVE_MOBILE_BASE_URL}"
          : "${PROPERTYQUARRY_EXPECTED_RELEASE_DEPLOYMENT_ID:?Missing protected release deployment ID}"
          : "${PROPERTYQUARRY_EXPECTED_RELEASE_ARTIFACT_SET:?Missing protected release artifact set}"
          : "${PROPERTYQUARRY_EXPECTED_RELEASE_LABEL:?Missing protected release label}"
          : "${PROPERTYQUARRY_EXPECTED_RELEASE_GENERATED_AT:?Missing protected release generated time}"
          : "${PROPERTYQUARRY_EXPECTED_REPLICA_ID:?Missing protected API replica identity}"
          : "${PROPERTYQUARRY_EXPECTED_WEB_IMAGE:?Missing digest-pinned web image}"
          : "${PROPERTYQUARRY_EXPECTED_RENDER_IMAGE:?Missing digest-pinned render image}"
          : "${PROPERTYQUARRY_RELEASE_SECURITY_RECEIPT:?Missing current-run security receipt path}"
          : "${PROPERTYQUARRY_RELEASE_SECURITY_WORKFLOW_BINDING:?Missing current-run security workflow binding path}"
          : "${PROPERTYQUARRY_RYBBIT_ORIGIN:?Missing protected Rybbit origin}"
          : "${PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256:?Missing protected Rybbit site identity hash}"
          if [[ ! "${PROPERTYQUARRY_EXPECTED_WEB_IMAGE}" =~ @sha256:[0-9a-fA-F]{64}$ ]]; then
            echo "Protected web image must be digest pinned." >&2
            exit 2
          fi
          if [[ ! "${PROPERTYQUARRY_EXPECTED_RENDER_IMAGE}" =~ @sha256:[0-9a-fA-F]{64}$ ]]; then
            echo "Protected render image must be digest pinned." >&2
            exit 2
          fi
          if [[ "${PROPERTYQUARRY_EXPECTED_WEB_IMAGE}" == "${PROPERTYQUARRY_EXPECTED_RENDER_IMAGE}" ]]; then
            echo "Protected web and render images must have distinct identities." >&2
            exit 2
          fi
          if [[ ! -f "${PROPERTYQUARRY_RELEASE_SECURITY_RECEIPT}" || ! -f "${PROPERTYQUARRY_RELEASE_SECURITY_WORKFLOW_BINDING}" ]]; then
            echo "Current-run security receipt bundle is incomplete." >&2
            exit 2
          fi
          echo "PROPERTYQUARRY_EXPECTED_RELEASE_IMAGE_DIGEST=${PROPERTYQUARRY_EXPECTED_WEB_IMAGE##*@}" >> "${GITHUB_ENV}"
      - name: Run protected PropertyQuarry live release gates
        env:
          BASH_ENV: /dev/null
          ENV: /dev/null
          LD_PRELOAD: ""
          LD_LIBRARY_PATH: ""
          LD_AUDIT: ""
          GCONV_PATH: ""
          DATABASE_URL: ${{ secrets.PROPERTYQUARRY_RELEASE_DATABASE_URL }}
          TEABLE_BASE_URL: ${{ vars.PROPERTYQUARRY_TEABLE_BASE_URL }}
          TEABLE_API_KEY: ${{ secrets.PROPERTYQUARRY_TEABLE_API_KEY }}
          PROPERTYQUARRY_EVIDENCE_OVERLAY_TEABLE_BASE_ID: ${{ secrets.PROPERTYQUARRY_EVIDENCE_OVERLAY_TEABLE_BASE_ID }}
          PROPERTYQUARRY_RYBBIT_SITE_ID: ${{ secrets.PROPERTYQUARRY_RYBBIT_SITE_ID }}
          PROPERTYQUARRY_RYBBIT_API_KEY: ${{ secrets.PROPERTYQUARRY_RYBBIT_API_KEY }}
          PROPERTYQUARRY_RYBBIT_SITE_API_URL: "${{ format('{0}/api/sites/{1}', vars.PROPERTYQUARRY_RYBBIT_ORIGIN, secrets.PROPERTYQUARRY_RYBBIT_SITE_ID) }}"
          PROPERTYQUARRY_RYBBIT_HAS_DATA_API_URL: "${{ format('{0}/api/sites/{1}/has-data', vars.PROPERTYQUARRY_RYBBIT_ORIGIN, secrets.PROPERTYQUARRY_RYBBIT_SITE_ID) }}"
          PROPERTYQUARRY_RYBBIT_EVENTS_API_URL: "${{ format('{0}/api/sites/{1}/events?page_size=50&past_minutes_start=10&past_minutes_end=0', vars.PROPERTYQUARRY_RYBBIT_ORIGIN, secrets.PROPERTYQUARRY_RYBBIT_SITE_ID) }}"
          PROPERTYQUARRY_LIVE_RESEARCH_DETAIL_ROUTE: ${{ secrets.PROPERTYQUARRY_LIVE_RESEARCH_DETAIL_ROUTE }}
          PROPERTYQUARRY_LIVE_PRINCIPAL_ID: ${{ secrets.PROPERTYQUARRY_LIVE_PRINCIPAL_ID }}
          PROPERTYQUARRY_LIVE_PROBE_SECRET: ${{ secrets.PROPERTYQUARRY_LIVE_PROBE_SECRET }}
          PROPERTYQUARRY_PERFORMANCE_TARGET_URL: ${{ format('{0}/app/search', vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL) }}
          PROPERTYQUARRY_LIVE_TELEGRAM_BOT_TOKEN: ${{ secrets.PROPERTYQUARRY_LIVE_TELEGRAM_BOT_TOKEN }}
          PROPERTYQUARRY_LIVE_TELEGRAM_CHAT_ID: ${{ secrets.PROPERTYQUARRY_LIVE_TELEGRAM_CHAT_ID }}
          PROPERTYQUARRY_ACCESSIBILITY_PUBLIC_TOUR_ROUTE: ${{ vars.PROPERTYQUARRY_ACCESSIBILITY_PUBLIC_TOUR_ROUTE }}
          PROPERTYQUARRY_EXPECTED_RELEASE_BRANCH: main
          PROPERTYQUARRY_LIVE_MOBILE_REQUIRED_BROWSER_ENGINES: chromium,firefox,webkit
          PROPERTYQUARRY_AXE_CORE_PATH: node_modules/axe-core/axe.min.js
        # GitHub has no native secret-to-FD binding. The step environment above
        # replaces inherited loader/shell hooks before process creation; then
        # privileged Bash blocks functions before the gate captures the secret.
        shell: /bin/bash --noprofile --norc -p -e -u -o pipefail {0}
        run: exec /bin/bash --noprofile --norc -p scripts/propertyquarry_live_release_gates.sh
      - name: Preserve protected PropertyQuarry live release evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-live-release-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            _completion/smoke/property-live-workflow-binding.json
            _completion/smoke/property-live-release-provenance.json
            _completion/smoke/property-live-mobile-release-gate.json
            _completion/smoke/property-live-accessibility-release-gate.json
            _completion/smoke/property-live-map-preview-flagship-release-gate.json
            _completion/smoke/property-live-public-release-gate.json
            _completion/smoke/property-live-authenticated-release-gate.json
            _completion/smoke/property-live-notification-delivery.json
            _completion/smoke/property-evidence-overlay-read-model.json
            _completion/smoke/property-rybbit-delivery.json
          if-no-files-found: error
          retention-days: 30

  propertyquarry-live-activation-to-value:
    needs: propertyquarry-live-release-gates
    if: ${{ false }}
    concurrency:
      group: propertyquarry-live-activation-${{ inputs.activation_run_key }}
      cancel-in-progress: false
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      PROPERTYQUARRY_ACTIVATION_LIVE_RUN: "1"
      PROPERTYQUARRY_ACTIVATION_BASE_URL: ${{ vars.PROPERTYQUARRY_ACTIVATION_BASE_URL || vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
      PROPERTYQUARRY_ACTIVATION_ALLOWED_HOST_SUFFIXES: ${{ vars.PROPERTYQUARRY_ACTIVATION_ALLOWED_HOST_SUFFIXES }}
      PROPERTYQUARRY_ACTIVATION_PERSONA_ID: ${{ secrets.PROPERTYQUARRY_ACTIVATION_PERSONA_ID }}
      PROPERTYQUARRY_ACTIVATION_PERSONA_EMAIL: ${{ secrets.PROPERTYQUARRY_ACTIVATION_PERSONA_EMAIL }}
      PROPERTYQUARRY_ACTIVATION_RUN_KEY: ${{ inputs.activation_run_key }}
      PROPERTYQUARRY_ACTIVATION_AUTH_MODE: ${{ vars.PROPERTYQUARRY_ACTIVATION_AUTH_MODE }}
      PROPERTYQUARRY_ACTIVATION_BROWSER_ENGINE: chromium
      PROPERTYQUARRY_ACTIVATION_EXPECTED_ACCOUNT_STATE: existing
      PROPERTYQUARRY_ACTIVATION_ALLOW_ACCOUNT_CREATE: "0"
      PROPERTYQUARRY_ACTIVATION_ALLOW_WALKTHROUGH_REQUEST: ${{ vars.PROPERTYQUARRY_ACTIVATION_ALLOW_WALKTHROUGH_REQUEST }}
      PROPERTYQUARRY_ACTIVATION_SEARCH_COUNTRY_CODE: ${{ vars.PROPERTYQUARRY_ACTIVATION_SEARCH_COUNTRY_CODE }}
      PROPERTYQUARRY_ACTIVATION_SEARCH_REGION_CODE: ${{ vars.PROPERTYQUARRY_ACTIVATION_SEARCH_REGION_CODE }}
      PROPERTYQUARRY_ACTIVATION_SEARCH_LOCATION: ${{ vars.PROPERTYQUARRY_ACTIVATION_SEARCH_LOCATION }}
      PROPERTYQUARRY_ACTIVATION_VISUAL_STYLE: ${{ vars.PROPERTYQUARRY_ACTIVATION_VISUAL_STYLE }}
      PROPERTYQUARRY_ACTIVATION_PROVIDER_PASSWORD: ${{ secrets.PROPERTYQUARRY_ACTIVATION_PROVIDER_PASSWORD }}
      PROPERTYQUARRY_ACTIVATION_IMAP_HOST: ${{ vars.PROPERTYQUARRY_ACTIVATION_IMAP_HOST }}
      PROPERTYQUARRY_ACTIVATION_IMAP_PORT: ${{ vars.PROPERTYQUARRY_ACTIVATION_IMAP_PORT }}
      PROPERTYQUARRY_ACTIVATION_IMAP_USERNAME: ${{ secrets.PROPERTYQUARRY_ACTIVATION_IMAP_USERNAME }}
      PROPERTYQUARRY_ACTIVATION_IMAP_PASSWORD: ${{ secrets.PROPERTYQUARRY_ACTIVATION_IMAP_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Bind activation to the immutable manifest runtime candidate
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=ea python3 scripts/check_property_release_hygiene.py
          runtime_sha="$(PYTHONPATH=ea python3 -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The activation candidate SHA is missing or malformed." >&2
            exit 1
          fi
          git cat-file -e "${runtime_sha}^{commit}"
          echo "PROPERTYQUARRY_RELEASE_COMMIT_SHA=${runtime_sha}" >> "${GITHUB_ENV}"
      - name: Require protected activation inputs
        shell: bash
        run: |
          set -euo pipefail
          : "${PROPERTYQUARRY_ACTIVATION_BASE_URL:?Missing protected activation base URL}"
          : "${PROPERTYQUARRY_ACTIVATION_PERSONA_ID:?Missing protected activation persona ID}"
          : "${PROPERTYQUARRY_ACTIVATION_PERSONA_EMAIL:?Missing protected activation persona email}"
          : "${PROPERTYQUARRY_ACTIVATION_RUN_KEY:?Missing unique activation run key}"
          : "${PROPERTYQUARRY_ACTIVATION_AUTH_MODE:?Missing protected activation auth mode}"
          : "${PROPERTYQUARRY_RELEASE_COMMIT_SHA:?Missing manifest runtime candidate SHA}"
          if [[ ! "${PROPERTYQUARRY_ACTIVATION_RUN_KEY}" =~ ^[A-Za-z0-9][A-Za-z0-9._:-]{7,127}$ ]]; then
            echo "Activation run key must be 8-128 non-PII characters from A-Z, a-z, 0-9, dot, underscore, colon, or hyphen." >&2
            exit 2
          fi
          case "${PROPERTYQUARRY_ACTIVATION_AUTH_MODE}" in
            google)
              : "${PROPERTYQUARRY_ACTIVATION_PROVIDER_PASSWORD:?Missing protected Google persona password}"
              ;;
            email_link)
              : "${PROPERTYQUARRY_ACTIVATION_IMAP_HOST:?Missing protected IMAP host}"
              : "${PROPERTYQUARRY_ACTIVATION_IMAP_USERNAME:?Missing protected IMAP username}"
              : "${PROPERTYQUARRY_ACTIVATION_IMAP_PASSWORD:?Missing protected IMAP password}"
              ;;
            *)
              echo "Activation auth mode must be google or email_link." >&2
              exit 2
              ;;
          esac
      - name: Restore activation idempotency marker
        id: activation-state
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _completion/activation_to_value/run-state.json
          key: propertyquarry-activation-${{ inputs.activation_run_key }}
      - name: Install protected activation journey dependencies
        run: |
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock
          python -m playwright install --with-deps chromium
      - name: Run deployed activation-to-value journey
        run: |
          python scripts/propertyquarry_activation_to_value_live.py \
            --confirm-live \
            --release-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --state-path _completion/activation_to_value/run-state.json \
            --write "_completion/smoke/property-live-activation-to-value-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
      - name: Preserve activation idempotency marker
        if: ${{ always() && steps.activation-state.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _completion/activation_to_value/run-state.json
          key: propertyquarry-activation-${{ inputs.activation_run_key }}
      - name: Preserve protected activation receipt
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-live-activation-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/smoke/property-live-activation-to-value-*.json
          if-no-files-found: error
          retention-days: 30

  propertyquarry-launch-controller-preflight:
    needs:
      - propertyquarry-live-release-gates
      - propertyquarry-live-activation-to-value
    if: ${{ false }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      PROPERTYQUARRY_LIVE_RELEASE_RESULT: ${{ needs['propertyquarry-live-release-gates'].result }}
      PROPERTYQUARRY_LIVE_ACTIVATION_RESULT: ${{ needs['propertyquarry-live-activation-to-value'].result }}
      PROPERTYQUARRY_RELEASE_CONTROLLER_READY: ${{ vars.PROPERTYQUARRY_RELEASE_CONTROLLER_READY }}
      PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256: ${{ vars.PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256 }}
    steps:
      - name: Require an attested controller and successful same-run live evidence
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${PROPERTYQUARRY_LIVE_RELEASE_RESULT}" != "success" ]]; then
            echo "Final launch authority requires successful same-run live release gates." >&2
            exit 1
          fi
          if [[ "${PROPERTYQUARRY_LIVE_ACTIVATION_RESULT}" != "success" ]]; then
            echo "Final launch authority requires the successful same-run deployed activation journey." >&2
            exit 1
          fi
          if [[ "${PROPERTYQUARRY_RELEASE_CONTROLLER_READY}" != "true" ]]; then
            echo "The governed PropertyQuarry release controller is not attested ready." >&2
            exit 1
          fi
          if [[ ! "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "The governed release-controller bundle SHA-256 is missing or malformed." >&2
            exit 1
          fi
          echo "ok: same-run live evidence and governed controller preflight passed"

  propertyquarry-launch-gold:
    needs: propertyquarry-launch-controller-preflight
    if: ${{ false }}
    concurrency:
      group: propertyquarry-launch-authority
      cancel-in-progress: false
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: [self-hosted, propertyquarry-release-controller]
    env:
      PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256: ${{ vars.PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256 }}
      PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH: ${{ vars.PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH }}
      PROPERTYQUARRY_DR_BACKUP_RECEIPT: ${{ vars.PROPERTYQUARRY_DR_BACKUP_RECEIPT }}
      PROPERTYQUARRY_DR_RESTORE_RECEIPT: ${{ vars.PROPERTYQUARRY_DR_RESTORE_RECEIPT }}
      PROPERTYQUARRY_SLO_METRICS_SNAPSHOT: ${{ vars.PROPERTYQUARRY_SLO_METRICS_SNAPSHOT }}
      PROPERTYQUARRY_SLO_METRICS_PROBE_RECEIPT: ${{ vars.PROPERTYQUARRY_SLO_METRICS_PROBE_RECEIPT }}
      PROPERTYQUARRY_MONITORING_RUNTIME_RECEIPT: ${{ vars.PROPERTYQUARRY_MONITORING_RUNTIME_RECEIPT }}
      PROPERTYQUARRY_PROMETHEUS_RANGE_RECEIPT: ${{ vars.PROPERTYQUARRY_PROMETHEUS_RANGE_RECEIPT }}
      PROPERTYQUARRY_PROMETHEUS_RANGE_RESPONSE: ${{ vars.PROPERTYQUARRY_PROMETHEUS_RANGE_RESPONSE }}
      PROPERTYQUARRY_ALERT_DELIVERY_RECEIPT: ${{ vars.PROPERTYQUARRY_ALERT_DELIVERY_RECEIPT }}
      PROPERTYQUARRY_FAILURE_STATE_RECEIPT: ${{ vars.PROPERTYQUARRY_FAILURE_STATE_RECEIPT }}
      PROPERTYQUARRY_PROVIDER_CATALOG_RECEIPT: ${{ vars.PROPERTYQUARRY_PROVIDER_CATALOG_RECEIPT }}
      PROPERTYQUARRY_CONTINUOUS_UX_RECEIPT: _completion/smoke/propertyquarry-continuous-ux-${{ github.sha }}.json
      PROPERTYQUARRY_ACTIVATION_TO_VALUE_RECEIPT: _completion/smoke/property-live-activation-to-value-${{ github.run_id }}-${{ github.run_attempt }}.json
      PROPERTYQUARRY_EVIDENCE_OVERLAY_RECEIPT: _completion/smoke/property-evidence-overlay-read-model.json
      PROPERTYQUARRY_EXPECTED_TEABLE_ORIGIN: ${{ vars.PROPERTYQUARRY_EXPECTED_TEABLE_ORIGIN }}
      PROPERTYQUARRY_EXPECTED_TEABLE_BASE_ID_SHA256: ${{ vars.PROPERTYQUARRY_EXPECTED_TEABLE_BASE_ID_SHA256 }}
      PROPERTYQUARRY_RYBBIT_EVIDENCE_RECEIPT: _completion/smoke/property-rybbit-delivery.json
      PROPERTYQUARRY_PUBLIC_ORIGIN: ${{ vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
      PROPERTYQUARRY_EXPECTED_RELEASE_PUBLIC_ORIGIN: ${{ vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
      PROPERTYQUARRY_EXPECTED_RELEASE_REPOSITORY: ArchonMegalon/property
      PROPERTYQUARRY_EXPECTED_RELEASE_BRANCH: main
      PROPERTYQUARRY_EXPECTED_RELEASE_ARTIFACT_SET: ${{ vars.PROPERTYQUARRY_RELEASE_ARTIFACT_SET }}
      PROPERTYQUARRY_EXPECTED_RELEASE_LABEL: ${{ vars.PROPERTYQUARRY_RELEASE_LABEL }}
      PROPERTYQUARRY_EXPECTED_RELEASE_GENERATED_AT: ${{ vars.PROPERTYQUARRY_RELEASE_GENERATED_AT }}
      PROPERTYQUARRY_EXPECTED_REPLICA_ID: ${{ vars.PROPERTYQUARRY_EXPECTED_REPLICA_ID }}
      PROPERTYQUARRY_EXPECTED_WEB_IMAGE: ${{ vars.PROPERTYQUARRY_WEB_IMAGE }}
      PROPERTYQUARRY_EXPECTED_RENDER_IMAGE: ${{ vars.PROPERTYQUARRY_RENDER_IMAGE }}
      PROPERTYQUARRY_RELEASE_SECURITY_RECEIPT: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}/receipt.json
      PROPERTYQUARRY_RELEASE_SECURITY_WORKFLOW_BINDING: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}/workflow-binding.json
      PROPERTYQUARRY_WORKFLOW_HEAD_SHA: ${{ github.sha }}
      PROPERTYQUARRY_WORKFLOW_RUN_ID: ${{ github.run_id }}
      PROPERTYQUARRY_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
      PROPERTYQUARRY_LIVE_MOBILE_BASE_URL: ${{ vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL }}
      PROPERTYQUARRY_RYBBIT_ORIGIN: ${{ vars.PROPERTYQUARRY_RYBBIT_ORIGIN }}
      PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256: ${{ vars.PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256 }}
      PROPERTYQUARRY_LIVE_MOBILE_REQUIRED_BROWSER_ENGINES: chromium,firefox,webkit
      PROPERTYQUARRY_AXE_CORE_PATH: node_modules/axe-core/axe.min.js
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Restore current-run release security evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: propertyquarry-release-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}
      - name: Restore candidate-bound continuous UX evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: propertyquarry-continuous-ux-${{ github.sha }}
          path: _completion/smoke
      - name: Restore same-run deployed activation evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: propertyquarry-live-activation-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/smoke
      - name: Restore same-run protected live-release evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: propertyquarry-live-release-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/smoke
      - name: Bind the governed controller and immutable release candidate
        shell: bash
        run: |
          set -euo pipefail
          : "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH:?Missing release-controller bundle path}"
          if [[ ! -f "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH}" || -L "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH}" ]]; then
            echo "The governed release-controller bundle must be a regular non-symlink file." >&2
            exit 1
          fi
          PYTHONPATH=ea python3 scripts/verify_generated_release_artifacts_clean.py
          PYTHONPATH=ea python3 scripts/check_property_release_hygiene.py
          runtime_sha="$(PYTHONPATH=ea python3 -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The release manifest runtime SHA is missing or malformed." >&2
            exit 1
          fi
          git cat-file -e "${runtime_sha}^{commit}"
          if [[ ! "${PROPERTYQUARRY_EXPECTED_WEB_IMAGE}" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "The protected web image must be digest pinned." >&2
            exit 1
          fi
          if [[ ! "${PROPERTYQUARRY_EXPECTED_RENDER_IMAGE}" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "The protected render image must be digest pinned." >&2
            exit 1
          fi
          echo "PROPERTYQUARRY_RELEASE_COMMIT_SHA=${runtime_sha}" >> "${GITHUB_ENV}"
          echo "PROPERTYQUARRY_EXPECTED_RELEASE_COMMIT_SHA=${runtime_sha}" >> "${GITHUB_ENV}"
          echo "PROPERTYQUARRY_EXPECTED_RELEASE_DEPLOYMENT_ID=propertyquarry-governed-deploy-${runtime_sha:0:12}" >> "${GITHUB_ENV}"
          echo "PROPERTYQUARRY_RELEASE_IMAGE_DIGEST=${PROPERTYQUARRY_EXPECTED_WEB_IMAGE##*@}" >> "${GITHUB_ENV}"
          echo "PROPERTYQUARRY_EXPECTED_RELEASE_IMAGE_DIGEST=${PROPERTYQUARRY_EXPECTED_WEB_IMAGE##*@}" >> "${GITHUB_ENV}"
      - name: Run pre-activation launch-profile Gold on the governed controller
        env:
          BASH_ENV: /dev/null
          ENV: /dev/null
          LD_PRELOAD: ""
          LD_LIBRARY_PATH: ""
          LD_AUDIT: ""
          GCONV_PATH: ""
          EA_API_TOKEN: ${{ secrets.PROPERTYQUARRY_LIVE_API_TOKEN }}
          PROPERTYQUARRY_LIVE_PROBE_SECRET: ${{ secrets.PROPERTYQUARRY_LIVE_PROBE_SECRET }}
          PROPERTYQUARRY_PERFORMANCE_TARGET_URL: ${{ format('{0}/app/search', vars.PROPERTYQUARRY_LIVE_MOBILE_BASE_URL) }}
          PROPERTYQUARRY_EXPECTED_RELEASE_MANIFEST_SHA256: ${{ vars.PROPERTYQUARRY_EXPECTED_RELEASE_MANIFEST_SHA256 }}
          PROPERTYQUARRY_EXPECTED_PERFORMANCE_CHROMIUM_EXECUTABLE_PATH: ${{ vars.PROPERTYQUARRY_EXPECTED_PERFORMANCE_CHROMIUM_EXECUTABLE_PATH }}
          PROPERTYQUARRY_EXPECTED_PERFORMANCE_CHROMIUM_EXECUTABLE_SHA256: ${{ vars.PROPERTYQUARRY_EXPECTED_PERFORMANCE_CHROMIUM_EXECUTABLE_SHA256 }}
          DATABASE_URL: ${{ secrets.PROPERTYQUARRY_RELEASE_DATABASE_URL }}
          TEABLE_BASE_URL: ${{ vars.PROPERTYQUARRY_TEABLE_BASE_URL }}
          TEABLE_API_KEY: ${{ secrets.PROPERTYQUARRY_TEABLE_API_KEY }}
          PROPERTYQUARRY_EVIDENCE_OVERLAY_TEABLE_BASE_ID: ${{ secrets.PROPERTYQUARRY_EVIDENCE_OVERLAY_TEABLE_BASE_ID }}
          PROPERTYQUARRY_RYBBIT_SITE_ID: ${{ secrets.PROPERTYQUARRY_RYBBIT_SITE_ID }}
          PROPERTYQUARRY_RYBBIT_API_KEY: ${{ secrets.PROPERTYQUARRY_RYBBIT_API_KEY }}
          PROPERTYQUARRY_RYBBIT_SITE_API_URL: "${{ format('{0}/api/sites/{1}', vars.PROPERTYQUARRY_RYBBIT_ORIGIN, secrets.PROPERTYQUARRY_RYBBIT_SITE_ID) }}"
          PROPERTYQUARRY_RYBBIT_HAS_DATA_API_URL: "${{ format('{0}/api/sites/{1}/has-data', vars.PROPERTYQUARRY_RYBBIT_ORIGIN, secrets.PROPERTYQUARRY_RYBBIT_SITE_ID) }}"
          PROPERTYQUARRY_RYBBIT_EVENTS_API_URL: "${{ format('{0}/api/sites/{1}/events?page_size=50&past_minutes_start=10&past_minutes_end=0', vars.PROPERTYQUARRY_RYBBIT_ORIGIN, secrets.PROPERTYQUARRY_RYBBIT_SITE_ID) }}"
          PROPERTYQUARRY_LIVE_RESEARCH_DETAIL_ROUTE: ${{ secrets.PROPERTYQUARRY_LIVE_RESEARCH_DETAIL_ROUTE }}
          PROPERTYQUARRY_LIVE_PRINCIPAL_ID: ${{ secrets.PROPERTYQUARRY_LIVE_PRINCIPAL_ID }}
          PROPERTYQUARRY_LIVE_TELEGRAM_BOT_TOKEN: ${{ secrets.PROPERTYQUARRY_LIVE_TELEGRAM_BOT_TOKEN }}
          PROPERTYQUARRY_LIVE_TELEGRAM_CHAT_ID: ${{ secrets.PROPERTYQUARRY_LIVE_TELEGRAM_CHAT_ID }}
        # Loader/shell hook overrides apply before the generated runner shell.
        # Keep that script to one privileged exec; the release gate shebang is
        # the second /bin/bash -p boundary.
        shell: /bin/bash --noprofile --norc -p -e -u -o pipefail {0}
        run: exec ./scripts/property_release_gates.sh
      - name: Atomically activate the Gold overlay and issue final launch authority
        env:
          DATABASE_URL: ${{ secrets.PROPERTYQUARRY_RELEASE_DATABASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          overlay_receipt="${PROPERTYQUARRY_EVIDENCE_OVERLAY_RECEIPT}"
          rollback_receipt="_completion/property_gold_status/overlay-activation-rollback.json"
          restore_receipt="_completion/property_gold_status/overlay-activation-restore.json"
          activation_authority_receipt="_completion/property_gold_status/activation-authority.json"
          authority_receipt="_completion/property_gold_status/launch-authority.json"
          gold_receipt="_completion/property_gold_status/release-gate.json"
          live_provenance="_completion/smoke/property-live-release-provenance.json"
          mkdir -p _completion/property_gold_status
          snapshot_id="$(PYTHONPATH=ea python3 - "${overlay_receipt}" <<'PY'
          import re
          import sys
          from pathlib import Path

          from scripts.property_evidence_overlay_read_model import _load_object

          payload = _load_object(Path(sys.argv[1]))
          snapshot_id = str(payload.get("snapshot_id") or "")
          if re.fullmatch(r"[0-9a-f]{64}", snapshot_id) is None:
              raise SystemExit("staged overlay snapshot identity is invalid")
          print(snapshot_id)
          PY
          )"

          PYTHONPATH=ea python3 scripts/propertyquarry_launch_authority.py \
            --authority-phase preactivation \
            --candidate-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --workflow-head-sha "${PROPERTYQUARRY_WORKFLOW_HEAD_SHA}" \
            --workflow-run-id "${PROPERTYQUARRY_WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${PROPERTYQUARRY_WORKFLOW_RUN_ATTEMPT}" \
            --gold-status "${gold_receipt}" \
            --live-provenance "${live_provenance}" \
            --activation-receipt "${PROPERTYQUARRY_ACTIVATION_TO_VALUE_RECEIPT}" \
            --overlay-receipt "${overlay_receipt}" \
            --expected-teable-origin "${PROPERTYQUARRY_EXPECTED_TEABLE_ORIGIN}" \
            --expected-teable-base-id-sha256 "${PROPERTYQUARRY_EXPECTED_TEABLE_BASE_ID_SHA256}" \
            --expected-rybbit-public-origin "${PROPERTYQUARRY_PUBLIC_ORIGIN}" \
            --expected-rybbit-analytics-origin "${PROPERTYQUARRY_RYBBIT_ORIGIN}" \
            --expected-rybbit-site-id-sha256 "${PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256}" \
            --rybbit-receipt "${PROPERTYQUARRY_RYBBIT_EVIDENCE_RECEIPT}" \
            --security-receipt "${PROPERTYQUARRY_RELEASE_SECURITY_RECEIPT}" \
            --security-workflow-binding "${PROPERTYQUARRY_RELEASE_SECURITY_WORKFLOW_BINDING}" \
            --controller-bundle "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH}" \
            --expected-controller-bundle-sha256 "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256}" \
            --write "${activation_authority_receipt}"
          test -s "${activation_authority_receipt}"

          rollback_overlay() {
            original_status="${1:-1}"
            trap - ERR INT TERM
            if [[ -f "${rollback_receipt}" ]]; then
              if ! PYTHONPATH=ea python3 scripts/property_evidence_overlay_read_model.py \
                --restore-activation "${snapshot_id}" \
                --rollback-receipt "${rollback_receipt}" \
                --candidate-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
                --write "${restore_receipt}"; then
                echo "CRITICAL: overlay compare-and-restore failed; preserve all receipts and stop promotion." >&2
              fi
            fi
            exit "${original_status}"
          }
          trap 'rollback_overlay $?' ERR
          trap 'rollback_overlay 130' INT
          trap 'rollback_overlay 143' TERM

          PYTHONPATH=ea python3 scripts/property_evidence_overlay_read_model.py \
            --activate-snapshot "${snapshot_id}" \
            --staged-receipt "${overlay_receipt}" \
            --activation-authority "${activation_authority_receipt}" \
            --workflow-head-sha "${PROPERTYQUARRY_WORKFLOW_HEAD_SHA}" \
            --workflow-run-id "${PROPERTYQUARRY_WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${PROPERTYQUARRY_WORKFLOW_RUN_ATTEMPT}" \
            --rollback-receipt "${rollback_receipt}" \
            --candidate-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --write "${overlay_receipt}"

          PYTHONPATH=ea python3 scripts/propertyquarry_launch_authority.py \
            --authority-phase final \
            --candidate-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --workflow-head-sha "${PROPERTYQUARRY_WORKFLOW_HEAD_SHA}" \
            --workflow-run-id "${PROPERTYQUARRY_WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${PROPERTYQUARRY_WORKFLOW_RUN_ATTEMPT}" \
            --gold-status "${gold_receipt}" \
            --live-provenance "${live_provenance}" \
            --activation-receipt "${PROPERTYQUARRY_ACTIVATION_TO_VALUE_RECEIPT}" \
            --overlay-receipt "${overlay_receipt}" \
            --expected-teable-origin "${PROPERTYQUARRY_EXPECTED_TEABLE_ORIGIN}" \
            --expected-teable-base-id-sha256 "${PROPERTYQUARRY_EXPECTED_TEABLE_BASE_ID_SHA256}" \
            --expected-rybbit-public-origin "${PROPERTYQUARRY_PUBLIC_ORIGIN}" \
            --expected-rybbit-analytics-origin "${PROPERTYQUARRY_RYBBIT_ORIGIN}" \
            --expected-rybbit-site-id-sha256 "${PROPERTYQUARRY_RYBBIT_SITE_ID_SHA256}" \
            --rybbit-receipt "${PROPERTYQUARRY_RYBBIT_EVIDENCE_RECEIPT}" \
            --security-receipt "${PROPERTYQUARRY_RELEASE_SECURITY_RECEIPT}" \
            --security-workflow-binding "${PROPERTYQUARRY_RELEASE_SECURITY_WORKFLOW_BINDING}" \
            --controller-bundle "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_PATH}" \
            --expected-controller-bundle-sha256 "${PROPERTYQUARRY_RELEASE_CONTROLLER_BUNDLE_SHA256}" \
            --activation-authority "${activation_authority_receipt}" \
            --write "${authority_receipt}"
          test -s "${authority_receipt}"
          trap - ERR INT TERM
      - name: Preserve final PropertyQuarry launch authority evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-launch-authority-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            _completion/property_gold_status/release-gate.json
            _completion/property_gold_status/activation-authority.json
            _completion/property_gold_status/launch-authority.json
            _completion/property_gold_status/overlay-activation-rollback.json
            _completion/property_gold_status/overlay-activation-restore.json
            _completion/property_gold_status/launch_evidence/**
            _completion/smoke/property-live-release-provenance.json
            _completion/smoke/property-evidence-overlay-read-model.json
            _completion/smoke/property-rybbit-delivery.json
            _completion/smoke/property-live-activation-to-value-*.json
          if-no-files-found: error
          retention-days: 90

  smoke-runtime-postgres:
    runs-on: ubuntu-latest
    env:
      EA_API_TOKEN: propertyquarry-ci-compose-only-${{ github.run_id }}
      POSTGRES_PASSWORD: propertyquarry-ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare external smoke volume
        run: docker volume create property_propertyquarry_public_tours >/dev/null
      - name: Run Postgres runtime smoke
        run: bash scripts/smoke_postgres.sh
      - name: Run legacy migration Postgres smoke
        run: bash scripts/smoke_postgres.sh --legacy-fixture

  postgres-runtime-contracts:
    runs-on: ubuntu-latest
    env:
      EA_API_TOKEN: propertyquarry-ci-compose-only-${{ github.run_id }}
      POSTGRES_PASSWORD: propertyquarry-ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Postgres contract dependencies
        run: python -m pip install -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpx==0.28.1 pytest==9.0.3
      - name: Run Postgres repository contracts
        run: bash scripts/test_postgres_contracts.sh
