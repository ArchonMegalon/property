name: smoke-runtime

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      security_runner_label:
        description: One-time pqsec-<32 lowercase hex> label bound to the protected security runner
        required: true
        type: string
      security_runner_token_expires_at:
        description: Exact expiration returned with the one-time runner registration token
        required: true
        type: string
      run_activation_journey:
        description: Run the protected deployed activation-to-value journey after environment approval
        required: false
        type: boolean
        default: false
      activation_run_key:
        description: Unique non-PII idempotency key for this activation journey
        required: false
        type: string
        default: ""
      run_launch_authority:
        description: Run final launch-profile Gold on the governed release controller after live activation
        required: false
        type: boolean
        default: false

jobs:
  property-security-posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Check property security posture
        run: PYTHONPATH=ea python scripts/check_property_security_posture.py

  security-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Release hygiene audits every commit between the manifest candidate and HEAD.
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run local release asset and hygiene checks
        run: |
          PYTHONPATH=ea python scripts/check_property_release_hygiene.py
          PYTHONPATH=ea python scripts/check_property_repo_isolation.py

  propertyquarry-protected-dispatch-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: propertyquarry-production
    permissions:
      contents: none
    runs-on: ubuntu-latest
    outputs:
      security_runner_label: ${{ steps.validate.outputs.security_runner_label }}
      security_runner_token_expires_at: ${{ steps.validate.outputs.security_runner_token_expires_at }}
    env:
      PROPERTYQUARRY_DISPATCH_REPOSITORY: ${{ github.repository }}
      PROPERTYQUARRY_DISPATCH_REF: ${{ github.ref }}
      PROPERTYQUARRY_SECURITY_RUNNER_LABEL: ${{ inputs.security_runner_label }}
      PROPERTYQUARRY_SECURITY_RUNNER_TOKEN_EXPIRES_AT: ${{ inputs.security_runner_token_expires_at }}
      PROPERTYQUARRY_APPROVED_SECURITY_RUNNER_LABEL: ${{ vars.PROPERTYQUARRY_SECURITY_RUNNER_LABEL }}
      PROPERTYQUARRY_RUN_ACTIVATION: ${{ inputs.run_activation_journey }}
      PROPERTYQUARRY_RUN_LAUNCH: ${{ inputs.run_launch_authority }}
    steps:
      - name: Validate protected dispatch identity before runner scheduling
        id: validate
        run: |
          python3 - <<'PY'
          import os
          import re
          from datetime import datetime, timezone

          label = os.environ["PROPERTYQUARRY_SECURITY_RUNNER_LABEL"]
          token_expires_at = os.environ[
              "PROPERTYQUARRY_SECURITY_RUNNER_TOKEN_EXPIRES_AT"
          ]
          approved_label = os.environ.get(
              "PROPERTYQUARRY_APPROVED_SECURITY_RUNNER_LABEL", ""
          )
          repository = os.environ["PROPERTYQUARRY_DISPATCH_REPOSITORY"]
          ref = os.environ["PROPERTYQUARRY_DISPATCH_REF"]
          activation_value = os.environ["PROPERTYQUARRY_RUN_ACTIVATION"].lower()
          launch_value = os.environ["PROPERTYQUARRY_RUN_LAUNCH"].lower()
          failures = []
          canonical_token_expires_at = ""
          if re.fullmatch(r"pqsec-[0-9a-f]{32}", label) is None:
              failures.append("security_runner_label_must_be_one_time_pqsec_32_lowercase_hex")
          if re.fullmatch(r"pqsec-[0-9a-f]{32}", approved_label) is None:
              failures.append("protected_environment_security_runner_label_is_missing_or_invalid")
          if label != approved_label:
              failures.append("security_runner_label_does_not_match_protected_environment")
          if re.fullmatch(
              r"[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z",
              token_expires_at,
          ) is None or len(token_expires_at) != 20:
              failures.append("security_runner_token_expiration_is_malformed")
          else:
              try:
                  parsed_expiration = datetime.strptime(
                      token_expires_at, "%Y-%m-%dT%H:%M:%SZ"
                  ).replace(tzinfo=timezone.utc)
                  canonical_token_expires_at = parsed_expiration.strftime(
                      "%Y-%m-%dT%H:%M:%SZ"
                  )
                  if canonical_token_expires_at != token_expires_at:
                      raise ValueError("expiration is not canonical UTC")
                  remaining_seconds = (
                      parsed_expiration - datetime.now(timezone.utc)
                  ).total_seconds()
                  if remaining_seconds < 3000 or remaining_seconds > 3700:
                      failures.append("security_runner_token_expiration_is_outside_window")
              except ValueError:
                  failures.append("security_runner_token_expiration_is_malformed")
          if repository != "ArchonMegalon/property":
              failures.append("protected_dispatch_is_canonical_repository_only")
          if ref != "refs/heads/main":
              failures.append("protected_dispatch_requires_canonical_main")
          if activation_value not in {"true", "false"}:
              failures.append("activation_request_boolean_is_malformed")
          if launch_value not in {"true", "false"}:
              failures.append("launch_request_boolean_is_malformed")
          if failures:
              raise SystemExit("protected dispatch input contract blocked: " + ", ".join(failures))
          def write_output(output, key: str, value: str) -> None:
              if re.fullmatch(r"[A-Za-z_][A-Za-z0-9_]{0,63}", key) is None:
                  raise SystemExit("protected output key is malformed")
              if not 1 <= len(value) <= 256 or "\n" in value or "\r" in value:
                  raise SystemExit("protected output value is unsafe")
              output.write(f"{key}={value}\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              write_output(output, "security_runner_label", approved_label)
              write_output(
                  output,
                  "security_runner_token_expires_at",
                  canonical_token_expires_at,
              )
          print("ok: protected dispatch inputs are canonical and exact")
          PY

  propertyquarry-mirror-role-contract:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Initialize sanitized canonical/mirror evidence
        run: |
          mkdir -p "${RUNNER_TEMP}/propertyquarry_mirror_role"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "schema": "propertyquarry.mirror_role.ci_preflight.v1",
              "product": "PropertyQuarry",
              "observation_scope": "ci_fetch_and_offline_gate",
              "fetch_performed_by_gate": False,
              "network_freshness_proven": False,
              "passed": False,
              "failures": [],
              "operational_errors": ["ci_mirror_fetch_or_gate_not_completed"],
          }
          (Path(os.environ["RUNNER_TEMP"]) / "propertyquarry_mirror_role" / "receipt.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Fetch and prove exact canonical/mirror main identity
        env:
          PROPERTYQUARRY_WORKFLOW_SHA: ${{ github.sha }}
          PROPERTYQUARRY_WORKFLOW_EVENT: ${{ github.event_name }}
          PROPERTYQUARRY_WORKFLOW_REPOSITORY: ${{ github.repository }}
          PROPERTYQUARRY_PR_BASE_REF: ${{ github.base_ref }}
          PROPERTYQUARRY_PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PROPERTYQUARRY_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess

          result = subprocess.run(
              ["git", "config", "--show-origin", "--name-only", "--list"],
              check=True,
              capture_output=True,
              text=True,
          )
          rewrites = []
          for line in result.stdout.splitlines():
              key = line.rsplit("\t", 1)[-1].strip().lower()
              if key.startswith("url.") and (
                  key.endswith(".insteadof") or key.endswith(".pushinsteadof")
              ):
                  rewrites.append(key)
          if rewrites:
              raise SystemExit("refusing mirror fetch while Git URL rewrite rules are configured")
          PY
          git config --unset-all remote.origin.url || true
          git config --unset-all remote.origin.pushurl || true
          git config --add remote.origin.url https://github.com/ArchonMegalon/property.git
          git config --remove-section remote.propertyquarry || true
          git remote add propertyquarry https://github.com/ArchonMegalon/propertyquarry.git
          git fetch --no-tags --prune origin \
            +refs/heads/main:refs/remotes/origin/main
          git fetch --no-tags --prune propertyquarry \
            +refs/heads/main:refs/remotes/propertyquarry/main
          expected_args=()
          candidate_args=()
          case "${PROPERTYQUARRY_WORKFLOW_EVENT}:${PROPERTYQUARRY_WORKFLOW_REPOSITORY}" in
            pull_request:ArchonMegalon/property)
              ;;
            pull_request:ArchonMegalon/propertyquarry)
              if [[ "${PROPERTYQUARRY_PR_BASE_REF}" != "main" ]]; then
                echo "mirror sync PRs must target propertyquarry main" >&2
                exit 1
              fi
              if [[ "${PROPERTYQUARRY_PR_HEAD_REPOSITORY}" != "ArchonMegalon/propertyquarry" ]]; then
                echo "mirror sync PRs must originate in ArchonMegalon/propertyquarry" >&2
                exit 1
              fi
              if [[ ! "${PROPERTYQUARRY_PR_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
                echo "mirror sync PR head SHA is missing or malformed" >&2
                exit 1
              fi
              candidate_args+=(
                --mirror-candidate-ref "${PROPERTYQUARRY_PR_HEAD_SHA}"
                --expected-candidate-sha "${PROPERTYQUARRY_PR_HEAD_SHA}"
              )
              ;;
            push:ArchonMegalon/property|workflow_dispatch:ArchonMegalon/property)
              expected_args+=(--expected-canonical-sha "${PROPERTYQUARRY_WORKFLOW_SHA}")
              ;;
            push:ArchonMegalon/propertyquarry|workflow_dispatch:ArchonMegalon/propertyquarry)
              expected_args+=(--expected-mirror-sha "${PROPERTYQUARRY_WORKFLOW_SHA}")
              ;;
            *)
              echo "unsupported repository/event for canonical mirror proof" >&2
              exit 1
              ;;
          esac
          python3 scripts/check_property_mirror_role.py \
            --require-single-worktree \
            --write "${RUNNER_TEMP}/propertyquarry_mirror_role/receipt.json" \
            "${candidate_args[@]}" \
            "${expected_args[@]}"
      - name: Preserve canonical/mirror identity evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-mirror-role-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/propertyquarry_mirror_role
          if-no-files-found: error
          retention-days: 30

  # Candidate-bound image scan on a one-time protected security runner.
  propertyquarry-flagship-security:
    needs: propertyquarry-protected-dispatch-inputs
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'ArchonMegalon/property' && github.ref == 'refs/heads/main' && startsWith(inputs.security_runner_label, 'pqsec-') && needs['propertyquarry-protected-dispatch-inputs'].result == 'success' && needs['propertyquarry-protected-dispatch-inputs'].outputs.security_runner_label == inputs.security_runner_label }}
    environment:
      name: propertyquarry-production
    permissions:
      contents: read
    runs-on: [self-hosted, propertyquarry-security, "${{ needs['propertyquarry-protected-dispatch-inputs'].outputs.security_runner_label }}"]
    env:
      PROPERTYQUARRY_WORKFLOW_HEAD_SHA: ${{ github.sha }}
      PROPERTYQUARRY_SECURITY_RUNNER_LABEL: ${{ needs['propertyquarry-protected-dispatch-inputs'].outputs.security_runner_label }}
      PROPERTYQUARRY_WEB_IMAGE: ${{ vars.PROPERTYQUARRY_WEB_IMAGE }}
      PROPERTYQUARRY_RENDER_IMAGE: ${{ vars.PROPERTYQUARRY_RENDER_IMAGE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Bind security evidence to the manifest runtime candidate
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=ea python3 scripts/check_property_release_hygiene.py
          runtime_sha="$(PYTHONPATH=ea python3 -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "PropertyQuarry manifest runtime SHA is missing or malformed" >&2
            exit 1
          fi
          git cat-file -e "${runtime_sha}^{commit}"
          export PROPERTYQUARRY_RELEASE_COMMIT_SHA="${runtime_sha}"
          echo "PROPERTYQUARRY_RELEASE_COMMIT_SHA=${runtime_sha}" >> "${GITHUB_ENV}"
          output_root="_completion/propertyquarry_release_security/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "${output_root}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "contract_name": "propertyquarry.workflow_runtime_binding",
              "version": 1,
              "product": "PropertyQuarry",
              "runtime_commit_sha": os.environ["PROPERTYQUARRY_RELEASE_COMMIT_SHA"],
              "workflow_head_sha": os.environ["PROPERTYQUARRY_WORKFLOW_HEAD_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          output = Path("_completion/propertyquarry_release_security") / (
              f"{os.environ['GITHUB_RUN_ID']}-{os.environ['GITHUB_RUN_ATTEMPT']}"
          ) / "workflow-binding.json"
          output.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Gate PropertyQuarry dependencies, images, and SBOMs
        run: |
          set -euo pipefail
          output_root="_completion/propertyquarry_release_security/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python3 scripts/propertyquarry_release_security_gate.py \
            --flagship \
            --release-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --web-image "${PROPERTYQUARRY_WEB_IMAGE}" \
            --render-image "${PROPERTYQUARRY_RENDER_IMAGE}" \
            --severity-threshold HIGH \
            --waivers config/propertyquarry_security_waivers.json \
            --artifacts-dir "${output_root}/artifacts" \
            --receipt "${output_root}/receipt.json"
      - name: Preserve PropertyQuarry security evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-release-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: _completion/propertyquarry_release_security/${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 30

  # A GitHub-hosted verifier binds the successful security job to the exact
  # governed bootstrap. It never schedules self-hosted work and has no write,
  # OIDC, environment-secret, or release authority.
  propertyquarry-security-bootstrap-attestation:
    needs:
      - propertyquarry-protected-dispatch-inputs
      - propertyquarry-flagship-security
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'ArchonMegalon/property' && github.ref == 'refs/heads/main' && needs['propertyquarry-protected-dispatch-inputs'].result == 'success' && needs['propertyquarry-flagship-security'].result == 'success' }}
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      attestation_sha256: ${{ steps.verify.outputs.attestation_sha256 }}
      bootstrap_run_id: ${{ steps.resolve.outputs.bootstrap_run_id }}
      bootstrap_artifact_digest: ${{ steps.resolve.outputs.artifact_digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.12.13
          check-latest: false
      - name: Resolve one exact target-bound bootstrap artifact
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_RUN_ID: ${{ github.run_id }}
          TARGET_RUN_ATTEMPT: ${{ github.run_attempt }}
          TARGET_HEAD_SHA: ${{ github.sha }}
          EXPECTED_RUNNER_LABEL: ${{ needs['propertyquarry-protected-dispatch-inputs'].outputs.security_runner_label }}
        run: |
          set -Eeuo pipefail
          umask 077
          [[ "${GITHUB_REPOSITORY}" == "ArchonMegalon/property" ]]
          [[ "${TARGET_RUN_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${TARGET_RUN_ATTEMPT}" =~ ^[1-9][0-9]{0,9}$ ]]
          [[ "${TARGET_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${EXPECTED_RUNNER_LABEL}" =~ ^pqsec-[0-9a-f]{32}$ ]]

          evidence_root="${RUNNER_TEMP}/propertyquarry-security-bootstrap-attestation"
          api_root="${evidence_root}/authenticated-api"
          [[ ! -e "${evidence_root}" && ! -L "${evidence_root}" ]]
          install -d -m 0700 "${evidence_root}" "${api_root}"

          capture_api_json() {
            local destination="$1"
            local maximum_bytes="$2"
            shift 2
            local attempt candidate
            [[ "${maximum_bytes}" =~ ^[1-9][0-9]{0,8}$ ]]
            for attempt in 1 2 3; do
              candidate="${destination}.attempt-${attempt}"
              if timeout --signal=TERM --kill-after=5s 30s \
                gh api --method GET "$@" \
                | python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py \
                    capture-json \
                    --max-bytes "${maximum_bytes}" \
                    --write "${candidate}" \
                    >/dev/null; then
                [[ -f "${candidate}" && ! -L "${candidate}" ]]
                mv -fT "${candidate}" "${destination}"
                return 0
              fi
              rm -f -- "${candidate}"
              if (( attempt < 3 )); then
                sleep "${attempt}"
              fi
            done
            echo "Bounded GitHub API request failed after three attempts." >&2
            return 1
          }
          write_command_scalar() {
            local destination="$1"
            local key="$2"
            local value="$3"
            [[ "${key}" =~ ^[A-Za-z_][A-Za-z0-9_]{0,63}$ ]]
            (( ${#value} >= 1 && ${#value} <= 256 ))
            [[ "${value}" != *$'\n'* && "${value}" != *$'\r'* ]]
            printf '%s=%s\n' "${key}" "${value}" >>"${destination}"
          }

          target_jobs_path="${api_root}/target-jobs.json"
          capture_api_json "${target_jobs_path}" 8388608 \
            --paginate --slurp \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${TARGET_RUN_ID}/jobs?filter=latest&per_page=100"
          [[ "$(jq -er '[.[].jobs[] | select(.name == "propertyquarry-flagship-security")] | length' "${target_jobs_path}")" == "1" ]]
          target_job_path="${api_root}/target-job.json"
          jq -ce '.[] | .jobs[] | select(.name == "propertyquarry-flagship-security")' \
            "${target_jobs_path}" \
            | python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py \
                capture-json \
                --max-bytes 1048576 \
                --write "${target_job_path}" \
                >/dev/null
          jq -e \
            --arg head_sha "${TARGET_HEAD_SHA}" \
            --arg runner_label "${EXPECTED_RUNNER_LABEL}" \
            --arg run_id "${TARGET_RUN_ID}" '
              .name == "propertyquarry-flagship-security" and
              .status == "completed" and
              .conclusion == "success" and
              .head_sha == $head_sha and
              (.labels | index("self-hosted") != null) and
              (.labels | index("propertyquarry-security") != null) and
              (.labels | index($runner_label) != null) and
              (.runner_name | test("^pq-security-[0-9]+-" + $run_id + "$"))
            ' "${target_job_path}" >/dev/null
          target_job_id="$(jq -er '.id | tostring' "${target_job_path}")"
          runner_name="$(jq -er '.runner_name' "${target_job_path}")"
          bootstrap_run_id="${runner_name#pq-security-}"
          bootstrap_run_id="${bootstrap_run_id%-${TARGET_RUN_ID}}"
          [[ "${target_job_id}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${bootstrap_run_id}" =~ ^[1-9][0-9]{0,19}$ ]]

          artifact_name="propertyquarry-security-runner-bootstrap-target-${TARGET_RUN_ID}-${TARGET_RUN_ATTEMPT}-${target_job_id}"
          (( ${#artifact_name} <= 192 ))
          artifact_path="${api_root}/artifact.json"
          deadline="$((SECONDS + 600))"
          while (( SECONDS < deadline )); do
            artifact_pages_path="${api_root}/artifact-pages.json"
            capture_api_json "${artifact_pages_path}" 8388608 \
              --paginate --slurp \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100&name=${artifact_name}"
            selection_count="$(jq -er \
              --arg name "${artifact_name}" \
              '[.[] | .artifacts[] | select(.name == $name and .expired == false)] | length' \
              "${artifact_pages_path}")"
            [[ "${selection_count}" =~ ^[0-9]{1,3}$ ]]
            if (( selection_count > 1 )); then
              echo "Multiple non-expired bootstrap artifacts match the exact target job." >&2
              exit 1
            fi
            if (( selection_count == 1 )); then
              jq -ce --arg name "${artifact_name}" \
                '.[] | .artifacts[] | select(.name == $name and .expired == false)' \
                "${artifact_pages_path}" \
                | python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py \
                    capture-json \
                    --max-bytes 1048576 \
                    --write "${artifact_path}" \
                    >/dev/null
              break
            fi
            sleep 10
          done
          [[ -f "${artifact_path}" && ! -L "${artifact_path}" ]] || {
            echo "The exact target-bound bootstrap artifact did not appear." >&2
            exit 1
          }
          jq -e \
            --arg name "${artifact_name}" \
            --arg bootstrap_run_id "${bootstrap_run_id}" '
              .name == $name and
              .expired == false and
              (.id | tostring | test("^[1-9][0-9]*$")) and
              (.digest | test("^sha256:[0-9a-f]{64}$")) and
              (.workflow_run.id | tostring) == $bootstrap_run_id
            ' "${artifact_path}" >/dev/null

          bootstrap_run_path="${api_root}/bootstrap-run.json"
          for _attempt in $(seq 1 30); do
            capture_api_json "${bootstrap_run_path}" 1048576 \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${bootstrap_run_id}"
            if [[ "$(jq -er '.status' "${bootstrap_run_path}")" == "completed" ]]; then
              break
            fi
            sleep 2
          done
          jq -e \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg head_sha "${TARGET_HEAD_SHA}" '
              .repository.full_name == $repository and
              .event == "workflow_dispatch" and
              .head_branch == "main" and
              .head_sha == $head_sha and
              .path == ".github/workflows/propertyquarry-security-runner-bootstrap.yml" and
              .status == "completed" and
              .conclusion == "success" and
              .run_attempt >= 1
            ' "${bootstrap_run_path}" >/dev/null

          artifact_id="$(jq -er '.id | tostring' "${artifact_path}")"
          artifact_digest="$(jq -er '.digest' "${artifact_path}")"
          bootstrap_run_attempt="$(jq -er '.run_attempt | tostring' "${bootstrap_run_path}")"
          [[ "${artifact_id}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${artifact_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${bootstrap_run_attempt}" =~ ^[1-9][0-9]{0,9}$ ]]
          observed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          [[ "${observed_at}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          jq -cn \
            --arg schema "propertyquarry.security_bootstrap_artifact_metadata.v1" \
            --arg artifact_id "${artifact_id}" \
            --arg artifact_name "${artifact_name}" \
            --arg artifact_digest "${artifact_digest}" \
            --arg bootstrap_run_id "${bootstrap_run_id}" \
            --arg bootstrap_run_attempt "${bootstrap_run_attempt}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg head_sha "${TARGET_HEAD_SHA}" \
            --arg observed_at "${observed_at}" '
              {
                schema:$schema,
                selection_count:1,
                artifact:{id:$artifact_id,name:$artifact_name,digest:$artifact_digest,expired:false,workflow_run_id:$bootstrap_run_id},
                bootstrap_workflow_run:{id:$bootstrap_run_id,run_attempt:$bootstrap_run_attempt,repository:$repository,event:"workflow_dispatch",path:".github/workflows/propertyquarry-security-runner-bootstrap.yml",head_branch:"main",head_sha:$head_sha,status:"completed",conclusion:"success"},
                observed_at:$observed_at
              }
            ' | python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py \
                  capture-json \
                  --max-bytes 1048576 \
                  --write "${evidence_root}/artifact-metadata.json" \
                  >/dev/null
          write_command_scalar "${GITHUB_OUTPUT}" artifact_id "${artifact_id}"
          write_command_scalar "${GITHUB_OUTPUT}" artifact_digest "${artifact_digest}"
          write_command_scalar "${GITHUB_OUTPUT}" bootstrap_run_id "${bootstrap_run_id}"
          write_command_scalar "${GITHUB_OUTPUT}" target_job_id "${target_job_id}"
      - name: Download, authenticate, and safely extract the exact artifact ID
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ steps.resolve.outputs.artifact_id }}
          EXPECTED_ARTIFACT_DIGEST: ${{ steps.resolve.outputs.artifact_digest }}
        run: |
          set -Eeuo pipefail
          umask 077
          [[ "${GITHUB_REPOSITORY}" == "ArchonMegalon/property" ]]
          [[ "${ARTIFACT_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${EXPECTED_ARTIFACT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          evidence_root="${RUNNER_TEMP}/propertyquarry-security-bootstrap-attestation"
          archive_path="${evidence_root}/artifact-${ARTIFACT_ID}.zip"
          [[ -d "${evidence_root}" && ! -L "${evidence_root}" ]]
          [[ ! -e "${archive_path}" && ! -L "${archive_path}" ]]

          downloaded=0
          for attempt in 1 2 3; do
            if timeout --signal=TERM --kill-after=5s 90s \
              gh api --method GET \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
              | python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py \
                  capture-archive \
                  --expected-digest "${EXPECTED_ARTIFACT_DIGEST}" \
                  --max-bytes 67108864 \
                  --write "${archive_path}" \
                  >/dev/null; then
              downloaded=1
              break
            fi
            if (( attempt < 3 )); then
              sleep "${attempt}"
            fi
          done
          [[ "${downloaded}" == "1" ]]
          [[ -f "${archive_path}" && ! -L "${archive_path}" ]]
          python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py \
            extract-archive \
            --archive "${archive_path}" \
            --destination "${evidence_root}/bundle" \
            --max-archive-bytes 67108864 \
            --max-entries 64 \
            --max-member-bytes 4194304 \
            --max-uncompressed-bytes 16777216 \
            >/dev/null
      - name: Verify exact bootstrap receipts and issue same-run attestation
        id: verify
        shell: bash
        env:
          EXPECTED_RUNNER_LABEL: ${{ needs['propertyquarry-protected-dispatch-inputs'].outputs.security_runner_label }}
          EXPECTED_TOKEN_EXPIRES_AT: ${{ needs['propertyquarry-protected-dispatch-inputs'].outputs.security_runner_token_expires_at }}
          EXPECTED_WEB_IMAGE: ${{ vars.PROPERTYQUARRY_WEB_IMAGE }}
          EXPECTED_RENDER_IMAGE: ${{ vars.PROPERTYQUARRY_RENDER_IMAGE }}
          TARGET_JOB_ID: ${{ steps.resolve.outputs.target_job_id }}
        run: |
          set -Eeuo pipefail
          evidence_root="${RUNNER_TEMP}/propertyquarry-security-bootstrap-attestation"
          attestation="${evidence_root}/attestation.json"
          python3 scripts/verify_propertyquarry_security_bootstrap_attestation.py verify \
            --artifact-root "${evidence_root}/bundle" \
            --artifact-metadata "${evidence_root}/artifact-metadata.json" \
            --expected-repository "${GITHUB_REPOSITORY}" \
            --expected-workflow-ref "${GITHUB_REPOSITORY}/.github/workflows/smoke-runtime.yml@refs/heads/main" \
            --expected-bootstrap-workflow-path ".github/workflows/propertyquarry-security-runner-bootstrap.yml" \
            --expected-run-id "${GITHUB_RUN_ID}" \
            --expected-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --expected-job-id "${TARGET_JOB_ID}" \
            --expected-head-sha "${GITHUB_SHA}" \
            --expected-runner-label "${EXPECTED_RUNNER_LABEL}" \
            --expected-token-expires-at "${EXPECTED_TOKEN_EXPIRES_AT}" \
            --expected-web-image "${EXPECTED_WEB_IMAGE}" \
            --expected-render-image "${EXPECTED_RENDER_IMAGE}" \
            --write "${attestation}"
          attestation_sha256="$(sha256sum "${attestation}" | awk '{print $1}')"
          [[ "${attestation_sha256}" =~ ^[0-9a-f]{64}$ ]]
          (( ${#attestation_sha256} == 64 ))
          [[ "${attestation_sha256}" != *$'\n'* && "${attestation_sha256}" != *$'\r'* ]]
          printf '%s=%s\n' attestation_sha256 "${attestation_sha256}" >>"${GITHUB_OUTPUT}"
      - name: Preserve same-run bootstrap attestation
        if: ${{ steps.verify.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-security-bootstrap-attestation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/propertyquarry-security-bootstrap-attestation/attestation.json
            ${{ runner.temp }}/propertyquarry-security-bootstrap-attestation/artifact-metadata.json
          if-no-files-found: error
          retention-days: 30

  smoke-runtime-api:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpx==0.28.1 jsonschema==4.25.1 opencv-python-headless==4.13.0.92 pytest==9.0.3
          python -m playwright install --with-deps chromium
      - name: Prepare canonical repository path
        run: |
          sudo mkdir -p /docker
          sudo chown "$USER":"$USER" /docker
          ln -sfn "$GITHUB_WORKSPACE" /docker/property
      - name: Run core CI gates
        env:
          PROPERTYQUARRY_REQUIRE_REAL_CHROMIUM_INTEGRATION: "1"
        run: make ci-gates

  propertyquarry-browser-contracts:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpx==0.28.1 pytest==9.0.3
          python -m playwright install --with-deps chromium
      - name: Prepare canonical repository path
        run: |
          sudo mkdir -p /docker
          sudo chown "$USER":"$USER" /docker
          ln -sfn "$GITHUB_WORKSPACE" /docker/property
      - name: Run local PropertyQuarry browser contracts
        run: |
          PYTHONPATH=ea EA_STORAGE_BACKEND=memory python -m pytest -q \
            tests/e2e/test_propertyquarry_greenfield_browser.py \
            tests/e2e/test_propertyquarry_public_tour_browser.py

  product-browser-e2e:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser-engine: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install ${{ matrix.browser-engine }} core-journey dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg xvfb
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpx==0.28.1 pytest==9.0.3
          python -m playwright install --with-deps "${{ matrix.browser-engine }}"
      - name: Prepare canonical repository path
        run: |
          sudo mkdir -p /docker
          sudo chown "$USER":"$USER" /docker
          ln -sfn "$GITHUB_WORKSPACE" /docker/property
      - name: Run flagship operating loop and authoritative tour proof in ${{ matrix.browser-engine }}
        env:
          PROPERTYQUARRY_CORE_BROWSER_ENGINE: ${{ matrix.browser-engine }}
        run: |
          set -euo pipefail
          tests=( \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_research_market_formats_are_visible_in_declared_locales \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_workbench_candidate_history_stays_in_place \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_flagship_operating_loop_in_browser \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_search_launch_turns_quota_rejection_into_retryable_calm_state \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_best_match_opens_hosted_3d_tour_and_flythrough_in_real_browser \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_blocked_3d_tour_can_be_retried_from_research_packet_in_real_browser \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_research_detail_never_shows_fake_open_tour_for_generated_reconstruction_status \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_generated_reconstruction_public_launch_renders_honest_shell_in_real_browser \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_generated_reconstruction_public_launch_is_mobile_safe \
            tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_expired_flat_preview_explains_3d_unavailable_in_real_browser \
            tests/e2e/test_propertyquarry_public_tour_browser.py::test_public_pano2vr_walkthrough_uses_governed_first_party_route_and_accessible_controls \
            tests/e2e/test_propertyquarry_public_tour_browser.py::test_generated_reconstruction_viewer_renders_routeable_layout_in_real_browser \
          )
          if [[ "${PROPERTYQUARRY_CORE_BROWSER_ENGINE}" == "firefox" ]]; then
            xvfb-run -a env \
              PROPERTYQUARRY_PUBLIC_TOUR_FIREFOX_HEADFUL_WEBGL=1 \
              PYTHONPATH=ea \
              EA_STORAGE_BACKEND=memory \
              python -m pytest -q "${tests[@]}"
          else
            PYTHONPATH=ea EA_STORAGE_BACKEND=memory python -m pytest -q "${tests[@]}"
          fi

  propertyquarry-postgres-browser-e2e:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install PostgreSQL storage-browser dependencies
        shell: bash
        run: |
          set -euo pipefail
          venv="${RUNNER_TEMP}/propertyquarry-postgres-browser-venv"
          browser_root="${RUNNER_TEMP}/propertyquarry-postgres-browser-playwright"
          umask 077
          dependency_userbase="$(mktemp -d "${RUNNER_TEMP}/propertyquarry-postgres-browser-userbase.XXXXXXXX")"
          chmod 0700 "${dependency_userbase}"
          PYTHONUSERBASE="${dependency_userbase}" \
            python -m pip install --user --ignore-installed -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpcore==1.0.9 httpx==0.28.1 iniconfig==2.3.0 pluggy==1.6.0 pytest==9.0.3
          python -m venv "${venv}"
          "${venv}/bin/python" -m pip install --ignore-installed -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpcore==1.0.9 httpx==0.28.1 iniconfig==2.3.0 pluggy==1.6.0 pytest==9.0.3
          PLAYWRIGHT_BROWSERS_PATH="${browser_root}" \
            "${venv}/bin/python" -m playwright install --with-deps chromium

          chromium_revision="$("${venv}/bin/python" - <<'PY'
          import json
          from pathlib import Path

          import playwright

          registry = (
              Path(playwright.__file__).resolve().parent
              / "driver"
              / "package"
              / "browsers.json"
          )
          payload = json.loads(registry.read_text(encoding="utf-8"))
          matches = [
              row
              for row in payload.get("browsers", [])
              if isinstance(row, dict) and row.get("name") == "chromium-headless-shell"
          ]
          if len(matches) != 1:
              raise SystemExit("Playwright Chromium headless-shell registry entry is not exact")
          revision = matches[0].get("revision")
          if not isinstance(revision, str) or not revision.isdigit() or revision.startswith("0"):
              raise SystemExit("Playwright Chromium headless-shell revision is invalid")
          print(revision)
          PY
          )"
          chromium_headless_shell="${browser_root}/chromium_headless_shell-${chromium_revision}/chrome-headless-shell-linux64/chrome-headless-shell"
          test -x "${chromium_headless_shell}"
          postgres_image="$("${venv}/bin/python" -c 'from scripts.smoke_property_postgres_isolated import POSTGRES_IMAGE; print(POSTGRES_IMAGE)')"
          docker pull "${postgres_image}"

          runner_uid="$(id -u)"
          if [[ ! "${runner_uid}" =~ ^[1-9][0-9]*$ ]]; then
            echo "PostgreSQL browser lane requires an unprivileged numeric runner UID" >&2
            exit 1
          fi
          sudo systemctl start "user@${runner_uid}.service"
          user_runtime_dir="/run/user/${runner_uid}"
          user_bus="unix:path=${user_runtime_dir}/bus"
          test -d "${user_runtime_dir}"
          test -S "${user_runtime_dir}/bus"
          export XDG_RUNTIME_DIR="${user_runtime_dir}"
          export DBUS_SESSION_BUS_ADDRESS="${user_bus}"
          /usr/bin/systemd-run \
            --user \
            --scope \
            --quiet \
            --collect \
            --unit="propertyquarry-postgres-browser-preflight-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --property=MemoryMax=1073741824 \
            --property=MemorySwapMax=0 \
            --property=TasksMax=128 \
            --property=CPUQuota=100% \
            --property=RuntimeMaxSec=1200s \
            -- \
            /usr/bin/true
          {
            printf '%s=%s\n' PROPERTYQUARRY_POSTGRES_BROWSER_VENV "${venv}"
            printf '%s=%s\n' PROPERTYQUARRY_POSTGRES_BROWSER_CHROMIUM "${chromium_headless_shell}"
            printf '%s=%s\n' PYTHONUSERBASE "${dependency_userbase}"
            printf '%s=%s\n' XDG_RUNTIME_DIR "${user_runtime_dir}"
            printf '%s=%s\n' DBUS_SESSION_BUS_ADDRESS "${user_bus}"
          } >> "${GITHUB_ENV}"
      - name: Run production-storage PostgreSQL browser lane
        shell: bash
        run: |
          set -euo pipefail
          "${PROPERTYQUARRY_POSTGRES_BROWSER_VENV}/bin/python" \
            scripts/smoke_property_postgres_isolated.py \
            --repo-root "${GITHUB_WORKSPACE}" \
            --venv "${PROPERTYQUARRY_POSTGRES_BROWSER_VENV}" \
            --chromium-headless-shell "${PROPERTYQUARRY_POSTGRES_BROWSER_CHROMIUM}" \
            --docker-binary /usr/bin/docker \
            --systemd-run /usr/bin/systemd-run

  propertyquarry-continuous-ux:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EA_STORAGE_BACKEND: memory
      EA_API_TOKEN: propertyquarry-continuous-ux-${{ github.run_id }}-${{ github.run_attempt }}
      PROPERTYQUARRY_ENABLE_LEGACY_RUNTIME_SURFACES: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Bind UX evidence to the manifest runtime candidate
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=ea python scripts/check_property_release_hygiene.py
          runtime_sha="$(PYTHONPATH=ea python -c 'from scripts.check_property_release_hygiene import release_manifest_runtime_sha; print(release_manifest_runtime_sha())')"
          if [[ ! "${runtime_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "PropertyQuarry manifest runtime SHA is missing or malformed" >&2
            exit 1
          fi
          git cat-file -e "${runtime_sha}^{commit}"
          echo "PROPERTYQUARRY_RELEASE_COMMIT_SHA=${runtime_sha}" >> "${GITHUB_ENV}"
      - name: Install isolated continuous UX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock httpx==0.28.1 pytest==9.0.3
          python -m playwright install --with-deps chromium firefox webkit
      - name: Prepare canonical repository path
        run: |
          sudo mkdir -p /docker
          sudo chown "$USER":"$USER" /docker
          ln -sfn "$GITHUB_WORKSPACE" /docker/property
      - name: Verify continuous UX receipt contracts
        run: |
          PYTHONPATH=ea python -m pytest -q \
            tests/test_propertyquarry_visual_baseline.py \
            tests/test_propertyquarry_continuous_ux_gate.py \
            tests/test_propertyquarry_accessibility_gate.py \
            tests/test_propertyquarry_gold_status.py
      - name: Capture and compare candidate-bound screenshot baselines
        shell: bash
        run: |
          set -euo pipefail
          visual_root="_completion/smoke/propertyquarry-visual-${GITHUB_SHA}"
          actual_dir="${visual_root}/actual"
          diff_dir="${visual_root}/diff"
          visual_receipt="${visual_root}/receipt.json"
          source_binding_receipt="${visual_root}/source-binding.json"
          mkdir -p "${actual_dir}"

          PROPERTYQUARRY_VISUAL_ACTUAL_DIR="${actual_dir}" \
          PROPERTYQUARRY_CORE_BROWSER_ENGINE=chromium \
          PYTHONPATH=ea \
            python -m pytest -q \
              tests/e2e/test_propertyquarry_greenfield_browser.py::test_propertyquarry_deterministic_visual_baseline_capture_matrix

          PYTHONPATH=ea python scripts/check_property_release_hygiene.py \
            --write "${source_binding_receipt}"

          browser_version="$(python - <<'PY'
          from playwright.sync_api import sync_playwright

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(
                  args=["--no-sandbox", "--disable-dev-shm-usage"]
              )
              try:
                  print(browser.version)
              finally:
                  browser.close()
          PY
          )"
          playwright_version="$(python - <<'PY'
          import importlib.metadata

          print(importlib.metadata.version("playwright"))
          PY
          )"
          python scripts/propertyquarry_visual_baseline.py verify \
            --manifest tests/e2e/propertyquarry_visual_baselines/manifest.json \
            --actual-dir "${actual_dir}" \
            --diff-dir "${diff_dir}" \
            --receipt "${visual_receipt}" \
            --release-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --expected-release-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --workflow-head-sha "${GITHUB_SHA}" \
            --source-binding-receipt "${source_binding_receipt}" \
            --browser-version "${browser_version}" \
            --playwright-version "${playwright_version}"
      - name: Run isolated cross-engine continuous UX gate
        shell: bash
        env:
          EA_PUBLIC_TOUR_DIR: ${{ runner.temp }}/propertyquarry-continuous-ux-tours
        run: |
          set -euo pipefail
          receipt="_completion/smoke/propertyquarry-continuous-ux-${GITHUB_SHA}.json"
          visual_receipt="_completion/smoke/propertyquarry-visual-${GITHUB_SHA}/receipt.json"
          app_log="${RUNNER_TEMP}/propertyquarry-continuous-ux-app.log"
          mkdir -p "${EA_PUBLIC_TOUR_DIR}"
          PYTHONPATH=ea python -m uvicorn app.main:app \
            --host 127.0.0.1 \
            --port 8097 \
            >"${app_log}" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "${app_pid}" 2>/dev/null || true
            wait "${app_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 45); do
            if curl --fail --silent --show-error http://127.0.0.1:8097/sign-in >/dev/null; then
              ready=1
              break
            fi
            if ! kill -0 "${app_pid}" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if [[ "${ready}" != "1" ]]; then
            tail -n 200 "${app_log}" || true
            exit 1
          fi

          PYTHONPATH=ea python scripts/propertyquarry_continuous_ux_gate.py \
            --base-url http://127.0.0.1:8097 \
            --release-sha "${PROPERTYQUARRY_RELEASE_COMMIT_SHA}" \
            --storage-backend memory \
            --browser-engines chromium,firefox,webkit \
            --visual-baseline-receipt "${visual_receipt}" \
            --write "${receipt}"
      - name: Preserve isolated continuous UX evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-continuous-ux-${{ github.sha }}
          path: |
            _completion/smoke/propertyquarry-continuous-ux-${{ github.sha }}.json
            _completion/smoke/propertyquarry-visual-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30

  propertyquarry-accessibility-contracts:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EA_STORAGE_BACKEND: memory
      EA_API_TOKEN: propertyquarry-accessibility-${{ github.run_id }}-${{ github.run_attempt }}
      PROPERTYQUARRY_ENABLE_LEGACY_RUNTIME_SURFACES: "1"
      PROPERTYQUARRY_ENABLE_PUBLIC_TOURS: "1"
      PROPERTYQUARRY_ACCESSIBILITY_BROWSER_ENGINES: chromium,firefox,webkit
      PROPERTYQUARRY_ACCESSIBILITY_SHORTLIST_RUN_ROUTE: /app/shortlist/run/public-demo-run
      PROPERTYQUARRY_ACCESSIBILITY_PUBLIC_TOUR_ROUTE: /tours/accessibility-ci-tour
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install accessibility contract dependencies
        run: |
          python -m pip install -r ea/requirements.txt -c ea/requirements.lock -c ea/requirements.ci.lock pytest==9.0.3
          python -m playwright install --with-deps chromium firefox webkit
          npm install --no-save --ignore-scripts axe-core@4.10.2
      - name: Run accessibility receipt and flagship-gold contracts
        run: |
          PYTHONPATH=ea python -m pytest -q \
            tests/test_propertyquarry_accessibility_gate.py \
            tests/test_propertyquarry_gold_status.py::test_gold_status_standard_profile_does_not_gate_on_optional_accessibility_receipt \
            tests/test_propertyquarry_gold_status.py::test_gold_status_flagship_profile_passes_with_fresh_customer_ux_evidence \
            tests/test_propertyquarry_gold_status.py::test_gold_status_flagship_rejects_incomplete_accessibility_engine_evidence \
            tests/test_propertyquarry_gold_status.py::test_gold_status_flagship_rejects_missing_or_nonzero_moderate_wcag_metric \
            tests/test_propertyquarry_gold_status.py::test_gold_status_flagship_rejects_literal_accessibility_route_placeholders \
            tests/test_propertyquarry_gold_status.py::test_gold_status_flagship_rejects_stale_accessibility_evidence
      - name: Run governed accessibility gate across the provisioned engine matrix
        shell: bash
        env:
          EA_PUBLIC_TOUR_DIR: ${{ runner.temp }}/propertyquarry-accessibility-tours
        run: |
          set -euo pipefail
          mkdir -p "${EA_PUBLIC_TOUR_DIR}/accessibility-ci-tour" _completion/smoke
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["EA_PUBLIC_TOUR_DIR"]) / "accessibility-ci-tour"
          image = base64.b64decode(
              "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="
          )
          for name in ("scene-01.png", "floorplan-01.png"):
              (root / name).write_bytes(image)
          payload = {
              "slug": "accessibility-ci-tour",
              "title": "Accessibility CI tour",
              "display_title": "Accessibility CI tour",
              "hosted_url": "https://propertyquarry.com/tours/accessibility-ci-tour",
              "public_url": "https://propertyquarry.com/tours/accessibility-ci-tour",
              "brand_name": "PropertyQuarry",
              "scene_strategy": "layout_first",
              "creation_mode": "hosted_floorplan_tour",
              "scenes": [
                  {
                      "scene_id": "panorama-1",
                      "name": "Living room anchor",
                      "role": "photo",
                      "asset_relpath": "scene-01.png",
                      "image_url": "scene-01.png",
                      "mime_type": "image/png",
                  },
                  {
                      "scene_id": "floorplan-1",
                      "name": "Main floorplan",
                      "role": "floorplan",
                      "asset_relpath": "floorplan-01.png",
                      "mime_type": "image/png",
                  },
              ],
          }
          (root / "tour.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          app_log="${RUNNER_TEMP}/propertyquarry-accessibility-app.log"
          PYTHONPATH=ea python -m uvicorn app.main:app \
            --host 127.0.0.1 \
            --port 8097 \
            >"${app_log}" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "${app_pid}" 2>/dev/null || true
            wait "${app_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 45); do
            if curl --fail --silent --show-error http://127.0.0.1:8097/sign-in >/dev/null; then
              ready=1
              break
            fi
            if ! kill -0 "${app_pid}" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if [[ "${ready}" != "1" ]]; then
            tail -n 200 "${app_log}" || true
            exit 1
          fi

          research_route="$(PYTHONPATH=ea python - <<'PY'
          import os

          from scripts.propertyquarry_live_mobile_surface_smoke import seed_research_detail_fixture

          print(
              seed_research_detail_fixture(
                  base_url="http://127.0.0.1:8097",
                  api_token=os.environ["EA_API_TOKEN"],
                  principal_id="pq-accessibility-ci",
                  host_header="",
              )
          )
          PY
          )"
          if [[ ! "${research_route}" =~ ^/app/research/[A-Za-z0-9._:-]+\?run_id=[A-Za-z0-9._:-]+$ ]]; then
            echo "Accessibility research fixture did not return a concrete detail route." >&2
            exit 1
          fi
          export PROPERTYQUARRY_ACCESSIBILITY_RESEARCH_DETAIL_ROUTE="${research_route}"

          PYTHONPATH=ea python scripts/propertyquarry_accessibility_gate.py \
            --base-url http://127.0.0.1:8097 \
            --browser-engines "${PROPERTYQUARRY_ACCESSIBILITY_BROWSER_ENGINES}" \
            --axe-core-path node_modules/axe-core/axe.min.js \
            --api-token "${EA_API_TOKEN}" \
            --principal-id pq-accessibility-ci \
            --write _completion/smoke/propertyquarry-accessibility-${GITHUB_SHA}.json \
            > /dev/null
      - name: Preserve governed accessibility evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: propertyquarry-accessibility-${{ github.sha }}
          path: _completion/smoke/propertyquarry-accessibility-${{ github.sha }}.json
          if-no-files-found: error
          retention-days: 30

