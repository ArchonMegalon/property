<script>
(() => {
  const root = document.querySelector('[data-object-feedback]');
  if (!root) return;
  let payload = {};
  try {
    payload = JSON.parse(root.getAttribute('data-object-feedback-payload') || '{}');
  } catch (_error) {
    payload = {};
  }
  const selectedReasons = new Set();
  let reaction = '';
  const status = root.querySelector('[data-object-feedback-status]');
  const decisionStateStatus = root.querySelector('[data-object-decision-state-status]');
  const advancedToggleButtons = [...root.querySelectorAll('[data-object-feedback-open-advanced]')];
  const advancedDetails = root.querySelector('.prd-decision-advanced');
  const clippyToggle = root.querySelector('[data-object-clippy-toggle]');
  const clippyPanel = root.querySelector('[data-object-clippy-panel]');
  const clippyQuestion = root.querySelector('[data-object-clippy-question]');
  const clippyStatus = root.querySelector('[data-object-clippy-status]');
  const clippyAnswer = root.querySelector('[data-object-clippy-answer]');
  const lifestyleToggle = root.querySelector('[data-object-lifestyle-toggle]');
  const lifestylePanel = root.querySelector('[data-object-lifestyle-panel]');
  const lifestylePreview = root.querySelector('[data-object-lifestyle-preview]');
  const lifestyleStatus = root.querySelector('[data-object-lifestyle-status]');
  const lifestyleGoogleStatus = root.querySelector('[data-object-lifestyle-google-status]');
  const followupsNode = root.querySelector('[data-object-followups]');
  const followupStatus = root.querySelector('[data-object-followup-status]');
  const structuredFeedbackEndpoint = String(payload.structured_feedback_endpoint || '/app/api/property-feedback');
  const followupStatusEndpointTemplate = String(payload.followup_status_endpoint_template || '/app/api/property-feedback/__FEEDBACK_ID__/followup-status');
  const lifestyleScenePayloadKey = ['magic', 'fit_scene'].join('_');
  const lifestyleCreateEndpoint = String(payload[['magic', 'fit_create_endpoint'].join('_')] || ['/app/api/property/magic', 'fit-scenes'].join('-'));
  const lifestyleUploadEndpoint = String(payload[['magic', 'fit_upload_endpoint'].join('_')] || ['/app/api/property/magic', 'fit-reference-files'].join('-'));
  const googlePhotosSessionEndpoint = String(payload.google_photos_session_endpoint || '/app/api/signals/google/photos/session');
  const googlePhotosSessionStatusTemplate = String(payload.google_photos_session_status_endpoint_template || '/app/api/signals/google/photos/session/__SESSION_ID__');
  const lifestyleUploadStatus = root.querySelector('[data-object-lifestyle-upload-status]');
  const lifestyleReferenceList = root.querySelector('[data-object-lifestyle-reference-list]');
  const lifestyleUploadInput = root.querySelector('[data-object-lifestyle-upload-input]');
  let lifestyleUploadedReferenceUrls = [];
  let lifestyleSessionId = '';
  let lifestylePollingTimer = null;
  const clearNode = (node) => {
    while (node?.firstChild) node.removeChild(node.firstChild);
  };
  const appendTextNode = (parent, tagName, text) => {
    const node = document.createElement(tagName);
    node.textContent = String(text || '');
    parent.appendChild(node);
    return node;
  };
  const renderLifestylePreview = (scene) => {
    if (!lifestylePreview) return;
    const imageUrl = String(scene?.image_url || '').trim();
    const summary = String(scene?.summary || '').trim();
    const sceneType = String(scene?.scene_type || 'furnished look').replaceAll('_', ' ');
    if (!imageUrl) {
      clearNode(lifestylePreview);
      return;
    }
    clearNode(lifestylePreview);
    const row = document.createElement('div');
    row.className = 'object-row';
    const textWrap = document.createElement('div');
    appendTextNode(textWrap, 'strong', sceneType);
    appendTextNode(textWrap, 'small', summary || 'Furnished image ready.');
    row.appendChild(textWrap);
    appendTextNode(row, 'div', 'Ready').className = 'object-tag';
    lifestylePreview.appendChild(row);
    const image = document.createElement('img');
    image.src = imageUrl;
    image.alt = 'Furnished image';
    image.loading = 'lazy';
    lifestylePreview.appendChild(image);
    appendTextNode(
      lifestylePreview,
      'div',
      'Concept image only. This is not listing photography.',
    ).className = 'object-copy';
  };
  const renderLifestyleReferenceList = () => {
    if (!lifestyleReferenceList) return;
    const manualUrls = String(root.querySelector('[data-object-lifestyle-reference-urls]')?.value || '')
      .split('\n')
      .map((value) => value.trim())
      .filter(Boolean);
    const rows = [
      ...lifestyleUploadedReferenceUrls.map((url, index) => ({ title: `Uploaded reference ${index + 1}`, detail: url, tag: 'Upload' })),
      ...manualUrls.map((url, index) => ({ title: `Manual reference ${index + 1}`, detail: url, tag: 'URL' })),
      ...(lifestyleSessionId ? [{ title: 'Google Photos selection', detail: lifestyleSessionId, tag: 'Picker' }] : []),
    ];
    clearNode(lifestyleReferenceList);
    const targetRows = rows.length ? rows : [{ title: 'No references yet', detail: 'Upload 1 to 3 photos, use Google Photos, or paste image links.', tag: 'Waiting' }];
    targetRows.forEach((row) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'object-row';
      const textWrap = document.createElement('div');
      appendTextNode(textWrap, 'strong', row.title || '');
      appendTextNode(textWrap, 'small', row.detail || '');
      wrapper.appendChild(textWrap);
      appendTextNode(wrapper, 'div', row.tag || '').className = 'object-tag';
      lifestyleReferenceList.appendChild(wrapper);
    });
  };
  renderLifestylePreview(payload[lifestyleScenePayloadKey] || {});
  renderLifestyleReferenceList();
  const renderFollowups = (rows) => {
    if (!followupsNode) return;
    const safeRows = Array.isArray(rows) ? rows : [];
    clearNode(followupsNode);
    if (!safeRows.length) {
      const wrapper = document.createElement('div');
      wrapper.className = 'object-row';
      const body = document.createElement('div');
      appendTextNode(body, 'strong', 'No follow-up yet');
      appendTextNode(body, 'small', 'Add a question here when you want to keep something open.');
      wrapper.appendChild(body);
      appendTextNode(wrapper, 'div', 'Waiting').className = 'object-tag';
      followupsNode.appendChild(wrapper);
    } else {
      safeRows.forEach((row) => {
        const feedbackId = String(row?.feedback_id || '').trim();
        const wrapper = document.createElement('div');
        wrapper.className = 'object-row';
        const body = document.createElement('div');
        appendTextNode(body, 'strong', row?.title || 'Follow-up');
        appendTextNode(body, 'small', row?.detail || '');
        if (feedbackId) {
          const actions = document.createElement('div');
          actions.className = 'object-actions';
          [
            ['answered', 'Answered'],
            ['needs_follow_up', 'Needs follow-up'],
            ['confirmed', 'Confirmed'],
            ['contradicted', 'Contradicted'],
            ['resolved', 'Resolved'],
          ].forEach(([nextStatus, label]) => {
            const button = document.createElement('button');
            button.className = 'console-action';
            button.type = 'button';
            button.setAttribute('data-object-followup-action', nextStatus);
            button.setAttribute('data-object-feedback-id', feedbackId);
            button.textContent = label;
            actions.appendChild(button);
          });
          body.appendChild(actions);
        }
        wrapper.appendChild(body);
        appendTextNode(wrapper, 'div', row?.tag || '').className = 'object-tag';
        followupsNode.appendChild(wrapper);
      });
    }
    followupsNode.querySelectorAll('[data-object-followup-action]').forEach((button) => {
      button.addEventListener('click', async () => {
        const feedbackId = String(button.getAttribute('data-object-feedback-id') || '').trim();
        const nextStatus = String(button.getAttribute('data-object-followup-action') || '').trim();
        if (!feedbackId || !nextStatus) return;
        if (followupStatus) followupStatus.textContent = 'Updating follow-up state...';
        try {
          const endpoint = followupStatusEndpointTemplate.replace('__FEEDBACK_ID__', encodeURIComponent(feedbackId));
          const response = await fetch(endpoint, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ followup_status: nextStatus }),
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(String(body.detail || 'Could not update the follow-up state.'));
          const target = safeRows.find((row) => String(row?.feedback_id || '') === feedbackId);
          if (target) target.tag = nextStatus.replaceAll('_', ' ').replace(/\b\w/g, (match) => match.toUpperCase());
          renderFollowups(safeRows);
          if (followupStatus) followupStatus.textContent = `Follow-up marked ${nextStatus.replaceAll('_', ' ')}.`;
        } catch (error) {
          if (followupStatus) followupStatus.textContent = error instanceof Error ? error.message : 'Could not update the follow-up state.';
        }
      });
    });
  };
  renderFollowups(payload.followup_rows || []);
  const syncAdvancedToggleButtons = () => {
    const isOpen = advancedDetails instanceof HTMLDetailsElement && advancedDetails.open;
    advancedToggleButtons.forEach((button) => {
      button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  };
  if (advancedDetails instanceof HTMLDetailsElement) {
    advancedDetails.addEventListener('toggle', syncAdvancedToggleButtons);
    syncAdvancedToggleButtons();
  }
  const recordDecisionState = async (decisionState) => {
    if (!decisionState) return;
    if (decisionStateStatus) decisionStateStatus.textContent = 'Recording decision state...';
    try {
      const response = await fetch(structuredFeedbackEndpoint, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          stakeholder_id: `profile:${String(payload.person_id || 'self')}`,
          stakeholder_label: String(payload.person_id || 'self'),
          property_ref: String(payload.property_slug || payload.property_url || payload.property_title || 'property'),
          category: 'priority',
          sentiment: 'neutral',
          importance: 4,
          text: `Saved as ${String(decisionState || '').replaceAll('_', ' ')}.`,
          source: 'decision_lifecycle',
          decision_state: String(decisionState || ''),
        }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not record the decision state.'));
      if (decisionStateStatus) decisionStateStatus.textContent = `Saved as ${String(decisionState || '').replaceAll('_', ' ')}.`;
    } catch (error) {
      if (decisionStateStatus) decisionStateStatus.textContent = error instanceof Error ? error.message : 'Could not record the decision state.';
    }
  };
  root.querySelectorAll('[data-object-decision-state]').forEach((button) => {
    button.addEventListener('click', async () => {
      await recordDecisionState(String(button.getAttribute('data-object-decision-state') || '').trim());
    });
  });
  const renderClippy = (body) => {
    if (!clippyAnswer) return;
    const evidence = Array.isArray(body?.evidence) ? body.evidence : [];
    const actions = Array.isArray(body?.actions) ? body.actions : [];
    clearNode(clippyAnswer);
    const topRow = document.createElement('div');
    topRow.className = 'object-row';
    const topBody = document.createElement('div');
    appendTextNode(topBody, 'strong', body?.name || 'Question');
    appendTextNode(topBody, 'small', body?.answer || 'No answer yet.');
    topRow.appendChild(topBody);
    appendTextNode(topRow, 'div', 'Answer').className = 'object-tag';
    clippyAnswer.appendChild(topRow);
    evidence.forEach((row) => {
      const evidenceRow = document.createElement('div');
      evidenceRow.className = 'object-row';
      const evidenceBody = document.createElement('div');
      appendTextNode(evidenceBody, 'strong', row?.title || 'Detail');
      appendTextNode(evidenceBody, 'small', row?.detail || '');
      evidenceRow.appendChild(evidenceBody);
      appendTextNode(evidenceRow, 'div', row?.confidence || row?.source || '').className = 'object-tag';
      clippyAnswer.appendChild(evidenceRow);
    });
    if (actions.length) {
      const actionsWrap = document.createElement('div');
      actionsWrap.className = 'object-actions';
      actions.forEach((row, index) => {
        const button = document.createElement('button');
        button.className = 'console-action';
        button.type = 'button';
        button.setAttribute('data-object-clippy-action', String(row?.action || ''));
        button.setAttribute('data-object-clippy-index', String(index));
        button.textContent = String(row?.label || 'Action');
        actionsWrap.appendChild(button);
      });
      clippyAnswer.appendChild(actionsWrap);
    }
    clippyAnswer.querySelectorAll('[data-object-clippy-action]').forEach((button) => {
      button.addEventListener('click', async () => {
        const row = actions[Number.parseInt(String(button.getAttribute('data-object-clippy-index') || '-1'), 10)];
        if (!row) return;
        const action = String(row.action || '').trim();
        if (action === 'open_packet' && row.href) {
          window.location.href = String(row.href);
          return;
        }
        if (action === 'mark_blocker' && row.reason_key) {
          reaction = String(row.reaction || 'dislike').trim() || 'dislike';
          root.querySelectorAll('[data-object-feedback-reaction]').forEach((candidate) => {
            candidate.classList.toggle('active', candidate.getAttribute('data-object-feedback-reaction') === reaction);
          });
          const reasonButton = root.querySelector(`[data-object-feedback-reason="${CSS.escape(String(row.reason_key || ''))}"]`);
          if (reasonButton) {
            selectedReasons.add(String(row.reason_key || ''));
            reasonButton.classList.add('active');
          }
          if (status) status.textContent = `${String(row.detail || 'A reason').trim()} is now selected. Save when ready.`;
          return;
        }
        if (action === 'ask_agent' && row.question) {
          if (clippyStatus) clippyStatus.textContent = 'Writing agent follow-up into the timeline...';
          try {
            const response = await fetch(structuredFeedbackEndpoint, {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                stakeholder_id: `profile:${String(payload.person_id || 'self')}`,
                stakeholder_label: String(payload.person_id || 'self'),
                property_ref: String(payload.property_slug || payload.property_url || payload.property_title || 'property'),
                category: 'question',
                sentiment: 'neutral',
                importance: 4,
                text: String(row.question || ''),
                source: 'clippy_agent_brief',
                followup_status: 'asked',
              }),
            });
            const body = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(String(body.detail || 'Could not save the question.'));
            if (clippyStatus) clippyStatus.textContent = 'Question saved.';
          } catch (error) {
            if (clippyStatus) clippyStatus.textContent = error instanceof Error ? error.message : 'Could not save the question.';
          }
        }
      });
    });
  };
  clippyToggle?.addEventListener('click', () => {
    const open = Boolean(clippyPanel?.hidden);
    if (clippyPanel) clippyPanel.hidden = !open;
    clippyToggle.textContent = open ? 'Hide questions' : 'Ask about this home';
  });
  lifestyleToggle?.addEventListener('click', () => {
    const open = Boolean(lifestylePanel?.hidden);
    if (lifestylePanel) lifestylePanel.hidden = !open;
    lifestyleToggle.textContent = open ? 'Hide furnished look' : 'Furnished look';
  });
  root.querySelectorAll('[data-object-lifestyle-scene]').forEach((button) => {
    button.addEventListener('click', () => {
      const field = root.querySelector('[data-object-lifestyle-scene-type]');
      if (field) field.value = String(button.getAttribute('data-object-lifestyle-scene') || '').trim();
    });
  });
  const pollLifestyleGoogleSelection = async () => {
    if (!lifestyleSessionId) {
      if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = 'Start a Google Photos Picker session first.';
      return false;
    }
    try {
      const response = await fetch(googlePhotosSessionStatusTemplate.replace('__SESSION_ID__', encodeURIComponent(lifestyleSessionId)), {
        credentials: 'same-origin',
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not check the Google selection.'));
      if (body.media_items_set) {
        if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = 'Google photo selection is ready. You can generate the still now.';
        return true;
      }
      if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = 'Waiting for Google photo selection...';
      return false;
    } catch (error) {
      if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = error instanceof Error ? error.message : 'Could not check the Google selection.';
      return false;
    }
  };
  root.querySelector('[data-object-lifestyle-google-start]')?.addEventListener('click', async () => {
    if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = 'Opening Google Photos Picker...';
    try {
      const response = await fetch(googlePhotosSessionEndpoint, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ max_item_count: 3 }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not start the Google Photos Picker.'));
      lifestyleSessionId = String(body.session_id || '').trim();
      const pickerUri = String(body.picker_uri || '').trim();
      if (pickerUri) window.open(pickerUri, '_blank', 'noopener');
      if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = 'Google Photos Picker opened. Select up to 3 reference photos, then return here.';
      renderLifestyleReferenceList();
      if (lifestylePollingTimer) window.clearInterval(lifestylePollingTimer);
      lifestylePollingTimer = window.setInterval(async () => {
        const ready = await pollLifestyleGoogleSelection();
        if (ready && lifestylePollingTimer) {
          window.clearInterval(lifestylePollingTimer);
          lifestylePollingTimer = null;
        }
      }, 5000);
    } catch (error) {
      if (lifestyleGoogleStatus) lifestyleGoogleStatus.textContent = error instanceof Error ? error.message : 'Could not start the Google Photos Picker.';
    }
  });
  root.querySelector('[data-object-lifestyle-google-check]')?.addEventListener('click', async () => {
    await pollLifestyleGoogleSelection();
    renderLifestyleReferenceList();
  });
  root.querySelector('[data-object-lifestyle-upload-start]')?.addEventListener('click', () => {
    lifestyleUploadInput?.click();
  });
  root.querySelector('[data-object-lifestyle-reference-urls]')?.addEventListener('input', () => {
    renderLifestyleReferenceList();
  });
  lifestyleUploadInput?.addEventListener('change', async () => {
    const selected = [...(lifestyleUploadInput.files || [])].slice(0, 3);
    if (!selected.length) return;
    if (lifestyleUploadStatus) lifestyleUploadStatus.textContent = 'Uploading reference photos...';
    try {
      const items = await Promise.all(selected.map((file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({
          file_name: file.name,
          mime_type: file.type || 'image/jpeg',
          data_url: String(reader.result || ''),
        });
        reader.onerror = () => reject(new Error(`Could not read ${file.name}.`));
        reader.readAsDataURL(file);
      })));
      const response = await fetch(lifestyleUploadEndpoint, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ items }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not upload the reference photos.'));
      lifestyleUploadedReferenceUrls = Array.isArray(body.items)
        ? body.items.map((row) => String(row.reference_url || '').trim()).filter(Boolean).slice(0, 3)
        : [];
      renderLifestyleReferenceList();
      if (lifestyleUploadStatus) lifestyleUploadStatus.textContent = `${lifestyleUploadedReferenceUrls.length} reference photo${lifestyleUploadedReferenceUrls.length === 1 ? '' : 's'} uploaded.`;
    } catch (error) {
      if (lifestyleUploadStatus) lifestyleUploadStatus.textContent = error instanceof Error ? error.message : 'Could not upload the reference photos.';
    } finally {
      if (lifestyleUploadInput) lifestyleUploadInput.value = '';
    }
  });
  root.querySelector('[data-object-lifestyle-generate]')?.addEventListener('click', async () => {
    const sceneType = String(root.querySelector('[data-object-lifestyle-scene-type]')?.value || '').trim() || 'breakfast';
    const roomHint = String(root.querySelector('[data-object-lifestyle-room-hint]')?.value || '').trim();
    const stylingHint = String(root.querySelector('[data-object-lifestyle-styling-hint]')?.value || '').trim();
    const householdRoles = String(root.querySelector('[data-object-lifestyle-household-roles]')?.value || '')
      .split(',')
      .map((value) => value.trim())
      .filter(Boolean);
    const manualReferenceUrls = String(root.querySelector('[data-object-lifestyle-reference-urls]')?.value || '')
      .split('\n')
      .map((value) => value.trim())
      .filter(Boolean);
    const referenceUrls = [...lifestyleUploadedReferenceUrls, ...manualReferenceUrls].slice(0, 6);
    const consent = Boolean(root.querySelector('[data-object-lifestyle-consent]')?.checked);
    const includeChild = Boolean(root.querySelector('[data-object-lifestyle-include-child]')?.checked);
    const childConsent = Boolean(root.querySelector('[data-object-lifestyle-child-consent]')?.checked);
    const shareWithPacket = Boolean(root.querySelector('[data-object-lifestyle-share]')?.checked);
    if (lifestyleStatus) lifestyleStatus.textContent = 'Creating furnished image...';
    try {
      const response = await fetch(lifestyleCreateEndpoint, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          property_ref: String(payload.property_slug || payload.property_url || payload.property_title || 'property'),
          property_title: String(payload.property_title || ''),
          property_url: String(payload.property_url || ''),
          scene_type: sceneType,
          room_hint: roomHint,
          styling_hint: stylingHint,
          property_facts: payload.property_facts || {},
          reference_urls: referenceUrls,
          google_photos_session_id: lifestyleSessionId,
          household_roles: householdRoles,
          include_child_reference: includeChild,
          consent_personal_photos: consent,
          guardian_confirmed_for_children: childConsent,
          share_with_packet_pdf: shareWithPacket,
        }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not create the furnished image.'));
      payload[lifestyleScenePayloadKey] = body;
      renderLifestylePreview(body);
      renderLifestyleReferenceList();
      if (lifestyleStatus) lifestyleStatus.textContent = 'Furnished image ready. You can include it in the next PDF.';
    } catch (error) {
      if (lifestyleStatus) lifestyleStatus.textContent = error instanceof Error ? error.message : 'Could not create the furnished image.';
    }
  });
  root.querySelectorAll('[data-object-clippy-prompt]').forEach((button) => {
    button.addEventListener('click', () => {
      if (clippyQuestion) clippyQuestion.value = String(button.getAttribute('data-object-clippy-prompt') || '').trim();
    });
  });
  root.querySelector('[data-object-clippy-ask]')?.addEventListener('click', async () => {
    const question = String(clippyQuestion?.value || '').trim();
    if (!question) {
      if (clippyStatus) clippyStatus.textContent = 'Ask a specific question about this property first.';
      return;
    }
    if (clippyStatus) clippyStatus.textContent = 'Checking this page...';
    try {
      const response = await fetch(String(payload.clippy_endpoint || '/app/api/property/decision-copilot'), {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          property_ref: String(payload.property_slug || payload.property_url || payload.property_title || 'property'),
          property_title: String(payload.property_title || ''),
          property_url: String(payload.packet_href || payload.property_url || ''),
          question,
          property_facts: payload.property_facts || {},
          assessment: payload.assessment || {},
          investment_context: payload.investment_context || [],
        }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not answer right now.'));
      renderClippy(body);
      if (clippyStatus) clippyStatus.textContent = 'Answered from this page.';
    } catch (error) {
      if (clippyStatus) clippyStatus.textContent = error instanceof Error ? error.message : 'Could not answer right now.';
    }
  });
  root.querySelectorAll('[data-object-feedback-reaction]').forEach((button) => {
    button.addEventListener('click', () => {
      reaction = String(button.getAttribute('data-object-feedback-reaction') || '').trim();
      root.querySelectorAll('[data-object-feedback-reaction]').forEach((candidate) => {
        candidate.classList.toggle('active', candidate === button);
      });
    });
  });
  root.querySelectorAll('[data-object-feedback-reason]').forEach((button) => {
    button.addEventListener('click', () => {
      const key = String(button.getAttribute('data-object-feedback-reason') || '').trim();
      if (!key) return;
      if (selectedReasons.has(key)) {
        selectedReasons.delete(key);
        button.classList.remove('active');
      } else {
        selectedReasons.add(key);
        button.classList.add('active');
      }
    });
  });
  advancedToggleButtons.forEach((button) => {
    button.addEventListener('click', () => {
      if (!(advancedDetails instanceof HTMLDetailsElement)) return;
      const willOpen = !advancedDetails.open;
      advancedDetails.open = willOpen;
      syncAdvancedToggleButtons();
      if (willOpen) advancedDetails.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  root.querySelector('[data-object-feedback-save]')?.addEventListener('click', async () => {
    if (!reaction) {
      if (status) status.textContent = 'Choose Yes, Maybe, No, or Hide first.';
      return;
    }
    if (status) status.textContent = 'Saving decision...';
    try {
      const response = await fetch(String(payload.save_endpoint || ''), {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          property_slug: String(payload.property_slug || ''),
          property_url: String(payload.property_url || ''),
          property_title: String(payload.property_title || ''),
          property_facts: payload.property_facts || {},
          reaction,
          reason_keys: [...selectedReasons],
          note: String(root.querySelector('[data-object-feedback-note]')?.value || ''),
        }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(String(body.detail || 'Could not save feedback.'));
      const likes = Array.isArray(body.learning_summary?.likes) ? body.learning_summary.likes.length : 0;
      const dislikes = Array.isArray(body.learning_summary?.dislikes) ? body.learning_summary.dislikes.length : 0;
      if (status) status.textContent = `Saved. Profile now has ${likes} positive signal(s) and ${dislikes} avoid signal(s).`;
    } catch (error) {
      if (status) status.textContent = error instanceof Error ? error.message : 'Could not save feedback.';
    }
  });
  const urlParams = new URL(window.location.href).searchParams;
  const presetDecision = String(urlParams.get('decision') || '').trim().toLowerCase();
  const presetPrompt = String(urlParams.get('prompt') || '').trim();
  const shouldOpenClippy = String(urlParams.get('clippy') || '').trim() === '1' || Boolean(presetPrompt);
  const decisionMap = { yes: 'like', maybe: 'maybe', no: 'dislike', hide: 'hide' };
  if (decisionMap[presetDecision]) {
    reaction = decisionMap[presetDecision];
    root.querySelectorAll('[data-object-feedback-reaction]').forEach((candidate) => {
      candidate.classList.toggle('active', candidate.getAttribute('data-object-feedback-reaction') === reaction);
    });
    if (status) status.textContent = 'Decision shortcut loaded from the email or shared link. Save when ready.';
  }
  if (shouldOpenClippy) {
    if (clippyPanel) clippyPanel.hidden = false;
    if (clippyToggle) clippyToggle.textContent = 'Hide questions';
    if (clippyQuestion && presetPrompt) clippyQuestion.value = presetPrompt;
    if (clippyStatus && presetPrompt) clippyStatus.textContent = 'Question loaded from the email or shared link.';
  }
})();
</script>
