{% extends "base_public.html" %}
{% block content %}
<style>
  body:has(.pqx-score-viewer-shell) .topbar,
  body:has(.pqx-score-viewer-shell) footer {
    display: none;
  }
  body:has(.pqx-score-viewer-shell) main {
    padding: 0;
  }
  .pqx-score-viewer-shell {
    width: 100%;
    max-width: none;
    margin: 0;
    display: grid;
  }
  .pqx-score-viewer-frame {
    width: 100%;
    min-height: 100vh;
  }
  .pqx-score-viewer-frame iframe {
    width: 100%;
    min-height: 100vh;
    border: 0;
    display: block;
    background: var(--panel);
  }
</style>

<main class="pqx-score-viewer-shell">
  <section class="pqx-score-viewer-frame" aria-label="{{ score_methodology.get('pdf_title') or 'PropertyQuarry score methodology PDF' }}">
    <iframe src="{{ pdf_url }}" title="{{ score_methodology.get('pdf_title') or 'PropertyQuarry score methodology PDF' }}" loading="eager"></iframe>
  </section>
</main>
{% endblock %}
