  support_gate_drift: Hold organizer followthrough at blocked when Fleet support packet gates or packet ids drift from the cited source window.
  publication_drift: Hold event-prep packets at blocked when publication readiness loses its receipt-backed audience, retention, or artifact-shelf posture.
  hub_verifier_failure: Keep both packet families blocked when the Hub organizer or creator-publication proof lanes fail.
prohibited_behaviors:
