packet_families:
  launch_followthrough_drafts:
    state: hold
    audience: operator_and_public_copy_reviewer
    required_source_anchors:
      - fleet_launch_pulse_packet
      - fleet_weekly_governor_packet
      - design_launch_health_language
      - design_public_release_experience
    required_sections:
      - packet_identity
      - launch_decision_window
      - adoption_health_snapshot
      - proof_freshness_holds
      - public_copy_guardrails
      - next_safe_actions
    use_rule: Draft operator and public followthrough only when the Fleet launch pulse and public launch language still agree; hold publication when proof freshness or launch posture fails closed.
  reporter_followthrough:public:
    state: hold
    audience: reporter_and_operator
    required_source_anchors:
      - fleet_launch_pulse_packet
      - registry_release_channel
      - fleet_support_case_packets
      - design_launch_health_language
      - ea_governor_packet_baseline
    required_sections:
      - packet_identity
      - release_claim_guard
      - public_status_alignment
      - support_followthrough_gate
      - release_channel_posture
      - publish_hold_reason
    use_rule: Draft public reporter followthrough from launch-pulse truth without promoting fixed, live, or flagship claims beyond the registry rollout state and Fleet support gates.
fail_closed_posture:
  missing_launch_pulse: Refuse to draft operator or public followthrough when the Fleet launch-pulse packet is missing or unparseable.
  proof_freshness_blocked: Hold all public or reporter promotion when Fleet launch-pulse proof freshness is blocked or missing required input truth.
  release_channel_drift: Hold reporter and public followthrough when registry rollout posture, route tuple state, or fixed-availability wording drifts from the cited launch draft.
  support_gate_drift: Hold reporter followthrough when Fleet support packet gates, source rules, or ready counts drift from the draft.
  language_contract_drift: Hold publication when the design launch-health vocabulary or release-experience rules drift from the draft posture.
prohibited_behaviors:
  - Inventing a live, fixed, preview, fallback, revoked, or blocked posture not backed by launch-pulse, release-channel, and design language truth.
  - Turning stale proof freshness, missing source inputs, or queued support state into a green public launch claim.
  - Treating EA drafts as release authority, update authority, or canonical public status truth.
  - Copying worker assignment context, helper output, or startup command receipts into launch followthrough evidence.
