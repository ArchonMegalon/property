name: propertyquarry_multi_phase_regression
objective: >
  Ensure later phases do not break core PropertyQuarry browsing, research,
  packet, operator, and settings flows.
required_test_modules:
  - tests/e2e/test_propertyquarry_phase_regression_browser.py
  - tests/e2e/test_propertyquarry_flagship_flow.py
  - tests/e2e/test_propertyquarry_public_tour_browser.py
required_browser_workflows:
  - mobile_flagship_search_to_walkthrough_flow
  - mobile_flagship_walkthrough_decodes_nonblack_frame
  - shortlist_page_loads
  - research_packet_opens
  - packet_dashboard_loads
  - workspace_loads
  - operator_surface_loads
  - settings_and_billing_surfaces_load
  - hosted_tour_white_label_opens
  - hosted_flythrough_decodes_without_black_frame
fail_closed_conditions:
  - any core product route fails to render
  - any prior-phase primary affordance disappears
  - visual or interaction regression breaks core PQ loop
  - hosted tour or walkthrough playback regresses while the rest of the packet flow stays green
  - browser proof comes from stale image-baked runtime containers whose /version release manifest does not match the candidate commit
exit_criteria:
  - browser regression suite passes after every phase
  - runtime/browser proof comes from rebuilt or restarted containers whose /version release manifest matches the candidate commit
