operator_packet_specimen:
  packet_kind: operator_packets:weekly_governor
  packet_id_template: ea-weekly-governor-synthesis-{yyyy-mm-dd}
  truth_bundle_id: ea-m106-governor-readiness-parity-support-release-v1
  example_kind: illustrative_launch_when_all_launch_gates_clear
  authority_statement: EA recommends posture only; Fleet lands weekly governor packets and design owns canonical milestone meaning.
  required_inputs:
    - truth_bundle_id
    - release_health_state
    - flagship_readiness_state
    - journey_gate_state
    - support_closure_state
    - parity_evidence_status
    - reporter_followthrough_gate
    - cited_signal_ids
    - recommended_decision
    - exit_condition
    - downstream_action
  specimen_payload:
    truth_bundle_id: ea-m106-governor-readiness-parity-support-release-v1
    release_health_state: ready
    flagship_readiness_state: ready
    journey_gate_state: ready
    support_closure_state: clear
    parity_evidence_status: task_proven
    reporter_followthrough_gate: satisfied_or_not_applicable
    cited_signal_ids:
      - weekly_pulse
      - parity_lab_pack
      - fleet_weekly_governor_packet
      - fleet_support_packets
      - registry_release_channel
      - feedback_release_gate
      - progress_email_workflow
    recommended_decision: launch
    exit_condition: Keep launch only while release, journey, support, parity, and reporter followthrough gates continue to cite current source truth.
    downstream_action: Fleet may publish the weekly governor packet; Hub, Registry, and design-owned lanes retain their source-of-truth responsibilities.
  downgrade_examples:
    freeze:
      trigger: Missing support packet currency, release truth, or required reporter workflow receipt.
      required_copy: Name the blocking signal and the next evidence needed.
    canary:
      trigger: Release and journey gates are passable, but rollout evidence needs bounded cohort confirmation.
      required_copy: Name the cohort, rollback trigger, support posture, and next readout point.
    rollback:
      trigger: Promoted tuple or reporter-channel release truth is affected by a verified release regression.
      required_copy: Name the affected tuple or channel plus the Registry, Fleet, or Hub recovery route.
    focus_shift:
      trigger: Current gates are stable and the highest risk has moved to a successor milestone or cluster.
      required_copy: Name the successor milestone or risk cluster, owner repo, and next lane.
reporter_followthrough_specimen:
  packet_kind: reporter_followthrough:release_truth
  packet_id_template: ea-reporter-followthrough-release-truth-{yyyy-mm-dd}
  truth_bundle_id: ea-m106-governor-readiness-parity-support-release-v1
  example_kind: illustrative_stage_contracts_using_the_live_support_and_release_truth_window
  authority_statement: EA may queue reporter mail only from Hub case truth and Registry release-channel truth that satisfy the mirrored workflow.
  sender_identity:
    from_email: wageslave@chummer.run
    reply_to: support@chummer.run
    provider: emailit
    dispatch_tool: connector.dispatch
  required_stage_sequence:
    - request_received
    - audited_decision
    - fix_available
  source_signal_ids:
    - weekly_pulse
    - parity_lab_pack
    - fleet_weekly_governor_packet
    - fleet_support_packets
    - registry_release_channel
    - feedback_release_gate
    - progress_email_workflow
  specimen_stage_payloads:
    request_received:
      allowed_trigger_statuses:
        - received
      exactly_once_rule: exactly_once_per_case
      required_fields:
        - case_id
        - case_kind
        - reporter_summary
        - support_url
      release_truth_required: false
    audited_decision:
      allowed_trigger_statuses:
        - accepted
        - rejected
        - deferred
        - known_issue
        - needs_info
      exactly_once_rule: exactly_once_per_decision_change
      required_fields:
        - case_id
        - decision_status
        - decision_reason
        - implementation_posture
        - eta_text
        - award_label
        - next_owner
        - next_lane
      release_truth_required: false
    fix_available:
      allowed_trigger_statuses:
        - released_to_reporter_channel
      exactly_once_rule: exactly_once_per_reporter_channel_release
      required_fields:
        - case_id
        - fixed_version
        - fixed_channel
        - download_url
        - please_test_cta
      release_truth_required: true
      required_truth_planes:
        - Registry release-channel truth
        - Hub reporter-channel linkage
      forbidden_resolution_sources:
        - reproduced_bug
        - drafted_patch
        - merged_pr
        - preview_build
  dispatch_receipt_fields:
    - delivery_id
    - stage_id
    - case_id
    - recipient
    - from_email
    - subject
    - provider
