  single_bundle_rule: Operator posture and reporter mail readiness must cite this same bundle id; a packet compiled from a different readiness, parity, support, or release snapshot is not valid EA output for this package.
  materialized_truth_rule: The shared bundle must name the live Fleet weekly governor packet, Fleet support followthrough packet, and Registry release-channel source alongside the mirrored pulse, parity, and workflow anchors so operator and reporter output cannot drift onto parallel packet truth.
