    status: in_progress
    versioning_policy: SemVer. Breaking world-frame semantics, packet ownership rules, or consequence receipts is major; additive world object fields and cosmetic metadata are minor; compatible clarifications are patch.
    deprecation_policy: Deprecations are announced in design and hub with rollback guidance and are applied only when replacement contracts carry equivalent campaign/world observability contracts.
    consumers:
      - chummer6-hub
      - chummer6-ui
      - chummer6-mobile
      - chummer6-media-factory
