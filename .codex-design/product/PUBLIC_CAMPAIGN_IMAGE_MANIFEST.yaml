    prompt: |
      A vivid, lived-in credential-signin scene in the Sixth World where two metahuman runners check identity at a rain-specked access terminal beside stacked evidence crates, medical burn-in kits, and stacked dossier folders. Foreground: visible cyberlimb prosthetic hardware and a wired-to-brain commlink worn on one shoulder, a blood-stiffening medic wrap on the clinic cot, a spent stim vial, and a paper-paperweight with a Blood Orchid parabotany print. Midground: a troll streetdoc and ork courier arguing over route and trust while a decker checks route markers through diegetic AR. Background: a scratched Renraku/Saeder-Krupp panel with corporate branding fragments, a barred utility walkway with bug-tower skyline pressure over the horizon, hanging hellhound and barghest photographs, a faint warded totem portrait in AR, and glowing astral totem wards near the glass. Show recognizable shadowrun grime: rat traces at the floor edge, nicotine stains, bruised faces, and worn gear edges.
