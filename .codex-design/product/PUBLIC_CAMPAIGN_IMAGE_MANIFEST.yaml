product: chummer
surface: chummer.run
version: 2
mode: raster_campaign_only
style_anchor: |
  premium software-campaign still, grounded Shadowrun-inspired cyberpunk fantasy, editorial realism, original composition, visible metahuman physiology, obvious body-worn cyberware or patched chrome, diegetic AR anchored to gear, tools, or anatomy, visible grime, fatigue, cheap-med aftermath, vermin pressure, bruising, and hard-used spaces, scene-led vivid color chosen from saturated sodium spill, acid ad color, dirty daylight, sick fluorescents, ash gray, nicotine yellow, mold green, wet asphalt blue, market red, or warm proof light only when the place earns it, realistic skin and materials, layered physical props, high information density, product-specific semantics, visible lore pressure through lived consequence, no readable text, no logos
negative_prompt: |
  readable text, letters, giant monogram, logo, watermark, central signboard, empty alley, empty boulevard, billboard centerpiece, sparse desk with one prop, lone brooding figure at vague wall, entertainment poster pose, action-movie gun pose, anime, comic art, cel shading, cosplay look, over-saturated magenta neon, low-detail hands, distorted anatomy, fisheye lens, huge lens flare, floating nonsense UI clutter, stock-photo smile
output_rules:
  raster_only: true
  no_svg: true
  master_format: png
  derivatives:
    - avif
    - webp
  minimum_long_side_px: 2400
  compose_for_desktop: 16_9
  keep_critical_action_inside: center_60_percent
  no_text_baked_into_images: true
  no_logos: true
  no_interface_labels: true
  semantic_anchor_count_minimum: 3
  preferred_lenses:
    - 35mm_cinematic
    - 50mm_cinematic
  palette:
    - scene_led_vivid_saturated_color
    - sodium_or_fluorescent_hardship_lighting
    - selective_interface_glow
    - no_mandatory_green_dark_wash
    - not_clean_white_flatness
semantic_anchors:
  - dossier_papers_or_briefing_packet
  - six_sided_dice
  - cyberware_part_or_deck_module
  - visible_cyberlimb_or_datajack
  - megacorp_product_cue_or_scrip
  - critter_photo_or_parabotany_plate
  - magical_focus_or_reagent
  - astral_totem_or_ward_scar
  - sixth_world_location_cue
  - route_overlay_or_threat_marker
  - integrity_seal_or_evidence_clip
  - commlink_or_data_chip
  - reviewer_witness_or_operator_relationship
  - social_damage_aftermath
rejection_criteria:
  - giant_letterform_or_centered_signboard
  - empty_neon_boulevard
  - lone_person_at_vague_wall
  - sparse_desk_with_one_laptop_and_one_mug
  - generic_cyberpunk_mood_art_with_no_dossier_dice_or_proof_semantics
  - text_baked_into_the_image
  - poster_key_art_pose_instead_of_product_scene_storytelling
assets:
  - id: hero_shadowrun_assistant_nightdesk
    filename_base: hero-shadowrun-assistant-nightdesk
    runtime_targets:
      - landing.hero
      - home.hero
      - section_hero
    aspect_ratio: 16:9
    mobile_safe_crop: 4:5
    long_side_px: 2560
    negative_space: left_40
    selection_rule: generate_all_variants_pick_strongest
    prompt_variants:
      - name: hero_a_intake_trust_under_pressure
        prompt: |
          A premium first-contact still inside a midnight shadowrunner intake bay overlooking a rain-heavy city. Foreground: open dossier folios, cyberware calibration trays, detached chrome forearm hardware, sealed evidence sleeves, six-sided dice, med patches, stained gauze, a used stim inhaler, a commlink, a Paper Lotus charm, and abstract medscan overlays with no readable text. Midground: an ork or elf streetdoc stabilizes a scarred troll runner with visible treated chrome, rough body hair, bruising, dried blood, and ugly clinic fatigue while a teammate watches the numbers and gear. Background: service racks, clipped hell hound and barghest field photos, partial Ares or Renraku med hardware shells with logos obscured, one Blood Orchid botanical plate, wet glass, rat-trap and mold hints, and a skyline cue that could plausibly be Chicago after Bug City or a scarred Arcology district. Add a harder lore layer with a shaman casting a faint astral ward-glyph in the background, a few rat tracks in the hallway edge, and a dropped cough-syrup bottle near the treatment crate. Dense, layered, information-rich, unmistakably Shadowrun, not poster art.
      - name: hero_b_boulevard_of_futures
        prompt: |
          A premium hero still on a rain-polished near-future boulevard with multiple branching paths hinting at product lanes like runsites, dossiers, creator tools, and replay through grounded props and architecture instead of signs. A troll courier with a chrome leg, an elf decker with trodes, and one handler pause in the foreground, comparing a packet and AR route state before moving. Let the city look meaner: sleeping-bag shadows under an awning, a devil rat warning tin, grime, wet trash, bruised faces, and one burned-out stim kiosk shell at the edge of frame. Use recognizable location residue if it helps, such as Redmond Barrens bus shelter geometry, Puyallup ash on the curb, distant Chicago Bug City towers, or Ork Underground tilework. Add a sharper lore anchor with one visible totem portrait in weak AR at the frame edge, visible rat activity on the curb, and cracked hands from a long night of prep.
          Layered reflections, city depth, subtle magic-tech fusion, clear sense of choice and momentum, dense and cinematic, not an empty road scene.
      - name: hero_c_service_rack_prep
        prompt: |
          A premium landing hero inside a high-end prep bay with service racks, med storage, deck modules, gear bins, dossier props, and cyberware housings. Two metahuman runners collaborate over build verification while a third support figure observes, with chrome knuckles, datajacks, trode bands, anchored AR fit checks, and visible exhaustion at banner scale. Seed the room with Sixth World lore crumbs: an obscured Shiawase or Evo device shell, clipped devil rat pest snapshots, one grimy cleanup tray, a cough-syrup bottle, a faint astral totem silhouette or ward scar near the work glass, and a Blood Orchid print folded near evidence clips. Rain-glow city beyond glass, electric blue and warm amber accents, semantic richness everywhere, software trust under pressure, realistic editorial campaign photography.
  - id: capability_build_runner
    filename_base: capability-build-runner
    runtime_targets:
      - landing.product_workflows.build
      - capability_build_runner
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A professional runner-build workspace inside a safehouse. One player compares dossier fragments, metatype cues, obvious cyberware parts, lifestyle markers, gear pieces, spell fetishes, and six-sided dice while an assistant or GM leans in from the edge of frame to review. Show at least one obvious chrome limb seam, trode rig, or datajack in the cast, plus harder-world texture like grime, rat-chewed packaging, old bandages, or a spent stim patch. Add one visible marker of dependency fallout: a discarded inhaler pack or cracked stimulant tab nearby. The feeling is explainable character creation in a rough life, not generic desk glamour. Dense props, believable materials, grounded premium realism.
  - id: capability_check_rules
    filename_base: capability-check-rules
    runtime_targets:
      - story.rules_lab
      - landing.product_workflows.explain
      - capability_check_rules
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A precision rules-verification lab that mixes physical source evidence and digital audit traces. Modifier-chain overlays, clipped evidence markers, source fragments, cyberdeck component, spell reagent, ammo tags, and six-sided dice arranged with clean logic. Two people are present: one builder and one reviewer or witness. The scene must show hard-life stakes with a coughing runner on a nearby cot, med-waste bins, an insect-scattered drawer, and one visible scar on a support wrist under worn glove. The scene makes the math feel inspectable and trustworthy, with calm blue light and warm proof accents, no text.
  - id: scene_archive_stair
    filename_base: scene-archive-stair
    runtime_targets:
      - scene_archive_stair
      - story.lead
      - landing.proof_shelf.archive
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_30
    prompt: |
      A knowledge-archive stair in a battered Chummer research corridor, still clearly part of a living Sixth World archive chain: stacked primers, case folders, packet drawers, artifact lockers, and warped case cabinets.
      Two people move through the archive: one pulling a dossier, one reviewing a proof object while another nervous runner scans with narrowed eyes.
      Layered paper, glass, and metal textures with visible city dust, rust, and wet footprints.
      Add recognizable lore cues that read as real place pressure: Chicago Bug City tower line reflections on one wall, Ork Underground tilework edge detail, and at least one blurred Renraku, Ares, or Shiawase hardware shell still in frame.
      Hard-edge realism over romance: visible rat tracks near a corner crate, cracked medicine wraps, an old blood-stained med wrap, spent stim patch, and one totemic ward mark burned into wall paint.
      Add cybernetic density with at least two obvious cyberlimbs/augment kits on carts or racks, and no empty library fantasy or sparse office mood.
      Rich depth with layered foreground-midground-background, dense shadow, and no clean corporate lobby.
  - id: scene_simulation_bench
    filename_base: scene-simulation-bench
    runtime_targets:
      - scene_simulation_bench
      - landing.trust.simulation
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_30
    prompt: |
      A simulation bench for loadout and rules testing inside a dirty industrial test chamber with visible stress history: modular cyberware parts, partial cyberlimb housings, magical focus objects, six-sided dice, consequence traces, receipt markers, and measured overlay paths across a dense work surface.
      One builder and one reviewer, with at least one metahuman or visibly augmented body cue in frame, plus ugly reality beats: stained wraps, crash-kit residue, used gauze, rat scratch marks, cough syrup bottle, and an anxious breathing pause in posture.
      Include megacorp lineage hints on adjacent props (blurred Ares, Renraku, Horizon, or Wuxing labels), a blood-smudged devourer ward sketch, and one clipped devil rat photo strip mounted near a test rig.
      Add mystical debris in the background: a faint astral ward-circle, a totem silhouette fading in AR haze, and barghest/hellhound field photos pinned near the edge.
      Keep clinical precision with cinematic, high-contrast, cinematic polish. It should feel like explainable what-if analysis in hard conditions, not a clean hacker fantasy.
