product: chummer
version: 1
purpose: Canonical public FAQ entries for the downstream Chummer6 guide.
sections:
  - id: using_chummer6
    title: Using Chummer6
    entries:
      - question: Can I actually use this now?
        required: true
        answer: "Yes. Chummer6 is still preview software, but the preview is real: there are live downloads, current pages, and clear labels for what is still rough."
      - question: Is it offline-safe?
        required: true
        answer: That is one of the core goals. Chummer6 is being built so bad connectivity does not destroy your flow or your work.
      - question: Why would I trust it more than old opaque tool behavior?
        required: true
        answer: Because Chummer6 is trying to show how it reached an answer instead of asking you to accept mystery math.
      - question: What is preview versus available today?
        required: true
        answer: Available today means you can open it or download it right now. Preview means you can use it, but parts of the release, compatibility, or support story are still changing.
      - question: What should I show a skeptical GM or player first?
        required: true
        answer: Start with [What Chummer6 Is](WHAT_CHUMMER6_IS.md), then [Status](STATUS.md), then [Download](DOWNLOAD.md). If the real argument is about how the math is explained, show them [Core](PARTS/core.md).
  - id: participation_and_preview
    title: Helping and feedback
    entries:
      - question: How can I help?
        required: true
        answer: Start with bug reports, documentation feedback, and feature requests. If you want to help more directly, there is also an optional guided contribution path.
      - question: What is guided contribution?
        required: true
        answer: Guided contribution is an optional hands-on path for people who want to help more directly. It does not replace normal feedback or bug reports.
      - question: Do I need to join guided contribution to help?
        required: true
        answer: No. Normal bug reports, documentation feedback, and feature requests still matter. Guided contribution is optional.
      - question: Should I use the public issue tracker for a crash?
        required: true
        answer: Use the in-product private crash path when logs or diagnostics are involved. Use public issues for bugs that are safe to discuss in public.
      - question: Why are some things preview-only?
        required: true
        answer: Because some parts are good enough to try before every platform, install flow, and support path is equally polished.
      - question: Will guided-preview access open wider later?
        required: true
        answer: That is the goal. Early access may stay narrow while support cost, polish work, or approvals are still unusually high.
      - question: Can I participate privately?
        required: true
        answer: Yes. Public recognition should remain opt-in, and private participation should still be possible even when badges or leaderboards exist.
      - question: What are badges and leaderboards for?
        required: true
        answer: They are recognition and visibility features, not authority. They should celebrate verified contribution without replacing review or the rules themselves.
      - question: Would I need a Windows PC to join a run?
        required: true
        answer: No. The intended direction is that browsing runs, applying with a quickstart or approved runner, acknowledging table expectations, and receiving scheduling and handoff details should work without assuming a Windows-only setup.
      - question: Is Chummer trying to replace Discord or VTTs?
        required: true
        answer: No. The intended posture is that Chummer owns rules, applications, scheduling records, and world consequences, while Discord, Teams, and VTTs remain play or communication surfaces.
  - id: deeper_sources
    title: If you want the behind-the-scenes details
    entries:
      - question: Where does the deeper plan live?
        required: true
        answer: In the planning notes that shape the roadmap and the public guide.
      - question: Where does the actual code live?
        required: true
        answer: In the Chummer code. Most people never need it to install Chummer6, use it, or report a problem.
      - question: Where do I propose public-facing changes?
        required: true
        answer: Use the Chummer6 issue tracker for documentation feedback, bug reports, and feature requests.
