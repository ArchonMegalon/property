product: chummer
surface: release_control
version: 1
last_reviewed: 2026-04-16
purpose: Canonical six-journey release gate layer for proving the campaign OS as a lived system instead of only a coherent repo graph.

queued_follow_on_gates:
  - id: player_completes_sr6_combat_round_with_action_budget
    docs:
      - LIVE_ACTION_ECONOMY_AND_TURN_ASSIST.md
      - GM_RUNBOARD_LIVE_OPERATIONS.md
  - id: user_opens_local_rulebook_from_explain_drawer
    docs:
      - SOURCE_ANCHOR_AND_LOCAL_RULEBOOK_BINDING.md
  - id: existing_campaign_adopted_without_rebuilding_full_history
    docs:
      - CAMPAIGN_ADOPTION_WIZARD.md
  - id: player_pins_upgrade_and_tracks_progress_after_reward
    docs:
      - RUNNER_RESUME_AND_GOAL_PINS.md
  - id: gm_creates_a_playable_prep_packet
    docs:
      - PREP_PACKET_FACTORY_AND_PROCEDURAL_TABLES.md
      - CREW_AND_MISSION_FIT_MODEL.md
  - id: gm_closes_run_and_generates_resolution_report
    docs:
      - BLACK_LEDGER_MVP_001.md
  - id: resolution_report_creates_world_tick_and_player_safe_news_item
    docs:
      - BLACK_LEDGER_MVP_001.md
  - id: approved_run_resolution_updates_safe_seasonal_honors
    docs:
      - NETWORK_REPUTATION_AND_LEADERBOARDS_MODEL.md
      - SEASONAL_HONORS_AND_REPUTATION_MODEL.md

journey_gates:
  - id: install_claim_restore_continue
    title: Install, claim, restore, continue
    user_promise: A person can install the flagship client, claim it, restore the right workspace, and continue safely on a known install.
    canonical_journeys:
      - journeys/install-and-update.md
      - journeys/claim-install-and-close-a-support-case.md
      - journeys/continue-on-a-second-claimed-device.md
    owner_repos:
      - chummer6-ui
      - chummer6-hub
      - chummer6-hub-registry
      - fleet
    scorecard_refs:
      slos:
        - install_and_update_coherence
        - roaming_workspace_trust
        - golden_journey_proof
      release_gates:
        - install_and_update_gate
        - rule_environment_gate
        - roaming_workspace_gate
        - golden_journey_gate
      health_scorecards:
        - golden_journey_health
        - campaign_middle_health
        - rule_environment_trust
    fleet_gate:
      required_artifacts:
        - status_plane
        - progress_report
        - support_packets
      minimum_history_snapshots: 2
      target_history_snapshots: 4
      repo_source_proof:
        - repo: chummer6-hub
          path: .codex-studio/published/HUB_LOCAL_RELEASE_PROOF.generated.json
          must_contain:
            - '"contract_name": "chummer6-hub.local_release_proof"'
            - '"status": "passed"'
          max_age_hours: 48
          generated_at_fields:
            - generated_at
            - generatedAt
        - repo: chummer6-hub-registry
          path: .codex-studio/published/RELEASE_CHANNEL.generated.json
          json_must_be_one_of:
            releaseProof.status:
              - pass
              - passed
              - ready
            status:
              - published
              - publishable
          json_must_equal:
            desktopTupleCoverage.missingRequiredPlatforms: []
            desktopTupleCoverage.missingRequiredPlatformHeadPairs: []
            desktopTupleCoverage.missingRequiredPlatformHeadRidTuples: []
          json_must_be_non_empty_string:
            contract_name: true
            releaseProof.generatedAt: true
            rolloutReason: true
            supportabilitySummary: true
            knownIssueSummary: true
            fixAvailabilitySummary: true
          must_contain:
            - '"desktopTupleCoverage"'
            - '"releaseProof"'
            - '"missingRequiredPlatforms"'
            - '"missingRequiredPlatformHeadPairs"'
            - '"missingRequiredPlatformHeadRidTuples"'
          max_age_hours: 48
          generated_at_fields:
            - generated_at
            - generatedAt
        - repo: chummer6-ui
          path: Chummer.Desktop.Runtime/DesktopInstallLinkingRuntime.cs
          must_contain:
            - BuildSupportPortalRelativePathForInstall
            - BuildSupportPortalRelativePathForWorkspace
        - repo: chummer6-design
          path: products/chummer/COMPANION_PERSONA_AND_INTERACTION_MODEL.md
          must_contain:
            - "First-run and install onboarding"
            - "Mac bootstrap gremlin"
            - "Enable voice mode"
            - "Keep text only"
        - repo: chummer6-design
          path: products/chummer/COMPANION_EVENT_SCHEMA.yaml
          must_contain:
            - "first_run_greeting"
            - "install_bootstrap_route"
            - "voice_opt_in"
        - repo: chummer6-design
          path: products/chummer/COMPANION_PACKET.md
          must_contain:
            - "CompanionPacket"
            - "requires_user_gesture_for_voice"
            - "fallback_pack_id"
            - "desktop/mobile runtime must still work if EA, LLM, or media lanes are unavailable"
        - repo: chummer6-design
