cards:
  - id: product_story
    bucket: start_here
    title: Build
    summary: Create and advance a runner inside the explainable Shadowrun campaign OS.
    href: /downloads
    badge: Workflow
    audience: public
    image_family: solo_operator
    asset_slot: capability_build_runner
    action_label: Open downloads
    proof_note: "Proof: a real preview build exists now, not just a story about one."
    pain: Clean dossiers, visible tradeoffs, and no hidden modifier stack.
    payoff: Deterministic totals stay readable before you ever take the character to the table.
  - id: see_whats_real
    bucket: start_here
    title: Explain
    summary: See exactly why the number changed and what the table should trust.
    href: /now#real-rules-truth
    badge: Workflow
    audience: public
    image_family: simulation_bench
    asset_slot: capability_check_rules
    action_label: Inspect a real proof trail
    proof_note: "Proof: modifier trail, source trace, and repeatable output stay visible together."
    pain: Follow receipts, source traces, and modifier trails instead of arguing from vibes.
    payoff: The answer stays inspectable when somebody asks where the number came from.
  - id: get_the_poc
    bucket: start_here
    title: Campaign
    summary: Keep the session, campaign ledger, and next-session state coherent when devices or networks drift.
    href: /now#real-mobile-prep
    badge: Workflow
    audience: public
    image_family: streetfront
    action_label: See continuity in preview
    proof_note: "Proof: continuity survives device drift without hiding the current product limits."
    pain: Carry the same dossier, ledger, and session state across devices without losing trust.
    payoff: Receipt-backed continuity keeps the table moving even when the network does not cooperate.
