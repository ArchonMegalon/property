product: chummer
surface: media_factory
version: 1
purpose: >-
  Canonical workflow and adapter registry for repeatable Chummer media and
  companion artifacts. This file answers which lane is primary, which fallback
  remains acceptable, which repo orchestrates the work, which repo holds
  receipts and publication refs, which approval path applies, and where the
  finished artifact may surface.
defaults:
  orchestration_owner: chummer6-hub
  render_owner: chummer6-media-factory
  receipt_owner: chummer6-media-factory
  publication_registry_owner: chummer6-hub-registry
  runtime_companion_owner:
    - chummer6-ui
    - chummer6-mobile
  default_preview_lane: PeekShot
  default_document_lane: MarkupGo
  default_narration_lane: Soundmadeseen
  default_runtime_companion_lane: first_party_runtime_template
  default_approval_bridge:
    - hub_owned_approval_ui
    - ApproveThis
  feedback_lane: MetaSurvey
  forbidden_truth_moves:
    - vendor_as_rules_truth
    - vendor_as_session_truth
    - vendor_as_support_truth
    - vendor_as_publication_truth
    - unapproved_public_release
recipe_families:
  - id: campaign_cold_open_pack
    family: onboarding_bundle
    source_pack: approved_campaign_primer_pack
    primary_lane:
      tool: vidBoard
      output: campaign_primer_video
    fallback_lanes:
      - tool: MarkupGo
        output: campaign_primer_packet
        when: inspectable_packet_required
      - tool: Soundmadeseen
        output: campaign_primer_audio
        when: presenter_video_is_unavailable_or_unwanted
    approval_path: campaign_publish
    publish_surfaces:
      - hub_campaign_home
      - claimed_desktop_home
      - mobile_campaign_home
      - artifacts_gallery
    proof_anchors:
      - approved_campaign_primer_pack
      - locale
      - captions
      - preview_card
      - publication_ref
  - id: mission_briefing_reel
    family: campaign_briefing_bundle
    source_pack: approved_mission_brief_packet
    primary_lane:
      tool: vidBoard
      output: mission_brief_video
    fallback_lanes:
      - tool: Soundmadeseen
        output: mission_brief_audio
        when: audio_only_delivery_is_preferred
      - tool: MarkupGo
        output: mission_packet
        when: packet_detail_is_required
    approval_path: campaign_publish
    publish_surfaces:
      - hub_campaign_home
      - mobile_campaign_home
      - claimed_desktop_home
      - artifacts_gallery
    proof_anchors:
      - approved_mission_brief_packet
      - spoiler_audience_label
      - captions
      - preview_card
      - publication_ref
  - id: campaign_primer_companion_moment
    family: first_party_runtime_companion
    source_pack: campaign_primer_ready_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: campaign_primer_prompt_card
    fallback_lanes:
      - tool: vidBoard
        output: campaign_primer_video
        when: a_published_primer_video_is_ready_and_user_requests_playback
      - tool: MarkupGo
        output: campaign_primer_packet
        when: inspectable_detail_is_required
      - tool: Soundmadeseen
        output: campaign_primer_audio
        when: audio_is_better_than_video_or_card
    approval_path: campaign_publish
    publish_surfaces:
      - hub_campaign_home
      - claimed_desktop_home
      - mobile_campaign_home
    proof_anchors:
      - trigger_class
      - approved_campaign_primer_pack
      - fallback_pack_id
      - locale
      - text_fallback
      - publication_ref
  - id: mission_brief_ready_companion_moment
    family: first_party_runtime_companion
    source_pack: mission_brief_ready_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: mission_brief_prompt_card
    fallback_lanes:
      - tool: vidBoard
        output: mission_brief_video
        when: a_published_mission_briefing_is_ready_and_user_requests_playback
      - tool: MarkupGo
        output: mission_packet
        when: inspectable_detail_is_required
      - tool: Soundmadeseen
        output: mission_brief_audio
        when: audio_is_better_than_video_or_card
    approval_path: campaign_publish
    publish_surfaces:
      - hub_campaign_home
      - claimed_desktop_home
      - mobile_campaign_home
    proof_anchors:
      - trigger_class
      - approved_mission_brief_packet
      - fallback_pack_id
      - locale
      - text_fallback
      - publication_ref
  - id: first_run_companion_card
    family: first_party_runtime_companion
    source_pack: desktop_startup_companion_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: startup_companion_card
    fallback_lanes:
      - tool: vidBoard
        output: startup_companion_intro_clip
        when: a_pre_rendered_intro_clip_is_explicitly_requested
      - tool: MarkupGo
        output: install_setup_note
        when: written_install_context_is_better_than_a_card
    approval_path: release_owned_ui_copy
    publish_surfaces:
      - desktop_install_linking_shell
      - claimed_desktop_home
    proof_anchors:
      - trigger_class
      - install_bootstrap_route
      - fallback_pack_id
      - locale
      - text_fallback
      - voice_opt_in_required
      - dismissability
  - id: build_lab_explain_short
    family: explain_bundle
    source_pack: approved_build_lab_explain_packet
    primary_lane:
      tool: vidBoard
      output: build_explainer_video
    fallback_lanes:
      - tool: MarkupGo
        output: build_compare_packet
        when: inspectable_detail_is_required
      - tool: Soundmadeseen
        output: build_explainer_audio
        when: compact_audio_is_better_than_video
    approval_path: explain_release
    publish_surfaces:
      - build_lab_compare
      - help_explain_surface
      - artifacts_gallery
    proof_anchors:
      - rule_environment_receipt
      - explain_packet_ref
      - locale
      - preview_card
  - id: build_trap_intervention_card
    family: first_party_runtime_companion
    source_pack: build_lab_trap_warning_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: build_trap_companion_card
    fallback_lanes:
      - tool: MarkupGo
        output: build_compare_packet
        when: inspectable_detail_is_required
      - tool: Soundmadeseen
        output: build_trap_audio_sting
        when: compact_audio_feedback_is_better_than_a_card
    approval_path: explain_release
    publish_surfaces:
      - build_lab_compare
      - claimed_desktop_home
      - mobile_campaign_home
    proof_anchors:
      - trigger_class
      - rule_environment_receipt
      - explain_packet_ref
      - fallback_pack_id
      - locale
      - text_fallback
      - dismissability
      - why_am_i_seeing_this
  - id: campaign_drift_companion_card
    family: first_party_runtime_companion
    source_pack: campaign_drift_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: campaign_drift_companion_card
    fallback_lanes:
      - tool: MarkupGo
        output: campaign_rule_diff_packet
        when: inspectable_rule_diff_is_required
      - tool: vidBoard
        output: campaign_change_host_clip
        when: a_localized_host_summary_is_explicitly_requested
    approval_path: campaign_publish
    publish_surfaces:
      - hub_campaign_home
      - claimed_desktop_home
      - mobile_campaign_home
    proof_anchors:
      - trigger_class
      - campaign_rule_diff_ref
      - runner_impact_ref
      - fallback_pack_id
      - locale
      - text_fallback
      - dismissability
  - id: runsite_host_mode
    family: spatial_orientation_bundle
    source_pack: approved_runsite_pack
    primary_lane:
      tool: vidBoard
      output: runsite_orientation_video
    fallback_lanes:
      - tool: Crezlo Tours
        output: runsite_tour
        when: explorable_space_is_preferred
      - tool: AvoMap
        output: runsite_route_overlay
        when: route_first_orientation_is_needed
      - tool: Soundmadeseen
        output: runsite_orientation_audio
        when: low_friction_mobile_playback_is_preferred
    approval_path: campaign_publish
    publish_surfaces:
      - hub_campaign_home
      - mobile_campaign_home
      - artifacts_gallery
    truth_order:
      - approved_runsite_pack
      - approved_route_summary
      - inspectable_route_or_tour_sibling
      - rendered_host_mode
    inspection_siblings:
      - runsite_route_overlay
      - runsite_tour
      - approved_runsite_pack
    launch_requirements:
      - route_overlay_visible_before_playback
      - route_overlay_reachable_during_playback
      - tour_sibling_visible_when_available
      - host_mode_never_only_surface
    proof_anchors:
      - approved_runsite_pack
      - approved_route_summary
      - inspectable_route_ref
      - inspectable_pack_ref
      - route_preview
      - preview_card
      - publication_ref
  - id: table_pulse_debrief_pack
    family: private_post_session_bundle
    source_pack: approved_session_recap_or_debrief_packet
    primary_lane:
      tool: MarkupGo
      output: gm_debrief_packet
    fallback_lanes:
      - tool: Soundmadeseen
        output: gm_private_debrief_audio
        when: narration_is_better_than_video
      - tool: vidBoard
        output: gm_private_debrief_video
        when: gm_private_video_is_explicitly_requested_and_approved
      - tool: PeekShot
        output: player_safe_summary_card
        when: a_share_safe_summary_is_allowed
    approval_path: campaign_private
    publish_surfaces:
      - gm_private_workspace
      - campaign_private_archive
    bounded_support_lanes:
      - hedy.ai
      - Nonverbia
      - Unmixr AI
    proof_anchors:
      - consent_state
      - approved_structural_digest
      - retention_policy
      - preview_card_if_shared
  - id: player_safe_recap_companion_moment
    family: first_party_runtime_companion
    source_pack: player_safe_recap_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: player_safe_recap_prompt_card
    fallback_lanes:
      - tool: MarkupGo
        output: player_safe_recap_packet
        when: inspectable_recap_detail_is_required
      - tool: Soundmadeseen
        output: player_safe_recap_audio
        when: narration_is_better_than_a_card
      - tool: vidBoard
        output: player_safe_recap_video
        when: a_bounded_video_prompt_is_explicitly_requested
    approval_path: campaign_private
    publish_surfaces:
      - campaign_workspace
      - mobile_home
    proof_anchors:
      - trigger_class
      - approved_player_safe_recap_packet
      - consent_state
      - retention_policy
      - fallback_pack_id
      - text_fallback
  - id: gm_private_debrief_companion_invite
    family: first_party_runtime_companion
    source_pack: gm_private_debrief_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: gm_private_debrief_prompt_card
    fallback_lanes:
      - tool: MarkupGo
        output: gm_debrief_packet
        when: inspectable_detail_is_required
      - tool: Soundmadeseen
        output: gm_private_debrief_audio
        when: narration_is_better_than_a_card
      - tool: vidBoard
        output: gm_private_debrief_video
        when: a_private_video_walkthrough_is_explicitly_requested_and_approved
    approval_path: campaign_private
    publish_surfaces:
      - campaign_workspace
      - gm_private_workspace
    proof_anchors:
      - trigger_class
      - approved_gm_debrief_packet
      - privacy_boundary
      - retention_policy
      - fallback_pack_id
      - text_fallback
  - id: fix_confirmation_and_release_concierge
    family: release_and_support_bundle
    source_pack: approved_support_resolution_summary
    primary_lane:
      tool: vidBoard
      output: support_closure_video
    fallback_lanes:
      - tool: MarkupGo
        output: support_fix_note
        when: written_detail_is_required
      - tool: Documentation.AI
        output: help_article_projection
        when: a_help_sibling_needs_to_be_refreshed
      - tool: Soundmadeseen
        output: support_closure_audio
        when: audio_is_better_than_presenter_video
    approval_path: support_resolution
    publish_surfaces:
      - signed_in_help
      - support_case_timeline
      - release_shelf
    proof_anchors:
      - release_channel_confirmation
      - support_case_ref
      - locale
      - captions
      - publication_ref
  - id: fix_closure_companion_moment
    family: first_party_runtime_companion
    source_pack: support_fix_closure_event_packet
    primary_lane:
      tool: first_party_runtime_template
      output: fix_closure_companion_card
    fallback_lanes:
      - tool: vidBoard
        output: support_closure_video
        when: a_rendered_support_explainer_is_requested
      - tool: MarkupGo
        output: support_fix_note
        when: written_detail_is_required
      - tool: Soundmadeseen
        output: support_closure_audio
        when: compact_audio_is_better_than_video_or_card
    approval_path: support_resolution
    publish_surfaces:
      - signed_in_help
      - support_case_timeline
      - claimed_desktop_home
    proof_anchors:
      - trigger_class
      - release_channel_confirmation
      - support_case_ref
      - fallback_pack_id
      - locale
      - dismissability
      - text_fallback
  - id: release_explainer_bundle
    family: public_release_bundle
    source_pack: approved_release_summary
    primary_lane:
      tool: vidBoard
      output: public_release_explainer
    fallback_lanes:
      - tool: MarkupGo
        output: release_notes_page
        when: written_release_notes_are_primary
      - tool: PeekShot
        output: release_preview_card
        when: a compact release share card is needed
    approval_path: public_release
    publish_surfaces:
      - downloads_shelf
      - now_page
      - artifacts_gallery
    proof_anchors:
      - registry_backed_release_metadata
      - captions
      - preview_card
      - publication_ref
  - id: creator_promo_kit
    family: creator_publication_bundle
    source_pack: approved_artifact_manifest
    primary_lane:
      tool: vidBoard
      output: creator_promo_video
    fallback_lanes:
      - tool: MarkupGo
        output: artifact_packet
        when: long_form_context_is_needed
      - tool: PeekShot
        output: creator_share_card
        when: a compact public teaser is needed
      - tool: Mootion
        output: bounded_motion_teaser
        when: motion_only_support_is_good_enough
    approval_path: publication
    publish_surfaces:
      - artifacts_gallery
      - artifact_detail_page
      - creator_public_page
    proof_anchors:
      - approved_artifact_manifest
      - locale
      - preview_card
      - publication_ref
  - id: black_ledger_city_tick_pack
    family: world_tick_distribution_bundle
    source_pack: approved_world_tick_publication_packet
    primary_lane:
      tool: vidBoard
      output: city_tick_host_reel
    fallback_lanes:
      - tool: MarkupGo
        output: world_tick_bulletin
        when: inspectable_digest_is_primary
      - tool: PeekShot
        output: world_tick_share_card
        when: compact_public_or_operator_card_is_needed
      - tool: Soundmadeseen
        output: city_tick_audio
        when: audio_native_distribution_is_needed
      - tool: Taja
        output: approved_social_cuts
        when: source_video_is_approved_for_public_distribution
    approval_path: world_tick_publication
    publish_surfaces:
      - world_latest_page
      - city_ticker_page
      - faction_dispatch_page
      - artifacts_gallery
    distribution_lanes:
      - Signitic
      - Emailit
      - ProductLift
    proof_anchors:
      - world_tick_ref
      - visibility_class
      - spoiler_class
      - publication_ref
      - signature_campaign_ref
      - email_delivery_receipt_ref
      - journey_proof_event_ref
  - id: karma_forge_discovery_explainer
    family: public_discovery_bundle
    source_pack: approved_house_rule_demand_packet_summary
    primary_lane:
      tool: MarkupGo
      output: karma_forge_candidate_packet
    fallback_lanes:
      - tool: vidBoard
        output: karma_forge_candidate_explainer
        when: public_recruitment_or_closeout_video_is_approved
      - tool: PeekShot
        output: house_rule_candidate_card
        when: compact_public_signal_card_is_needed
      - tool: Taja
        output: approved_short_clips
        when: approved_video_needs_public_distribution
    approval_path: product_governor_discovery_closeout
    publish_surfaces:
      - karma_forge_participation_page
      - productlift_closeout
      - public_guide_article
    distribution_lanes:
      - ProductLift
      - Signitic
      - Emailit
    proof_anchors:
      - house_rule_demand_packet_ref
      - product_governor_decision_ref
      - privacy_ip_review_receipt
      - public_closeout_receipt
