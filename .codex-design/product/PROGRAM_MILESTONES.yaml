- repo: chummer6-hub
  status: healthy
  score: 0.83
  reason: Run/play contract canon plus registry/media owner transfer are now executable; remaining work is orchestrator-side adapter and product-surface polish.
- repo: chummer6-mobile
  status: healthy
  score: 0.91
  reason: The play shell is materially real, mirror coverage is present, and replay/resume/package-boundary proof is executable.
- repo: chummer6-ui-kit
  status: healthy
  score: 0.88
  reason: The shared package boundary is clear and downstream UI/mobile repos now enforce package-only primitive consumption in verification.
- repo: chummer6-hub-registry
  status: healthy
  score: 0.9
  reason: Contract shape and runtime registry service ownership now live together in the owner repo; downstream authority transfer is executable.
- repo: chummer6-media-factory
  status: healthy
  score: 0.84
  reason: The render-only contract plane and runtime execution now both live here, with clean-room integration proof from the hosted repo.
- repo: fleet
  status: healthy
  score: 0.86
  reason: Compile, runtime healing, publish readiness, and journey-gate truth now live together as one governed control-plane seam instead of a loose operator toolbox.
program_phases:
- id: A
  title: Design and contract canon
  status: complete
  goal: Make central design and package ownership trustworthy.
  milestones:
  - id: A0
    title: chummer6-design bootstrap complete
    owners:
    - chummer6-design
    status: complete
    exit:
    - Active repo list matches the live repo graph.
    - Media-factory is represented in ownership, milestones, blockers, sync, and project
      scope.
    - Canonical files are substantive, not placeholders.
    - Root-level orphan product docs are removed or relocated.
  - id: A1
    title: Engine contract canon
    owners:
    - chummer6-core
    - chummer6-design
    status: complete
    exit:
    - Chummer.Engine.Contracts is the sole canonical engine/shared contract package.
    - Engine runtime, explain, and reducer DTO families are owned once.
  - id: A2
    title: Play contract canon
    owners:
    - chummer6-hub
    - chummer6-mobile
    - chummer6-design
    status: complete
    exit:
    - Chummer.Play.Contracts has stable ownership and package naming.
    - Play consumes package-only seams, including hosted play API and replay/checkpoint DTOs.
    - No duplicated play/run session transport DTO families remain across hosted/mobile surfaces.
  - id: A3
    title: Run orchestration contract canon
    owners:
    - chummer6-hub
    - chummer6-design
    status: complete
    exit:
    - Chummer.Run.Contracts owns hosted orchestration DTOs only.
    - Media and registry execution contracts are no longer mixed into run orchestration
      families.
  - id: A4
    title: External tools plane canon
    owners:
    - chummer6-design
    - chummer6-hub
    - chummer6-media-factory
    status: complete
    exit:
    - External tools policy exists centrally.
    - All owned tools are classified by architectural role.
    - System-of-record rules are documented.
    - External integrations are assigned to owning repos.
