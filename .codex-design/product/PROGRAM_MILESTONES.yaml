- id: K
  title: Desktop auto-update
  status: complete
  release_blocking: false
  goal: Make Windows, macOS, and Linux desktop heads installer-aware and self-updating through registry-owned channel truth and UI-owned apply helpers without turning Hub or Fleet into the runtime source of truth.
  milestones:
  - id: K0
    title: Desktop update canon established
    owners:
    - chummer6-design
    - chummer6-ui
    - chummer6-hub-registry
    - fleet
    status: complete
    exit:
    - "`DESKTOP_AUTO_UPDATE_SYSTEM.md` exists and agrees with `RELEASE_PIPELINE.md`."
    - Install media versus machine update payloads are explicitly distinguished.
    - UI, registry, Hub, and Fleet ownership rules are explicit.
    - Windows `.exe`, macOS `.dmg`, and Linux `.deb` desktop targets are required release-wave build outputs, even when public promotion remains per-platform.
  - id: K1
    title: Registry desktop release heads
    owners:
    - chummer6-hub-registry
    - chummer6-design
    status: complete
    exit:
    - "`Chummer.Hub.Registry.Contracts` includes desktop release-head and update-feed DTOs."
    - Promoted desktop heads reference install media, machine update payloads, embedded runtime-bundle heads, and release-note references.
    - Rollout, pause, and revoke state are part of registry truth.
  - id: K2
    title: Cross-platform desktop build and startup smoke gate
    owners:
    - chummer6-ui
    - fleet
    status: complete
    exit:
    - The release lane builds Windows `.exe`, macOS `.dmg`, and Linux `.deb` artifacts from one release candidate.
    - Each built desktop head is launched on a platform-appropriate verification host before promotion.
    - A startup crash or failed-ready smoke result emits a release-regression packet with platform, version, digest, and bounded logs.
    - The product governor routes failed startup smoke through freeze, reroute, or fix posture before retrying promotion.
  - id: K3
    title: Windows desktop head self-updates
    owners:
    - chummer6-ui
    - chummer6-hub-registry
    - fleet
    status: complete
    exit:
    - The Windows desktop client records pinned channel and installed version locally.
    - The desktop head can check, stage, apply, and relaunch into a newer version through a UI-owned apply helper.
    - Signed payload verification happens before apply and a last-known-good window exists until first successful launch.
  - id: K4
    title: macOS desktop head self-updates
    owners:
    - chummer6-ui
    - chummer6-hub-registry
    - fleet
    status: complete
    exit:
    - The macOS desktop head ships as a `.dmg` install surface rather than archive cargo.
    - The desktop head can check, stage, apply or hand off, relaunch, and recover without making the `.dmg` the runtime source of truth.
    - Release evidence proves the macOS binary can be built, signed or notarized where required, and launched in startup smoke on a macOS verification host.
  - id: K5
    title: Linux desktop head installer/update handoff
    owners:
    - chummer6-ui
    - chummer6-hub-registry
    - fleet
    status: complete
    exit:
    - The Linux desktop client ships as a `.deb` installer rather than a public portable archive.
    - The updater can either apply an in-place payload or hand off the `.deb` installer when the lane is installer-only.
    - Release evidence proves the Linux binary can be built and launched in startup smoke on a Linux verification host.
  - id: K6
    title: Rollout, revoke, and rollback discipline
    owners:
    - chummer6-hub-registry
    - chummer6-ui
    - fleet
    status: complete
    exit:
    - Registry can pause or revoke a bad desktop head.
    - Clients do not auto-apply revoked or downgraded heads.
    - Promotion evidence includes the signature, digest, and notarization material needed to make rollback and recovery predictable.
- id: L
  title: Feedback and crash reporting
  status: complete
  release_blocking: false
  goal: Ship the first real support plane with crash reporting, structured bug reporting, lightweight feedback, honest closure, and an optional grounded assistant that stays downstream of real case truth.
  milestones:
  - id: L0
    title: Support and crash canon established
    owners:
    - chummer6-design
    - chummer6-ui
    - chummer6-hub
    status: complete
    exit:
    - "`FEEDBACK_AND_CRASH_REPORTING_SYSTEM.md` exists and agrees with `OWNERSHIP_MATRIX.md`, `PUBLIC_HELP_COPY.md`, and `EXTERNAL_TOOLS_PLANE.md`."
    - Crash reports, bug reports, and feedback are explicitly different intake lanes.
    - The support assistant is explicitly phase 2 rather than phase 0.
  - id: L1
    title: Crash capture and recovery lane
    owners:
    - chummer6-ui
    - chummer6-hub
    - chummer6-hub-registry
    - fleet
    status: complete
    exit:
    - Desktop clients can create a redacted diagnostics bundle and offer a next-launch crash recovery dialog.
    - Private crash submission does not depend on chat, sign-in, or a new AppSumo LTD.
    - Hosted support intake is version-aware using registry-backed release facts where available.
    - Redacted crash envelopes enter through Hub-owned intake rather than raw client-to-Fleet submission.
    - Fleet consumes normalized crash work items for triage and patch preparation without bypassing review or release gates.
  - id: L2
    title: Structured bug reporting lane
    owners:
    - chummer6-ui
    - chummer6-hub
    status: complete
    exit:
    - Users can submit expected-versus-actual behavior, repro steps, optional screenshots, and optional diagnostics.
    - Public-safe reproducible bugs can link or promote into the public issue lane.
    - Sensitive or account-specific bug cases stay private in Hub support threads.
  - id: L3
    title: Lightweight feedback lane
    owners:
    - chummer6-ui
    - chummer6-hub
    status: complete
    exit:
    - Users can send low-friction product feedback without opening a full bug ticket.
    - Structured feedback bridges remain adapter-bound and do not become support truth.
    - Feedback can be clustered and triaged without pretending survey vendors are the ticket system of record.
  - id: L4
    title: Knowledge base and human escalation
    owners:
    - chummer6-hub
    - chummer6-design
    status: complete
    exit:
    - Help and known-issue surfaces are version-aware and linked to support cases where needed.
    - Human escalation exists for private crash and bug cases.
    - Hub help surfaces can reflect update availability and release posture without replacing registry truth.
  - id: L5
    title: Support assistant later
    owners:
    - chummer6-hub
    - chummer6-design
    status: complete
    exit:
    - A support assistant lands only after crash, bug-report, feedback, and human-escalation lanes are real.
    - The assistant answers from curated help, release, and signed-in case truth and hands off cleanly when confidence is low.
    - "`Karma Forge` is not reused as the support-assistant name."
