repo_boundary_purity:
- repo: chummer6-design
  status: healthy
  score: 0.93
  reason: Canonical repo/milestone/blocker truth is now substantive and current; remaining drift is compatibility-only.
- repo: chummer6-core
  status: caution
  score: 0.72
  reason: Engine/package canon and session semantic ownership are now executable; remaining caution is legacy app/plugin and helper cargo, not contract ambiguity.
- repo: chummer6-ui
  status: healthy
  score: 0.79
