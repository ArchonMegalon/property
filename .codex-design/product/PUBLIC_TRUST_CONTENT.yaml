product: chummer
surface: chummer.run
version: 1
trust_pages:
  - id: help
    eyebrow: "Help"
    heading: "Get help without guessing"
    intro: "Start here for downloads, sign-in recovery, and support."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "First-party help comes first"
      - "Support is separate from participation"
      - "Downloads and setup stay clear"
    actions:
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: primary
      - label: "See what works today"
        href: "/now"
        tone: secondary
      - label: "Open downloads"
        href: "/downloads"
        tone: ghost
    sections:
      - id: install-update
        eyebrow: "Install or update"
        heading: "Start with the release page and download help"
        body: "The release page should answer the normal download and setup questions directly: current package, known issues, update status, and the next support step if the path still is not clear."
        bullets:
          - "The release page should make the current public download obvious."
          - "Installer language stays off until an installer is actually published."
          - "Create an account when you want tracked support, recovery, or future linked installs."
          - "Check the release page before assuming another platform is on the public shelf."
      - id: sign-in-recovery
        eyebrow: "Sign-in or account recovery"
        heading: "Keep access and recovery on one calm path"
        body: "Account creation, sign-in, and recovery should stay boring. Use the account page and the recovery flow before you fall back to manual troubleshooting."
        bullets:
          - "Create an account when you want recovery, tracked support, and a cleaner return path for future downloads."
          - "Use recovery email so one sign-in method is never the whole story."
          - "Devices and access stay separate from identity recovery."
      - id: product-bug
        eyebrow: "Product bug"
        heading: "Product help should become a support case, not a rumor"
        body: "Use Contact first for install trouble, product bugs, and practical feedback. GitHub is there when you want a public bug thread, not as the normal support door."
        bullets:
          - "Use Contact for install trouble, product bugs, or UX friction."
          - "Use Account > Support if you want your support history saved in one place."
          - "Use GitHub only when you want a public bug thread."
      - id: product-question
        eyebrow: "Product question or UX confusion"
        heading: "Ask from inside Chummer first"
        body: "Normal preview questions should be answerable from inside the product. Support and FAQ exist so you do not have to dig through project details just to get a clear answer."
        bullets:
          - "FAQ answers the normal preview and product questions in plain language."
          - "Support cases stay separate from optional participation."
          - "You do not need a GitHub account to ask for help."
  - id: privacy
    eyebrow: "Privacy"
    heading: "What Chummer stores, and what it does not"
    intro: "This is the simple privacy picture right now: what your account stores, what stays out, and how support and linked installs work."
    effective_date: "2026-03-25"
    updated_date: "2026-03-28"
    summary_points:
      - "The download file stays the same for everyone"
      - "Your account stores sign-in and support history"
      - "Raw secret keys stay out of your account record"
    actions:
      - label: "Open account"
        href: "/account"
        tone: primary
      - label: "Read terms"
        href: "/terms"
        tone: secondary
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: ghost
    sections:
      - id: hosted-account
        eyebrow: "Account record"
        heading: "Your account keeps sign-in, preferences, and support together"
        body: "Your Chummer account keeps your basic profile, linked sign-in methods, device access, support cases, and preview preferences together so you do not have to rebuild that history by hand."
      - id: install-linking
        eyebrow: "Install linking"
        heading: "The download file is the same for everyone"
        body: "When Chummer publishes a download, everyone gets the same file. Chummer does not build a private installer just for your account. If linked handoff is available, the account-aware piece is the short-lived receipt or code that reconnects a local copy back to your account."
      - id: not-in-hub
        eyebrow: "What stays out"
        heading: "Temporary sign-in tokens and raw secrets stay out of your account record"
        body: "Short-lived third-party tokens stay on the machine or service using them. Your account keeps consent, support, and access records, not raw secret keys."
      - id: recognition-privacy
        eyebrow: "Privacy and recognition"
        heading: "Recognition should not force publicity"
        body: "Participation and recognition remain optional layers. Private product use, private support, and a quiet account setup remain valid even while community pages exist."
  - id: terms
    eyebrow: "Terms"
    heading: "Preview terms in plain language"
    intro: "These are the plain rules for the current preview: early access, honest labels, real downloads, and straightforward support."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "Early access, not finished breadth"
      - "Current downloads when available"
      - "Support starts with Chummer"
    actions:
      - label: "Open downloads"
        href: "/downloads"
        tone: primary
      - label: "Read privacy"
        href: "/privacy"
        tone: secondary
      - label: "Open help"
        href: "/help"
        tone: ghost
    sections:
      - id: preview-posture
        eyebrow: "Preview status"
        heading: "The product is real, but still early access"
        body: "Expect real pages, current downloads, visible proof, and explicit preview labels when support, compatibility, or breadth are still moving."
      - id: account-support
        eyebrow: "Account and support"
        heading: "Sign-in is simple, and support starts with Chummer"
        body: "Sign-in keeps your access, devices, and support history together. Help and Contact are the normal first stops before any public issue thread."
      - id: delivery
        eyebrow: "Delivery"
        heading: "Use the current public download first; advanced packages only when necessary"
        body: "Public downloads should match what is honestly available right now. If a regular installer exists later, it becomes the normal path, while manual packages stay as fallback for edge cases or support-directed setup."
  - id: contact
    eyebrow: "Contact"
    heading: "Open the right support case"
    intro: "Chummer should not make you guess where to send a problem. Start here for install help, bugs, and practical feedback."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "Direct support intake"
      - "Guest submissions allowed"
      - "Tracked follow-up with an account"
    actions:
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: primary
      - label: "Open account support"
        href: "/signup?next=%2Faccount%2Fsupport"
        tone: secondary
      - label: "Read help first"
        href: "/help"
        tone: ghost
    sections:
      - id: right-lane
        eyebrow: "Route it cleanly"
        heading: "Pick the case type that matches the problem"
        body: "Use install or update for package and launcher trouble, product bug for broken behavior, and feedback for roadmap or UX pain that is slowing the table down."
      - id: tracked-support
        eyebrow: "Tracked follow-up"
        heading: "Create an account when you want support history inside Chummer"
        body: "You can submit help here without a GitHub account. Create a Chummer account if you want to see your support history later in one place."
      - id: public-issues
        eyebrow: "Advanced public issues"
        heading: "GitHub is the advanced public bug path, not the main support door"
        body: "Use the public issue tracker only when you want a public bug thread. Most people should start with Help or Contact."
faq_pages:
  - id: faq
    eyebrow: "FAQ"
    heading: "Plain answers before you spend more time"
    intro: "The public front door should answer the normal questions directly: what is real now, what preview access means, and how to get help without reverse-engineering the repos."
    actions:
      - label: "See what works today"
        href: "/now"
        tone: primary
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: secondary
      - label: "Create account"
        href: "/signup?next=/home"
        tone: ghost
    sections:
      - title: "Using Chummer"
        entries:
          - question: "Can I actually use Chummer right now?"
            answer: "Yes, as an honest early-access preview. There is a current public download, a real proof trail, and explicit labels for what is live, inspectable, or still opening next."
          - question: "Why would I trust it more than an opaque assistant?"
            answer: "Because the product is trying to keep the result, the trail, and the current release picture visible together instead of asking you to trust mystery math."
          - question: "What does account creation give me right away?"
            answer: "Account creation gives you recovery, support history in Account, and a cleaner return path when linked downloads or account-aware preview features are available."
      - title: "Downloads and installs"
        entries:
          - question: "Do I need an account to download the current preview?"
            answer: "No. The current Linux package is open public. Create an account when you want recovery, tracked support, and a cleaner return path when linked downloads are available."
          - question: "Do I get a personalized download?"
            answer: "No. The published package stays the same for everyone. Any account-aware receipt or handoff is separate from the file itself."
          - question: "Where do I go if install or update goes sideways?"
            answer: "Start with Downloads, then use Contact or Account > Support. GitHub is the advanced public issue path, not the default support door."
      - title: "Participation and support"
        entries:
          - question: "Do I need to participate to help or report a bug?"
            answer: "No. Support and feedback stand on their own. Participation is optional and separate from the normal customer help path."
          - question: "Can I get help without a GitHub account?"
            answer: "Yes. The first-party support intake is the default help path. Create a Chummer account if you want tracked support history inside your account."
