world_marker_minimum: 3
world_marker_bucket:
  - metahuman presence with readable tusks, pointed ears, horns, stature, dermal texture, or other nonhuman physiology
  - obvious cyberlimb, datajack, trodes, smartlink contacts, rig socket, or patched augment hardware
  - partial megacorp product lineage such as Ares, Aztechnology, Renraku, Shiawase, Saeder-Krupp, Horizon, Evo, or Wuxing gear cues with logos blurred or cropped
  - critter or parabotany ephemera such as devil rat traps, barghest or hell hound field photos, Blood Orchid plates, or Paper Lotus charms
  - magical focus, fetish, talisman, ward scar, or awakened-world hint
  - astral totem residue such as Raven, Rat, Wolf, or other totemic portrait glow surfacing around a shamanic moment
  - recognizable Sixth World geography or landmark residue such as Chicago Bug City towers, Renraku Arcology scar, Redmond Barrens street cues, Ork Underground tilework, Puyallup ash, Glow City fencing, or Touristville market grime
  - hard-living lore debris such as shamanic sigils, ward circles, blood-stained med wraps, burned med kits, and bug-tower-adjacent clutter
  - rain-soaked streets, sodium-vapor plus neon mix, or grimy utilitarian spaces
  - cables, duct tape, jury-rigged hardware, synthskin wrap, med patches, or off-brand med or corp gear
  - runner-life or shadow-community setting such as clinic, safehouse, van, alley, rooftop, market, back room, industrial rail, or matrix nook
  - social damage cues such as stained gauze, dried blood, bruises, infection tint, rat traps, mold bloom, cough syrup, spent stim patches, crash posture, or clinic waste
  - addiction or vice fallout such as burned spoons, spent BTL packs, twitchy crash kits, or dirty inhaler clutter shown as consequence, not glamour
rules:
  - No provider names appear in public landing assets.
  - No LTD names appear in public landing assets.
  - PNG masters with AVIF and WebP derivatives are required for every public still.
  - No SVG files appear anywhere in the public front-door campaign set.
  - No empty placeholder frames are allowed.
  - Every placeholder card must still explain what is coming and why it matters.
  - Text in rendered images must be post-composited or otherwise verified instead of trusting raw model lettering.
  - A premium flagship poster or still hero is preferred over a mediocre teaser loop.
  - First-contact assets must feel information-rich, layered, and unmistakably product-specific rather than like quiet generic cyberpunk mood art.
  - Hero, index, and flagship horizon art must carry visible semantic anchors for what the product does; style alone is not enough.
  - The shared prompt scaffold is for secondary guide stills only; hero, horizons index, and flagship horizons should let the flagship poster epoch override it.
  - Poster energy is welcome on flagship assets when it still reads as a lived product scene instead of a title card or fashion pose.
  - Critical public assets must choose one overlay posture before compositing: ambient diegetic, smartlink tactical, cyberarm fit diagnostic, or forge review AR.
  - Overlay geometry on flagship art should prefer rails, brackets, spline traces, radial halos, color dots, seam-bound glows, and sparse anchored microcopy over large face-covering rectangles.
  - Public-facing assets should ship with visible diegetic AR or smart-glasses traces in the frame; any readable AR text must answer something a runner in that scene would actually care about.
  - Flagship and public-guide poster finishes should read like clean premium print, not distressed film stock: no fake grain layer, dust pass, sensor-noise wash, or crunchy noise texture.
  - Flagship assets should usually carry both a metahuman cue and a body-worn cyberware cue; rain and grime alone do not make the frame feel Shadowrun.
  - Every image should imply a lived story beat with a clear before-and-after, not just a posed concept frame: someone is warning, bargaining, patching, sorting, checking, arguing, recovering, or choosing in the middle of a real moment.
  - Hardship must read through the situation itself: triage, crowding, fear, debt, sickness, rot, exploitation, addiction fallout, bad shelter, or failing infrastructure. A dark green palette without those story cues is a miss.
  - Bright should mean vivid and saturated, not clean white. Use high-chroma city, clinic, market, ad, or corp color when the scene earns it.
  - Despair should come from the story beat, not from hiding the frame. Lift midtones enough that faces, hands, gear, wounds, and the main action stay readable at thumbnail, banner, and poster distance.
  - Flagship assets should prefer broad color separation and classic rulebook-cover punch over tasteful noir murk. If the scene feels cool but hard to read, it is still a miss.
  - Keep the world grimy, not the finish. Dirt, blood, rust, trash, and clinic fallout should stay in the subject matter while the poster treatment stays polished, glossy, and intentionally lit.
  - Prefer shiny trash over dusty trash: wet wrappers, reflective tape, oil sheen, chrome scuffs, lacquered plastic, rain-bright curbs, and ad-lit garbage are better than flat brown sludge.
  - When aiming for flagship-box energy, do not imitate a named artist. Use the shared grammar instead: ensemble action, dramatic diagonals, premium painted realism, chrome gleam, saturated edge light, and immediate tabletop-cover readability.
  - If the subject is software behavior, dramatize it as a Sixth World life scene first. Do not solve a public guide image with a raw app screenshot, dashboard wall, or interface capture disguised as art.
  - Lore crumbs should survive in flagship and quality-focus assets: cropped corp packaging, critter photo strips, talismonger ephemera, and parabotany prints are preferred over generic neon clutter.
  - Recognizable lore locations are encouraged when they help the frame: Bug City skyline scars, Arcology shadows, Barrens infrastructure, Underground markets, ash plains, and containment architecture should read as place cues, not tourism postcards.
  - The Sixth World should look expensive, dirty, and physically punishing: grime, vermin, sickness, old blood, crash fatigue, and damaged spaces are welcome when they stay scene-bound and believable.
  - First-contact and flagship surfaces should prefer scenes with recognizably hard living, not just "dangerous atmosphere": visible treatment residue, rat pressure, medical aftercare evidence, and one clear social-pressure beat each generation.
  - Drug-use or vice cues should read as fallout, dependency, or hard living through spent inhalers, burned spoons, stim patches, crash kits, or shakes; never glamorize them as lifestyle beauty shots.
  - Gore should stay grounded and adult: dried blood, meat-glue residue, stained bandages, trauma cleanup, or ugly clinic aftermath are good; splatter spectacle and torture-porn are failures.
  - Optional recurring easter egg: a half-dead ugly ork runner or dev may appear in background or aftermath scenes when it fits the story. If a shirt slogan is used, the exact words `CHUMMER-DEV` must be added as verified post-composite text, not trusted to raw model lettering.
  - When a scene includes humor, keep it adult, peripheral, and diegetic through pictograms, mascot stickers, crossed-out icons, or cropped scribbles rather than readable joke signage.
  - Central signboards, empty roadway ambience, and low-density “one person plus one vague prop wall” compositions are failures on public guide/landing surfaces.
  - Calm isolated workstation energy is not enough for first contact; show relationships, pressure, and proof props.
  - Horizon surfaces should often feel connected to roleplay dialogue: a frozen in-character warning, hard bargain, bad prognosis, tense briefing, or after-action exchange that the table could immediately speak into.
  - When smart-glasses or cybereye intelligence appears, treat it like a runner-facing decision aid from the Sixth World: smartlink threat brackets, teammate biomon pulse, ammo or heat state, SIN-spoof confidence, ward-boundary bleed, toxin load, drone pings, comms handshake health, exit vectors, route viability, corp-security risk, countermeasure trigger risk, and the next safest useful action. Decorative neon fog is failure.
  - AR must cling to what the wearer is actually looking at: cyberlimb seams, wound sites, weapon lines, door frames, crate edges, rails, totem glows, critter photos, or floor paths. Free-floating holo posters, giant HUD slabs, and generic rectangles are failures.
  - Verified overlay placement must follow a rendered-image observation pass. Inspect the finished frame first, identify actual geometry or scene evidence, and only then place chips, rails, and labels.
  - Do not ship semantic overlays that the observed scene cannot support. If no real path, doorway, lane edge, camera, seam, wound, rail, or apparatus is visible, drop or replace the related overlay instead of floating it in empty space.
  - Route or exit overlays require observed path geometry such as floor route paint, lane edges, barriers, ramps, door frames, tunnel mouths, chokepoints, or visible traversal lines. No generic `route clear` chip may sit over blank floor or midair.
  - Every generated frame must keep decisive action inside the safe center so one master can survive desktop and mobile crops.
contact_sheet_rejection:
  - giant letterform or centered signboard
