  - lone person at vague wall
  - sparse desk with one laptop and one mug
  - generic cyberpunk mood art with no dossier, dice, or proof semantics
  - text baked into the image
  - empty title-card posing with no product-scene storytelling
visual_contract:
  first_contact_hero:
    density_target: high
    overlay_density: medium
    required_overlay_mode: cyberarm_fit_diagnostic
    allowed_overlay_modes:
      - cyberarm_fit_diagnostic
    overlay_geometry:
      - fit-status microcopy
      - seam-following anchors
      - clamp alignment glows
      - small bracket marks
      - color-coded scan dots
    overlay_priority_order:
      - cyberarm fit
      - clamp alignment
      - nerve interface stability
      - tool placement
    overlay_actionability_rule: >
      Show only runner-relevant cyberarm fitting diagnostics anchored to the
      cyberarm, clamps, tools, and med rig. Readable text must be short,
      scene-specific, and useful to the patient or streetdoc; no generic HUD
      menus, pseudo-writing, floating lore labels, or sign-like panels.
    negative_space_cap: low
    flash_level: bold
    person_count_target: duo_or_team
    humor_allowed: false
    pseudo_text_allowed: false
    required_setting_markers:
      - bright streetdoc shack or converted clinic bay required
      - cyberarm fitting chair, surgical clamps, or med rig required
      - tool wall, implant trays, or chrome parts required
      - warm clinic lamps and vivid color spill required
      - wet concrete, tarp, or extension-cord grime required
      - visible med, implant, or loadout clutter required
      - street-level Shadowrun residue required
    required_cast_markers:
      - metahuman streetdoc or cybertech required
      - runner receiving a new cyberarm required
      - assistant or teammate encouraged
    required_troll_markers:
      - tusks or obvious metahuman physiology
      - visible chrome or patched gear
      - rough or scarred skin
      - field-worn texture
    required_render_detail:
      - crisp patched-gear microtexture
      - visible grime and wet reflections
      - readable chrome seams or worn straps
      - visible fatigue or pre-run stress cue
    required_overlay_schema:
      - NERVE SYNC
      - JOINT SEAL
      - GRIP TEST
      - PAIN WATCH
      - torque-limit arc
      - seam-following light traces
      - clamp alignment glows
      - color-coded scan dots
    required_status_labels:
      - NERVE SYNC
      - JOINT SEAL
      - GRIP TEST
      - PAIN WATCH
    forbidden_environment_markers:
      - clean hospital exam room
      - clean van interior with no staging cues
      - pristine showroom lighting
      - white-box tech showroom
    forbidden_cast_defaults:
      - lone gadget hero posing at camera
      - ambiguous hooded figure with no team role readability
      - human patient
      - clean shaved patient
      - generic handsome cyberpunk model
    cyberpunk_intensity: high
    shadowrun_lore_weight: high
    must_show_semantic_anchors:
      - runner or table-prep trust pressure
      - a visible operator relationship instead of a lone isolated figure
      - layered physical proof props across foreground, midground, and background
      - visible reasoning cues or diegetic overlay traces
      - visible social cost cues such as dirty wraps, coughing pause, or stimulant fatigue
    must_not_show:
      - generic brooding profile at a vague wall
      - single-person dim bay still
      - lone crate or tabletop glamour
      - empty alley mood still
      - central readable signboard
      - clinical hotel-style polish
  page_index:
    density_target: high
    overlay_density: medium
    required_overlay_mode: ambient_diegetic
    allowed_overlay_modes:
      - ambient_diegetic
    overlay_geometry:
      - lane arcs
      - district markers
      - path traces
      - light seam anchors
    overlay_priority_order:
      - lane differentiation
      - district markers
      - path arcs
    overlay_actionability_rule: Only show wayfinding or lane-selection cues that help the viewer parse branching futures; avoid full-scene diagnostic HUD slabs.
    negative_space_cap: low
    flash_level: bold
    person_count_target: plurality_optional
    humor_allowed: false
    pseudo_text_allowed: false
    required_setting_markers:
      - multiple future districts or lanes
      - street-level chrome or awakened-world clues
      - metahuman traffic or runner-life traces
      - differentiated faction or domain hints
      - recognized 6th-world transit residue (Bug City, Arcology, Barrens, or Underground) required
    forbidden_environment_markers:
      - empty road ambience
      - sparse interchange
      - one sign carrying the whole image
    cyberpunk_intensity: high
    shadowrun_lore_weight: high
    must_show_semantic_anchors:
      - branching plurality
      - differentiated future or work lanes
      - at least one metahuman or body-worn cyberware clue that survives banner scale
      - multiple grounded clues instead of one central marker
      - city-horizon lore continuity from known districts or tower lines
    must_not_show:
      - menu-board composition
      - empty road ambience
      - billboard centerpiece
      - sparse corridor with one symbol
  flagship_horizon:
    density_target: high
    overlay_density: high
    required_overlay_mode: forge_review_ar
    allowed_overlay_modes:
      - forge_review_ar
    overlay_geometry:
      - edge-following approval rails
