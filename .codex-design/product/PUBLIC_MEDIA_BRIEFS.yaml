product: chummer
surface: chummer.run
version: 2
style_epoch:
  mode: single_epoch_per_full_build
  comparison_between_builds: allowed
  note: A full landing build pass should share one major visual family, while later passes may intentionally compare different epochs.
render_rules:
  semantic_ar_policy: >-
    Semantic AR only: labels must describe visible reality, not invented telemetry; if an anchor is not visible, omit the overlay.
  raster_only: true
  no_svg: true
  master_format: png
  required_derivatives:
    - avif
    - webp
  desktop_composition: 16:9
  mobile_safety_rule: keep_critical_action_inside_middle_60_percent
  no_readable_text: true
  allow_sparse_verified_overlay_text: true
  no_logos: true
  no_provider_names: true
  no_ui_labels: true
  semantic_anchor_count_minimum: 3
