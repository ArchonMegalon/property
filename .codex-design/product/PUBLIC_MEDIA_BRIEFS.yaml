  negative_prompt: |
    giant readable signage, wall-sized ad copy, giant monogram, logo, watermark, central signboard, empty alley, empty boulevard, billboard centerpiece, sparse desk with one prop, lone brooding figure at vague wall, empty title-card pose with no scene logic, action-movie gun pose, anime, cel shading, cosplay look, over-saturated magenta neon, low-detail hands, distorted anatomy, fisheye lens, huge lens flare, floating nonsense UI clutter, stock-photo smile, underexposed frame, crushed blacks, green-black murk, shadow-hidden faces, unreadable hands, key props lost in darkness, chalky matte grime, flat muddy haze, dead plastic surfaces with no reflective life, film grain, sensor noise, dust pass, speckle overlay, gritty noise texture, or fake print damage
critical_asset_style_epoch:
  mode: flagship_poster
  overrides_shared_prompt_scaffold: true
  style_anchor: |
    illustrated cover-grade promo poster for a cyberpunk-fantasy tabletop world, painted rulebook-cover realism with deliberate brush texture and cinematic physical lighting, hard-edged but natural material rendering, dramatic grouping, strong silhouette hierarchy, vivid Shadowrun-rulebook readability, lifted midtones, clear face and hand visibility, readable props at poster distance, saturated but grounded color, visible grime, patched gear, old blood, clinic mess, rust bloom, mold, vermin hints, chrome-heavy metahuman street-life specificity, obvious cyberlimbs or body-worn augment hardware, smart-glasses or cybereye intelligence visibly present in-scene and sharpened in post only when needed, polished flagship poster finish, glossy wet surfaces, reflective junk, oily puddles, reflective foil debris, scratched chrome, ad-lit trash, and expensive specular highlights on cheap materials, classic flagship-box cover grammar with ensemble action, dramatic diagonals, heroic perspective without clean superhero polish, premium painted pulp finish, and a premium tabletop-box front read at a glance, scene-led color and lighting rather than a fixed green-dark wash, dense practical props, unmistakably Shadowrun-adjacent runner life, totemic wards and shamanic residues, recognizable 6th-World location pressure, scene-driven poster energy, not a clean cinematic screenshot, not a generic software landing still
  negative_prompt: |
