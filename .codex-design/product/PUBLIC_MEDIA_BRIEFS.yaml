      - compatibility arcs
    overlay_priority_order:
      - approval state
      - provenance
      - rollback
      - witness lock
      - revert cost
    overlay_actionability_rule: Only show review instrumentation that a rulesmith or witness would actually use while governing a live rules change, especially approval confidence, provenance mismatch, rollback path, witness pressure, countermeasure risk, and revert cost.
    negative_space_cap: low
    flash_level: bold
    person_count_target: duo_preferred
    humor_allowed: false
    pseudo_text_allowed: false
    required_setting_markers:
      - industrial rule-lab required
      - approval rail required
      - consequence or rollback machinery required
      - provenance seals or rule cassettes required
    required_overlay_schema:
      - seal drift
      - approval rail
      - PROVENANCE
      - ROLLBACK
    required_action_posture:
      - standing_or_in_motion required
    required_cast_markers:
      - rulesmith required
      - reviewer or witness required
    forbidden_environment_markers:
      - quiet desk still life
      - two people sitting at table
      - generic paperwork workshop
      - tidy modern studio bench
    cyberpunk_intensity: high
    shadowrun_lore_weight: high
    must_show_semantic_anchors:
      - governed change under pressure
      - at least one visible witness, reviewer, or approval presence
      - approval or provenance logic
      - rollback or consequence cues
    must_not_show:
      - generic card tinkering
      - literal blacksmith cliché
      - quiet desk still life
      - single operator in a glow void
      - semantically empty glow props
