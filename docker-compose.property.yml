services:
  propertyquarry-api:
    build:
      context: .
      dockerfile: ea/Dockerfile.property
    image: propertyquarry-runtime:latest
    container_name: "${PROPERTYQUARRY_API_CONTAINER_NAME:-propertyquarry-api}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EA_ROLE: api
      EA_PORT: "8090"
      EA_RUNTIME_MODE: "${EA_RUNTIME_MODE:-prod}"
      EA_ALLOW_LOOPBACK_NO_AUTH: "${EA_ALLOW_LOOPBACK_NO_AUTH:-0}"
      EA_ARTIFACTS_DIR: /data/artifacts
      EA_PUBLIC_TOUR_DIR: /data/public_property_tours
      PROPERTYQUARRY_TOUR_EXPORT_DROP_DIR: /data/incoming_property_tours
      PROPERTYQUARRY_TOUR_EXPORT_INCOMING_DIR: /data/incoming_property_tours
      EA_RESPONSES_PROVIDER_LEDGER_DIR: /data/provider-ledger
      EA_SCHEDULER_HEARTBEAT_PATH: /data/artifacts/propertyquarry-scheduler-heartbeat.json
      EA_SCHEDULER_HEARTBEAT_MAX_AGE_SECONDS: "${EA_SCHEDULER_HEARTBEAT_MAX_AGE_SECONDS:-900}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for property compose}@propertyquarry-db:5432/postgres}"
      TEABLE_BASE_URL: "${TEABLE_BASE_URL:-https://app.teable.ai}"
      TEABLE_TABLE_SYNC_CONFIG_JSON: "${TEABLE_TABLE_SYNC_CONFIG_JSON:-}"
      PROPERTYQUARRY_TEABLE_BASE_ID: "${PROPERTYQUARRY_TEABLE_BASE_ID:-}"
      PROPERTYQUARRY_TEABLE_TENANT_KEY: "${PROPERTYQUARRY_TEABLE_TENANT_KEY:-propertyquarry}"
      PROPERTYQUARRY_TEABLE_TENANT_NAME: "${PROPERTYQUARRY_TEABLE_TENANT_NAME:-PropertyQuarry}"
      PROPERTYQUARRY_TEABLE_TABLE_SYNC_CONFIG_JSON: "${PROPERTYQUARRY_TEABLE_TABLE_SYNC_CONFIG_JSON:-}"
      PROPERTYQUARRY_TEABLE_AUTO_SYNC: "${PROPERTYQUARRY_TEABLE_AUTO_SYNC:-0}"
      PROPERTYQUARRY_ENABLE_PUBLIC_SIDE_SURFACES: "${PROPERTYQUARRY_ENABLE_PUBLIC_SIDE_SURFACES:-0}"
      PROPERTYQUARRY_ENABLE_PUBLIC_RESULTS: "${PROPERTYQUARRY_ENABLE_PUBLIC_RESULTS:-0}"
      PROPERTYQUARRY_ENABLE_PUBLIC_TOURS: "${PROPERTYQUARRY_ENABLE_PUBLIC_TOURS:-0}"
      PROPERTYQUARRY_ENABLE_LEGACY_RUNTIME_SURFACES: "${PROPERTYQUARRY_ENABLE_LEGACY_RUNTIME_SURFACES:-0}"
      PROPERTYQUARRY_ID_AUSTRIA_REQUIRED: "${PROPERTYQUARRY_ID_AUSTRIA_REQUIRED:-0}"
      PROPERTYQUARRY_ID_AUSTRIA_CLIENT_ID: "${PROPERTYQUARRY_ID_AUSTRIA_CLIENT_ID:-}"
      PROPERTYQUARRY_ID_AUSTRIA_CLIENT_SECRET: "${PROPERTYQUARRY_ID_AUSTRIA_CLIENT_SECRET:-}"
      PROPERTYQUARRY_ID_AUSTRIA_REDIRECT_URI: "${PROPERTYQUARRY_ID_AUSTRIA_REDIRECT_URI:-https://propertyquarry.com/id-austria/callback}"
      PROPERTYQUARRY_ID_AUSTRIA_STATE_SECRET: "${PROPERTYQUARRY_ID_AUSTRIA_STATE_SECRET:-}"
      PROPERTYQUARRY_ID_AUSTRIA_ENVIRONMENT: "${PROPERTYQUARRY_ID_AUSTRIA_ENVIRONMENT:-production}"
      PROPERTYQUARRY_ID_AUSTRIA_ISSUER: "${PROPERTYQUARRY_ID_AUSTRIA_ISSUER:-}"
      PROPERTYQUARRY_ID_AUSTRIA_AUTHORIZATION_ENDPOINT: "${PROPERTYQUARRY_ID_AUSTRIA_AUTHORIZATION_ENDPOINT:-}"
      PROPERTYQUARRY_ID_AUSTRIA_TOKEN_ENDPOINT: "${PROPERTYQUARRY_ID_AUSTRIA_TOKEN_ENDPOINT:-}"
      PROPERTYQUARRY_ID_AUSTRIA_JWKS_URI: "${PROPERTYQUARRY_ID_AUSTRIA_JWKS_URI:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_DISABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_DISABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BASE_URL: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BASE_URL:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ALLOWED_HOSTS: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ALLOWED_HOSTS:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BILLING_URL: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BILLING_URL:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_MEMBER_LOGIN_TOKEN_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_MEMBER_LOGIN_TOKEN_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_URL: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_URL:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ALLOWED_HOSTS: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ALLOWED_HOSTS:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_SECRET: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_SECRET:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY_HEADER: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY_HEADER:-X-Api-Key}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_COMPLETION_DIR: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_COMPLETION_DIR:-_completion/brilliant_directories}"
      HOME: /home/ea
      TZ: Europe/Vienna
    ports:
      - "${EA_HOST_PORT:-8090}:8090"
    cpu_shares: ${PROPERTYQUARRY_API_CPU_SHARES:-64}
    volumes:
      - ./config:/config:ro
      - ./config:/app/config:ro
      - ./state/incoming_property_tours:/data/incoming_property_tours
      - propertyquarry_artifacts:/data/artifacts
      - propertyquarry_public_tours:/data/public_property_tours
      - propertyquarry_provider_ledger:/data/provider-ledger
    depends_on:
      propertyquarry-db:
        condition: service_healthy

  propertyquarry-scheduler:
    image: propertyquarry-runtime:latest
    container_name: "${PROPERTYQUARRY_SCHEDULER_CONTAINER_NAME:-propertyquarry-scheduler}"
    restart: unless-stopped
    command: ["nice", "-n", "10", "python", "-m", "app.runner"]
    env_file:
      - .env
    environment:
      EA_ROLE: scheduler
      EA_RUNTIME_MODE: "${EA_RUNTIME_MODE:-prod}"
      PROPERTYQUARRY_SCHEDULER_PROFILE: "${PROPERTYQUARRY_SCHEDULER_PROFILE:-property_only}"
      EA_ARTIFACTS_DIR: /data/artifacts
      EA_PUBLIC_TOUR_DIR: /data/public_property_tours
      PROPERTYQUARRY_TOUR_EXPORT_DROP_DIR: /data/incoming_property_tours
      PROPERTYQUARRY_TOUR_EXPORT_INCOMING_DIR: /data/incoming_property_tours
      EA_RESPONSES_PROVIDER_LEDGER_DIR: /data/provider-ledger
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for property compose}@propertyquarry-db:5432/postgres}"
      TEABLE_BASE_URL: "${TEABLE_BASE_URL:-https://app.teable.ai}"
      TEABLE_TABLE_SYNC_CONFIG_JSON: "${TEABLE_TABLE_SYNC_CONFIG_JSON:-}"
      PROPERTYQUARRY_TEABLE_BASE_ID: "${PROPERTYQUARRY_TEABLE_BASE_ID:-}"
      PROPERTYQUARRY_TEABLE_TENANT_KEY: "${PROPERTYQUARRY_TEABLE_TENANT_KEY:-propertyquarry}"
      PROPERTYQUARRY_TEABLE_TENANT_NAME: "${PROPERTYQUARRY_TEABLE_TENANT_NAME:-PropertyQuarry}"
      PROPERTYQUARRY_TEABLE_TABLE_SYNC_CONFIG_JSON: "${PROPERTYQUARRY_TEABLE_TABLE_SYNC_CONFIG_JSON:-}"
      PROPERTYQUARRY_TEABLE_AUTO_SYNC: "${PROPERTYQUARRY_TEABLE_AUTO_SYNC:-0}"
      PROPERTYQUARRY_ID_AUSTRIA_REQUIRED: "${PROPERTYQUARRY_ID_AUSTRIA_REQUIRED:-0}"
      PROPERTYQUARRY_ID_AUSTRIA_CLIENT_ID: "${PROPERTYQUARRY_ID_AUSTRIA_CLIENT_ID:-}"
      PROPERTYQUARRY_ID_AUSTRIA_CLIENT_SECRET: "${PROPERTYQUARRY_ID_AUSTRIA_CLIENT_SECRET:-}"
      PROPERTYQUARRY_ID_AUSTRIA_REDIRECT_URI: "${PROPERTYQUARRY_ID_AUSTRIA_REDIRECT_URI:-https://propertyquarry.com/id-austria/callback}"
      PROPERTYQUARRY_ID_AUSTRIA_STATE_SECRET: "${PROPERTYQUARRY_ID_AUSTRIA_STATE_SECRET:-}"
      PROPERTYQUARRY_ID_AUSTRIA_ENVIRONMENT: "${PROPERTYQUARRY_ID_AUSTRIA_ENVIRONMENT:-production}"
      PROPERTYQUARRY_ID_AUSTRIA_ISSUER: "${PROPERTYQUARRY_ID_AUSTRIA_ISSUER:-}"
      PROPERTYQUARRY_ID_AUSTRIA_AUTHORIZATION_ENDPOINT: "${PROPERTYQUARRY_ID_AUSTRIA_AUTHORIZATION_ENDPOINT:-}"
      PROPERTYQUARRY_ID_AUSTRIA_TOKEN_ENDPOINT: "${PROPERTYQUARRY_ID_AUSTRIA_TOKEN_ENDPOINT:-}"
      PROPERTYQUARRY_ID_AUSTRIA_JWKS_URI: "${PROPERTYQUARRY_ID_AUSTRIA_JWKS_URI:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_DISABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_DISABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BASE_URL: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BASE_URL:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ALLOWED_HOSTS: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_ALLOWED_HOSTS:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BILLING_URL: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_BILLING_URL:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_MEMBER_LOGIN_TOKEN_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_MEMBER_LOGIN_TOKEN_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ENABLED: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ENABLED:-0}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_URL: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_URL:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ALLOWED_HOSTS: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_ALLOWED_HOSTS:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_SECRET: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_SSO_BRIDGE_SECRET:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY_HEADER: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY_HEADER:-X-Api-Key}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_API_KEY:-}"
      PROPERTYQUARRY_BRILLIANT_DIRECTORIES_COMPLETION_DIR: "${PROPERTYQUARRY_BRILLIANT_DIRECTORIES_COMPLETION_DIR:-_completion/brilliant_directories}"
      HOME: /home/ea
      TZ: Europe/Vienna
    cpu_shares: ${PROPERTYQUARRY_SCHEDULER_CPU_SHARES:-32}
    volumes:
      - ./config:/config:ro
      - ./config:/app/config:ro
      - ./state/incoming_property_tours:/data/incoming_property_tours
      - propertyquarry_artifacts:/data/artifacts
      - propertyquarry_public_tours:/data/public_property_tours
      - propertyquarry_provider_ledger:/data/provider-ledger
    depends_on:
      propertyquarry-db:
        condition: service_healthy
      propertyquarry-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-m", "app.scheduler_healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  propertyquarry-db:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: "${PROPERTYQUARRY_DB_CONTAINER_NAME:-propertyquarry-db}"
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for property compose}"
    volumes:
      - propertyquarry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  propertyquarry_artifacts: {}
  propertyquarry_pgdata: {}
  propertyquarry_public_tours: {}
  propertyquarry_provider_ledger: {}
